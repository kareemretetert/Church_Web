<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--primary:#6a1b9a;
--primary-dark:#4a148c;
--bg:#f0f4ff;
--card:#ffffff;
--text:#2f2f39;
--muted:#6b7280;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:var(--bg);
min-height:100vh;
}

/* HEADER */
header{
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
text-align:center;
padding:30px 15px;
position:relative;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
top:-40%;left:-10%;
width:300px;height:300px;
background:rgba(255,255,255,0.07);
border-radius:50%;
}

header h1{
margin:0;
font-size:clamp(22px,5vw,32px);
font-weight:800;
}

header p{
margin-top:6px;
font-size:14px;
opacity:0.85;
}

.home-btn{
display:inline-block;
margin-top:12px;
padding:8px 20px;
border:2px solid white;
border-radius:20px;
color:white;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

.home-btn:hover{background:rgba(255,255,255,0.2);}

/* SEARCH */
.search-bar{
max-width:600px;
margin:20px auto;
padding:0 15px;
}

.search-bar input{
width:100%;
padding:13px 18px;
border-radius:30px;
border:2px solid #ddd;
font-size:15px;
font-family:'Cairo',sans-serif;
outline:none;
transition:0.3s;
}

.search-bar input:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(106,27,154,0.1);
}

/* GRID */
.container{
max-width:1200px;
margin:0 auto 40px;
padding:10px 15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:22px;
}

/* CARD */
.card{
background:var(--card);
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.09);
overflow:hidden;
display:flex;
flex-direction:column;
transition:0.3s;
animation:fadeUp 0.5s;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 14px 35px rgba(0,0,0,0.14);
}

/* COVER */
.card-cover{
width:100%;
height:160px;
object-fit:cover;
display:block;
background:linear-gradient(135deg,#ede7f6,#d1c4e9);
}

.card-cover-placeholder{
width:100%;
height:160px;
background:linear-gradient(135deg,#ede7f6,#d1c4e9);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

/* BODY */
.card-body{
padding:18px;
flex:1;
display:flex;
flex-direction:column;
}

.card-title{
font-size:17px;
font-weight:800;
color:var(--text);
margin-bottom:6px;
}

.card-desc{
color:var(--muted);
font-size:13px;
flex:1;
line-height:1.6;
margin-bottom:12px;
}

.card-meta{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:14px;
}

.badge{
padding:4px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.badge-purple{background:#ede7f6;color:#6a1b9a;}
.badge-blue{background:#e3f2fd;color:#1565c0;}

.enroll-btn{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
font-weight:bold;
font-size:14px;
font-family:'Cairo',sans-serif;
cursor:pointer;
transition:0.3s;
margin-top:auto;
}

.enroll-btn:hover{
opacity:0.9;
transform:scale(1.02);
}

/* EMPTY */
.empty{
text-align:center;
padding:60px 20px;
color:var(--muted);
grid-column:1/-1;
}

.empty .emoji{font-size:60px;margin-bottom:15px;}
.empty p{font-size:16px;}

/* LOADER */
.loading{
text-align:center;
padding:60px 20px;
grid-column:1/-1;
color:var(--muted);
font-size:16px;
}

/* RESPONSIVE */
@media(max-width:600px){
.container{
grid-template-columns:1fr;
gap:14px;
}
header{padding:22px 12px;}
}

@media(min-width:601px) and (max-width:900px){
.container{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
<h1>🎓 الكورسات التعليمية</h1>
<p>كنيسة السيدة العذراء مريم</p>
<a href="index.html" class="home-btn">العودة للرئيسية ⬅</a>
<a href="index.html" class="home-btn">العودة للرئيسية ⬅</a>
</header>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="🔍 ابحث عن كورس..." oninput="filterCourses()">
</div>

<div class="container" id="courseGrid">
<div class="loading">⏳ جاري تحميل الكورسات...</div>
</div>

<script>
let allCourses = [];

async function loadCourses(){
try{
const res = await fetch("courses.json");
allCourses = await res.json();
if(!Array.isArray(allCourses)) allCourses = [];
}catch{
allCourses = [];
}
renderCourses(allCourses);
}

function renderCourses(list){
const grid = document.getElementById("courseGrid");
if(!list.length){
grid.innerHTML = `
<div class="empty">
<div class="emoji">📭</div>
<p>لا توجد كورسات متاحة حالياً</p>
</div>`;
return;
}

grid.innerHTML = list.map((c,i)=>{
const lectCount = c.lectures ? c.lectures.length : 0;
let lessCount = 0;
if(c.lectures) c.lectures.forEach(l=>{ if(l.lessons) lessCount += l.lessons.length; });

return `
<div class="card">
${c.cover
? `<img src="${c.cover}" class="card-cover" alt="${c.title}">`
: `<div class="card-cover-placeholder">📚</div>`
}
<div class="card-body">
<div class="card-title">${c.title}</div>
${c.desc ? `<div class="card-desc">${c.desc}</div>` : `<div class="card-desc"></div>`}
<div class="card-meta">
<span class="badge badge-purple">📖 ${lectCount} محاضرة</span>
<span class="badge badge-blue">📌 ${lessCount} درس</span>
</div>
<button class="enroll-btn" onclick="goToCourse(${i})">
الدخول للكورس ←
</button>
</div>
</div>`;
}).join("");
}

function filterCourses(){
const q = document.getElementById("searchInput").value.trim().toLowerCase();
if(!q){ renderCourses(allCourses); return; }
const filtered = allCourses.filter(c=>
c.title.toLowerCase().includes(q) ||
(c.desc && c.desc.toLowerCase().includes(q))
);
renderCourses(filtered);
}

function goToCourse(i){
localStorage.setItem("courseIndex", i);
window.location = "course_view.html";
}

loadCourses();
</script>
</body>
</html>
