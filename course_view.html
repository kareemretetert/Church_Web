<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محتوى الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — light & dark
══════════════════════════════════════════ */
:root{
  /* brand */
  --p:#7c3aed; --p-dk:#5b21b6; --p-lt:#a78bfa;
  /* red (lecture header) */
  --red:#c62828; --red-dk:#b71c1c;
  /* surfaces */
  --bg:#f4f0fb; --surface:#ffffff; --surface2:#f1ecfc;
  /* text — high contrast in both modes */
  --tx:#0f172a; --tx2:#374151; --tx3:#6b7280;
  /* borders */
  --bdr:#e2e8f0;
  /* icons bg */
  --ico-v:#dbeafe; --ico-i:#dcfce7; --ico-f:#ffedd5; --ico-t:#fce7f3; --ico-q:#fef9c3;
  /* icon fg */
  --ico-v-c:#1d4ed8; --ico-i-c:#15803d; --ico-f-c:#c2410c; --ico-t-c:#9d174d; --ico-q-c:#b45309;
  /* lesson hover */
  --row-hover:#ede9fe;
  /* content bg */
  --content-bg:#f5f0ff;
  /* quiz option */
  --opt-bg:#ede9fe; --opt-sel:#ddd6fe;
  /* shadows */
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh-hdr:0 6px 24px rgba(109,40,217,.25);
  /* badge */
  --bdg-p-bg:#ede7f6; --bdg-p-c:#5b21b6;
  --bdg-b-bg:#dbeafe; --bdg-b-c:#1e40af;
  --bdg-o-bg:#ffedd5; --bdg-o-c:#c2410c;
  /* lock */
  --lock-bg:#fef2f2; --lock-bdr:#fecaca; --lock-c:#991b1b;
  /* result */
  --res-ok-bg:#dcfce7; --res-no-bg:#fee2e2;
  /* quiz row */
  --quiz-row-bg:#fffbeb; --quiz-row-bdr:#fde68a;
}

/* DARK MODE — overrides only */
body.dark{
  --bg:#0d0d1a; --surface:#161627; --surface2:#1e1e33;
  --tx:#f0f0ff; --tx2:#c4c4e0; --tx3:#8888aa;
  --bdr:#2a2a44;
  --ico-v:#1e3a5f; --ico-i:#14432a; --ico-f:#431407; --ico-t:#3b0a2a; --ico-q:#3b2800;
  --ico-v-c:#93c5fd; --ico-i-c:#86efac; --ico-f-c:#fdba74; --ico-t-c:#f9a8d4; --ico-q-c:#fde68a;
  --row-hover:#1e1e38;
  --content-bg:#12122a;
  --opt-bg:#1e1e38; --opt-sel:#2d2b5e;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh-hdr:0 6px 24px rgba(0,0,0,.6);
  --bdg-p-bg:#2d1b69; --bdg-p-c:#c4b5fd;
  --bdg-b-bg:#1e3a5f; --bdg-b-c:#93c5fd;
  --bdg-o-bg:#431407; --bdg-o-c:#fdba74;
  --lock-bg:#1a0a0a; --lock-bdr:#7f1d1d; --lock-c:#fca5a5;
  --res-ok-bg:#14432a; --res-no-bg:#450a0a;
  --quiz-row-bg:#1c1500; --quiz-row-bdr:#78350f;
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);color:var(--tx);
  min-height:100vh;overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header{
  background:linear-gradient(135deg,var(--p),#9333ea,var(--p-dk));
  position:sticky;top:0;z-index:300;
  box-shadow:var(--sh-hdr);
  overflow:hidden;
}
header::before{
  content:"";position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.06);pointer-events:none;
}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}

.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);
  border-radius:22px;background:rgba(255,255,255,.15);
  color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;flex-shrink:0;
  transition:background .2s,transform .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:#fff;}

.hdr-title{
  flex:1;text-align:center;color:#fff;
  font-size:clamp(14px,3.5vw,19px);font-weight:800;line-height:1.3;
}

/* ── theme toggle switch ── */
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{
  width:64px;height:32px;border-radius:50px;
  background:#1e293b;position:relative;
  display:flex;align-items:center;
  padding:0 5px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.3);
  transition:background .3s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.toggle-track:active{transform:scale(.95);}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{
  position:absolute;
  width:24px;height:24px;border-radius:50%;
  background:#fff;
  right:3px;
  transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* ══════════════════════════════════════════
   PAGE
══════════════════════════════════════════ */
.page{max-width:860px;margin:0 auto;padding:20px 14px 70px;}

/* ══════════════════════════════════════════
   INFO CARD
══════════════════════════════════════════ */
.info-card{
  background:var(--surface);border-radius:22px;overflow:hidden;
  box-shadow:var(--sh);margin-bottom:24px;
  border:1px solid var(--bdr);
  animation:fadeUp .5s both;
}
.info-cover{width:100%;max-height:220px;object-fit:cover;display:block;}
.info-body{padding:18px 20px;}
.info-title{font-size:19px;font-weight:800;color:var(--tx);}
.info-desc{color:var(--tx2);font-size:13px;margin-top:6px;line-height:1.7;}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.badge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;}
.b-p{background:var(--bdg-p-bg);color:var(--bdg-p-c);}
.b-b{background:var(--bdg-b-bg);color:var(--bdg-b-c);}
.b-o{background:var(--bdg-o-bg);color:var(--bdg-o-c);}

/* ══════════════════════════════════════════
   LECTURE BLOCK
══════════════════════════════════════════ */
.lec-block{
  background:var(--surface);border-radius:20px;
  box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;
  border:1px solid var(--bdr);
  animation:fadeUp .4s both;
}

/* RED HEADER */
.lec-hdr{
  background:linear-gradient(135deg,var(--red),var(--red-dk));
  color:#fff;padding:15px 18px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:filter .2s;
}
.lec-hdr:hover{filter:brightness(1.08);}
.lec-hdr:active{filter:brightness(.9);}

/* LOCKED HEADER */
.lec-hdr.locked{
  background:linear-gradient(135deg,#64748b,#475569);
  cursor:not-allowed;
}
.lec-hdr.locked:hover{filter:none;}

/* arrow circle */
.lec-arr{
  width:30px;height:30px;flex-shrink:0;
  background:rgba(255,255,255,.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
}
.lec-arr svg{width:15px;height:15px;fill:#fff;}
.lec-arr.open{transform:rotate(90deg);}

.lec-meta{flex:1;min-width:0;}
.lec-num{font-size:11px;opacity:.75;margin-bottom:2px;}
.lec-name{font-size:16px;font-weight:800;line-height:1.35;}
.lec-topics{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.topic-tag{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;font-size:11px;}
.lec-cnt{font-size:11px;opacity:.75;white-space:nowrap;flex-shrink:0;}

/* LOCK BADGE */
.lock-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.25);border-radius:14px;
  padding:4px 10px;font-size:11px;font-weight:700;color:#fff;
  white-space:nowrap;
}

/* LOCK NOTICE */
.lock-notice{
  background:var(--lock-bg);border:1px solid var(--lock-bdr);
  border-radius:0 0 18px 18px;padding:14px 18px;
  display:flex;align-items:center;gap:10px;
}
.lock-notice span{font-size:13px;color:var(--lock-c);font-weight:600;}

/* BODY — grid slide */
.lec-body{
  display:grid;grid-template-rows:0fr;
  transition:grid-template-rows .36s ease;
}
.lec-body.open{grid-template-rows:1fr;}
.lec-body-inner{overflow:hidden;}

/* ══════════════════════════════════════════
   LESSON ROW
══════════════════════════════════════════ */
.lesson-row{
  display:flex;align-items:center;gap:13px;
  padding:13px 18px;border-bottom:1px solid var(--bdr);
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  position:relative;
}
.lesson-row:last-of-type{border-bottom:none;}
.lesson-row:hover{background:var(--row-hover);}
.lesson-row:active{background:var(--opt-sel);}

/* ICON BOX */
.l-ico{
  width:44px;height:44px;border-radius:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.lesson-row:hover .l-ico{transform:scale(1.08) rotate(-5deg);}
.l-ico svg{width:22px;height:22px;}
.iv{background:var(--ico-v);} .iv svg{fill:var(--ico-v-c);}
.ii{background:var(--ico-i);} .ii svg{fill:var(--ico-i-c);}
.if{background:var(--ico-f);} .if svg{fill:var(--ico-f-c);}
.it{background:var(--ico-t);} .it svg{fill:var(--ico-t-c);}
.iq{background:var(--ico-q);} .iq svg{fill:var(--ico-q-c);}

.l-info{flex:1;min-width:0;}
.l-name{font-size:14px;font-weight:700;color:var(--tx);line-height:1.4;}
.l-lbl{font-size:12px;color:var(--tx3);margin-top:2px;}

/* done check */
.done-mark{
  display:none;font-size:11px;font-weight:800;
  background:#dcfce7;color:#15803d;
  padding:2px 7px;border-radius:10px;margin-right:5px;
}
body.dark .done-mark{background:#14432a;color:#86efac;}
.done-mark.show{display:inline;}

/* ROW ARROW */
.row-arr{
  width:28px;height:28px;flex-shrink:0;
  background:var(--surface2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s;
}
.row-arr svg{width:12px;height:12px;stroke:var(--tx3);transition:stroke .2s;}
.row-arr.open{transform:rotate(90deg);background:var(--opt-sel);}
.row-arr.open svg{stroke:var(--p);}

/* ══════════════════════════════════════════
   QUIZ ROW
══════════════════════════════════════════ */
.quiz-row{
  display:flex;align-items:center;gap:13px;padding:13px 18px;
  background:var(--quiz-row-bg);border-top:2px solid var(--quiz-row-bdr);
  cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  text-decoration:none;
}
.quiz-row:hover{filter:brightness(.97);}
.quiz-row:active{filter:brightness(.93);}
.quiz-row.open .row-arr{transform:rotate(90deg);background:var(--opt-sel);}
.q-name{font-size:14px;font-weight:700;color:var(--ico-q-c);}
.q-sub{font-size:12px;color:var(--tx3);margin-top:2px;}

/* ══════════════════════════════════════════
   INLINE CONTENT
══════════════════════════════════════════ */
.c-wrap{
  display:grid;grid-template-rows:0fr;
  transition:grid-template-rows .36s ease,opacity .3s;
  opacity:0;
}
.c-wrap.open{grid-template-rows:1fr;opacity:1;}
.c-inner{overflow:hidden;}

.c-hdr{
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;padding:11px 18px;
  display:flex;justify-content:space-between;align-items:center;
  gap:10px;
}
.c-hdr-title{font-size:14px;font-weight:700;flex:1;color:#fff;}
.c-close{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  padding:6px 14px;border-radius:16px;cursor:pointer;
  font-size:12px;font-family:'Cairo',sans-serif;font-weight:700;
  -webkit-tap-highlight-color:transparent;
  transition:background .2s;
}
.c-close:hover{background:rgba(255,255,255,.35);}
.c-close:active{transform:scale(.93);}
.c-body{padding:16px;background:var(--content-bg);}

/* VIDEO */
.vid-wrap{
  position:relative;padding-bottom:56.25%;height:0;overflow:hidden;
  border-radius:14px;background:#000;
}
.vid-wrap iframe,.vid-wrap video{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;border-radius:14px;
}

/* IMAGE */
.c-img{
  width:100%;max-height:70vh;object-fit:contain;
  border-radius:14px;display:block;cursor:zoom-in;
  transition:transform .2s;
}
.c-img:hover{transform:scale(1.01);}

/* FILE */
.file-fr{width:100%;height:70vh;border:none;border-radius:14px;background:#fff;}
.file-link{
  display:inline-flex;align-items:center;gap:8px;margin-top:10px;
  padding:11px 22px;background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;border-radius:14px;font-family:'Cairo',sans-serif;
  font-weight:700;font-size:14px;text-decoration:none;
  transition:opacity .2s,transform .15s;
}
.file-link:hover{opacity:.9;}
.file-link:active{transform:scale(.96);}

/* TEXT */
.txt-box{
  background:var(--surface);border-radius:14px;padding:22px;
  font-size:15px;line-height:1.9;color:var(--tx);white-space:pre-wrap;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
body.dark .txt-box{box-shadow:0 2px 10px rgba(0,0,0,.4);}

/* ══════════════════════════════════════════
   QUIZ INLINE
══════════════════════════════════════════ */
.qz-timer{
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;border-radius:14px;padding:12px 18px;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;
}
.qz-tlbl{font-size:13px;font-weight:700;}
.qz-tval{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;}
.qz-bar-wrap{height:7px;background:var(--surface2);border-radius:10px;margin-bottom:16px;overflow:hidden;}
.qz-bar{height:100%;width:100%;background:var(--p);transition:width 1s linear,background .5s;border-radius:10px;}

.q-card{
  background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
body.dark .q-card{box-shadow:0 2px 10px rgba(0,0,0,.4);}
.q-txt{font-weight:700;font-size:15px;color:var(--tx);margin-bottom:10px;line-height:1.5;}
.q-img-thumb{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
.q-opt{
  display:flex;align-items:center;gap:10px;
  background:var(--opt-bg);padding:10px 14px;border-radius:11px;
  margin-bottom:8px;cursor:pointer;
  transition:background .15s,border-color .15s,transform .12s;
  border:2px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.q-opt:last-child{margin-bottom:0;}
.q-opt:hover{filter:brightness(.97);}
.q-opt.sel{background:var(--opt-sel);border-color:var(--p);transform:scale(1.01);}
.q-opt:active{transform:scale(.97);}
.q-opt input{width:auto;margin:0;accent-color:var(--p);}
.q-opt span{font-size:14px;color:var(--tx);}
.qz-submit{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-size:16px;font-weight:800;font-family:'Cairo',sans-serif;
  cursor:pointer;margin-top:6px;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.qz-submit:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(109,40,217,.4);}
.qz-submit:active{transform:scale(.97);}

/* RESULTS */
.res-wrap{background:var(--surface);border-radius:18px;padding:28px 20px;text-align:center;}
.res-score{font-size:68px;font-weight:800;line-height:1;}
.res-pct{font-size:22px;font-weight:700;margin-top:6px;}
.res-msg{font-size:14px;color:var(--tx2);margin-top:10px;}
.res-qa{margin-top:20px;text-align:right;}
.rqa{border-radius:13px;padding:12px 14px;margin-bottom:8px;}
.rqa-ok{background:var(--res-ok-bg);}
.rqa-no{background:var(--res-no-bg);}
.rqa-q{font-weight:700;font-size:13px;color:var(--tx);margin-bottom:4px;}
.rqa-a{font-size:13px;margin-bottom:2px;}

/* ══════════════════════════════════════════
   IMAGE ZOOM
══════════════════════════════════════════ */
#imgZoom{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:9999;
  justify-content:center;align-items:center;cursor:zoom-out;
}
#imgZoom.show{display:flex;}
#imgZoom img{max-width:96%;max-height:96%;border-radius:12px;animation:scaleIn .25s cubic-bezier(.34,1.56,.64,1);}

/* ══════════════════════════════════════════
   SPINNER / EMPTY
══════════════════════════════════════════ */
.spin-wrap{text-align:center;padding:60px 20px;}
.spin{
  display:inline-block;width:46px;height:46px;
  border:5px solid var(--surface2);border-top:5px solid var(--p);
  border-radius:50%;animation:spin .85s linear infinite;
}
.empty-lec{text-align:center;padding:22px;color:var(--tx3);font-size:13px;}

/* ══════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes unlockPop{
  0%{box-shadow:0 0 0 0 rgba(109,40,217,.5);}
  40%{box-shadow:0 0 0 12px rgba(109,40,217,.0),0 6px 28px rgba(109,40,217,.35);}
  100%{box-shadow:var(--sh);}
}
@keyframes scaleIn{from{transform:scale(.78);}to{transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:600px){
  .page{padding:14px 10px 70px;}
  .lec-hdr{padding:13px 14px;}
  .lesson-row,.quiz-row{padding:12px 14px;gap:10px;}
  .c-body{padding:12px;}
  .l-ico{width:40px;height:40px;}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      العودة
    </button>
    <div class="hdr-title" id="courseName">جاري التحميل...</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع الليلي">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb" id="toggleThumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">
  <div id="infoSection"></div>
  <div id="lecturesEl"><div class="spin-wrap"><div class="spin"></div></div></div>
</div>

<div id="imgZoom" onclick="this.classList.remove('show')"><img id="imgZoomSrc"></div>

<script>
/* ══════════════════════════════════════════
   SVG ICONS
══════════════════════════════════════════ */
const IC = {
  video:         `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>`,
  "video-upload":`<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>`,
  image:         `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zm-10-9 3 4 2-2.5 3 3.5H5l4-5z"/></svg>`,

const TLBL = {
  video:"فيديو","video-upload":"فيديو",
  image:"صورة",file:"ملف PDF","file-upload":"ملف PDF",text:"نص تعليمي"
};
const TICLS = {
  video:"iv","video-upload":"iv",
  image:"ii",file:"if","file-upload":"if",text:"it"
};

/* ══════════════════════════════════════════
   THEME
══════════════════════════════════════════ */
(function initTheme(){
  const saved = localStorage.getItem("cv_theme");
  const prefersDark = window.matchMedia("(prefers-color-scheme:dark)").matches;
  const mode = saved || (prefersDark ? "dark" : "light");
  applyTheme(mode);
})();

function applyTheme(mode){
  document.body.classList.toggle("dark", mode === "dark");
  localStorage.setItem("cv_theme", mode);
}

function toggleTheme(){
  applyTheme(document.body.classList.contains("dark") ? "light" : "dark");
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const CI = localStorage.getItem("courseIndex") || "0";
const PROG_KEY = "cv_prog_" + CI;
let course = null;
let quizData = null, quizAns = {}, qTimer = null, qLeft = 0, qTotal = 0;

/* ══════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════ */
function getProgress(){ return JSON.parse(localStorage.getItem(PROG_KEY)||"{}"); }
function saveProgress(d){ localStorage.setItem(PROG_KEY, JSON.stringify(d)); }
function markDone(li, si){
  const p = getProgress(); p[`${li}-${si}`] = true; saveProgress(p);
  // علامة ✔ على الدرس
  const el = document.getElementById(`done-${li}-${si}`);
  if(el) el.classList.add("show");
  // تحقق فوري: هل المحاضرة التالية انفتحت الآن؟
  checkUnlock(li);
}

function checkUnlock(li){
  // المحاضرة التالية
  const nextLi = li + 1;
  if(!course || !course.lectures || nextLi >= course.lectures.length) return;

  const wasLocked = isLocked(nextLi);
  if(!wasLocked) return; // كانت مفتوحة أصلاً

  // إذا وصلنا الآن لـ 70% — افتحها فوراً بدون refresh
  if(getLecPct(li) >= 0.7){
    unlockLecture(nextLi);
  }
}

function unlockLecture(li){
  const hdr   = document.querySelector(`#lbody-${li}`)?.previousElementSibling;
  const body  = document.getElementById(`lbody-${li}`);
  const notice= document.getElementById(`lock-notice-${li}`);
  const badge = document.getElementById(`lock-badge-${li}`);
  const arr   = document.getElementById(`larr-${li}`);

  if(hdr){
    hdr.classList.remove("locked");
    hdr.setAttribute("onclick", `togLec(${li})`);
  }
  if(notice) notice.style.display = "none";
  if(badge)  badge.style.display  = "none";

  // نبض انيميشن تنبيه
  if(body){
    const block = body.closest(".lec-block");
    if(block){
      block.style.animation = "none";
      block.offsetHeight; // reflow
      block.style.animation = "unlockPop .6s cubic-bezier(.34,1.56,.64,1) both";
    }
  }
}
function restoreProgress(){
  const p = getProgress();
  Object.keys(p).forEach(k=>{
    const el = document.getElementById("done-"+k);
    if(el) el.classList.add("show");
  });
}

/* ══════════════════════════════════════════
   LECTURE LOCK (70% of prev lecture needed)
══════════════════════════════════════════ */
function getLecPct(li){
  const lec = course.lectures[li];
  const lessons = lec.lessons||[];
  if(!lessons.length) return 1;
  const p = getProgress();
  let done = 0;
  lessons.forEach((_,si)=>{ if(p[`${li}-${si}`]) done++; });
  return done / lessons.length;
}
function isLocked(li){
  if(li === 0) return false;
  return getLecPct(li - 1) < 0.7;
}

/* ══════════════════════════════════════════
   LOAD
══════════════════════════════════════════ */
async function loadCourse(){
  try{
    const all = await fetch("courses.json").then(r=>r.json());
    course = all[CI];
    if(!course){
      document.getElementById("lecturesEl").innerHTML =
        `<p style="text-align:center;color:#ef4444;padding:40px;">الكورس غير موجود</p>`;
      return;
    }
    renderCourse();
    restoreProgress();
  }catch(e){
    document.getElementById("lecturesEl").innerHTML =
      `<p style="text-align:center;color:#ef4444;padding:40px;">خطأ في التحميل</p>`;
  }
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderCourse(){
  document.getElementById("courseName").innerText = course.title;
  document.title = course.title;

  const lects = course.lectures || [];
  let totalLessons = 0, totalQuizzes = 0;
  lects.forEach(l=>{
    if(l.lessons) totalLessons += l.lessons.length;
    if(l.quiz?.questions?.length) totalQuizzes++;
  });

  document.getElementById("infoSection").innerHTML = `
  <div class="info-card">
    ${course.cover ? `<img src="${course.cover}" class="info-cover" loading="lazy">` : ""}
    <div class="info-body">
      <div class="info-title">${course.title}</div>
      ${course.desc ? `<div class="info-desc">${course.desc}</div>` : ""}
      <div class="meta-row">
        <span class="badge b-p">📖 ${lects.length} محاضرة</span>
        <span class="badge b-b">📌 ${totalLessons} درس</span>
        ${totalQuizzes ? `<span class="badge b-o">📝 ${totalQuizzes} امتحان</span>` : ""}
      </div>
    </div>
  </div>`;

  if(!lects.length){
    document.getElementById("lecturesEl").innerHTML =
      `<div style="text-align:center;padding:50px;color:var(--tx3)">📭 لا يوجد محتوى بعد</div>`;
    return;
  }

  document.getElementById("lecturesEl").innerHTML =
    lects.map((lec, li) => buildLecture(lec, li)).join("");
}

function buildLecture(lec, li){
  const locked = isLocked(li);
  const lessons = lec.lessons || [];
  const hasQ = lec.quiz && (lec.quiz.url || lec.quiz.questions?.length);
  const tops = lec.topics
    ? lec.topics.split('\n').filter(Boolean)
        .map(t=>`<span class="topic-tag">${t}</span>`).join("") : "";

  const rowsHtml = lessons.length
    ? lessons.map((ls, si) => buildRow(ls, li, si)).join("")
    : `<div class="empty-lec">لا توجد دروس في هذه المحاضرة بعد</div>`;

  const quizHtml = hasQ ? buildQuizRow(lec, li) : "";

  const lockBadge = locked
    ? `<div class="lock-badge" id="lock-badge-${li}"><svg viewBox="0 0 24 24" width="13" height="13" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="#fff" stroke-width="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>مقفولة</div>` : "";

  const lockNotice = locked
    ? `<div class="lock-notice" id="lock-notice-${li}"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="var(--lock-c)" stroke-width="1.8"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="var(--lock-c)" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="var(--lock-c)"/></svg><span>أكمل 70% من المحاضرة ${li} أولاً لفتح هذه المحاضرة</span></div>` : "";

  return `
  <div class="lec-block" style="animation-delay:${li*.07}s">
    <div class="lec-hdr${locked?" locked":""}" onclick="${locked?"showLockMsg("+li+")":"togLec("+li+")"}">
      <div class="lec-arr" id="larr-${li}">${IC.arrow}</div>
      <div class="lec-meta">
        <div class="lec-num">المحاضرة ${li+1}</div>
        <div class="lec-name">${lec.title}</div>
        ${tops ? `<div class="lec-topics">${tops}</div>` : ""}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="lec-cnt">${lessons.length} درس${hasQ?" · امتحان":""}</div>
        ${lockBadge}
      </div>
    </div>
    ${lockNotice}
    <div class="lec-body" id="lbody-${li}">
      <div class="lec-body-inner">
        ${rowsHtml}
        ${quizHtml}
      </div>
    </div>
  </div>`;
}

function buildRow(ls, li, si){
  const ic = TICLS[ls.type] || "it";
  const content = buildContent(ls);
  return `
  <div class="lesson-row" id="lrow-${li}-${si}" onclick="togContent(${li},${si})">
    <div class="l-ico ${ic}">${IC[ls.type]||IC.text}</div>
    <div class="l-info">
      <div class="l-name">
        <span class="done-mark" id="done-${li}-${si}">✔ تم</span>${ls.title}
      </div>
      <div class="l-lbl">${TLBL[ls.type]||ls.type}</div>
    </div>
    <div class="row-arr" id="rarr-${li}-${si}">${IC.arrow}</div>
  </div>
  <div class="c-wrap" id="cwrap-${li}-${si}">
    <div class="c-inner">
      <div class="c-hdr">
        <span class="c-hdr-title">${ls.title}</span>
        <button class="c-close" onclick="closeContent(event,${li},${si})">✕ إغلاق</button>
      </div>
      <div class="c-body" id="cbody-${li}-${si}">${content}</div>
    </div>
  </div>`;
}

function buildQuizRow(lec, li){
  if(lec.quiz.questions?.length){
    return `
    <div class="quiz-row" id="qrow-${li}" onclick="togQuiz(${li})">
      <div class="l-ico iq">${IC.quiz}</div>
      <div class="l-info">
        <div class="q-name">${lec.quiz.name||"الامتحان"}</div>
        <div class="q-sub">${lec.quiz.questions.length} سؤال · ${lec.quiz.time||30} دقيقة</div>
      </div>
      <div class="row-arr" id="qrarr-${li}">${IC.arrow}</div>
    </div>
    <div class="c-wrap" id="qwrap-${li}">
      <div class="c-inner">
        <div class="c-hdr">
          <span class="c-hdr-title">📝 ${lec.quiz.name||"الامتحان"}</span>
          <button class="c-close" onclick="closeQuiz(event,${li})">✕ إغلاق</button>
        </div>
        <div class="c-body" id="qbody-${li}"></div>
      </div>
    </div>`;
  }
  return `
  <a href="${lec.quiz.url}" class="quiz-row">
    <div class="l-ico iq">${IC.quiz}</div>
    <div class="l-info">
      <div class="q-name">${lec.quiz.name||"الامتحان"}</div>
      <div class="q-sub">اضغط لبدء الامتحان ←</div>
    </div>
    <div class="row-arr">${IC.arrow}</div>
  </a>`;
}

/* ══════════════════════════════════════════
   BUILD CONTENT
══════════════════════════════════════════ */
function buildContent(ls){
  const t = ls.type;

  if(t === "video" || t === "video-upload"){
    const url = ls.videoUrl || ls.mediaUrl || "";
    if(!url) return `<p style="color:var(--tx3);text-align:center;padding:20px;">لا يوجد رابط فيديو</p>`;
    const yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]+)/);
    if(yt){
      return `<div class="vid-wrap">
        <iframe src="https://www.youtube.com/embed/${yt[1]}?rel=0" allowfullscreen
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture">
        </iframe></div>`;
    }
    const isDirect = t === "video-upload" || /\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
    if(isDirect){
      return `<div class="vid-wrap">
        <video controls preload="metadata"
          style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;"
          src="${url}">
        </video></div>`;
    }
    // رابط عام — iframe
    return `<div class="vid-wrap">
      <iframe src="${url}" allowfullscreen></iframe></div>`;
  }

  if(t === "image"){
    const url = ls.imageUrl || "";
    if(!url) return `<p style="color:var(--tx3);text-align:center;padding:20px;">لا توجد صورة</p>`;
    return `<img src="${url}" class="c-img" alt="${ls.title}" onclick="zoomImg(this.src)">`;
  }

  if(t === "file" || t === "file-upload"){
    const url = ls.fileUrl || ls.mediaUrl || "";
    if(!url) return `<p style="color:var(--tx3);text-align:center;padding:20px;">لا يوجد ملف</p>`;
    return `<iframe src="${url}" class="file-fr"></iframe>
      <div style="text-align:center;">
        <a href="${url}" target="_blank" class="file-link">📄 فتح الملف في تبويب جديد</a>
      </div>`;
  }

  if(t === "text"){
    const txt = ls.text || "";
    if(!txt) return `<p style="color:var(--tx3);text-align:center;padding:20px;">لا يوجد نص</p>`;
    return `<div class="txt-box">${txt.replace(/\n/g,"<br>")}</div>`;
  }

  return `<p style="color:var(--tx3);text-align:center;padding:20px;">نوع المحتوى غير معروف</p>`;
}

/* ══════════════════════════════════════════
   STOP MEDIA — يوقف كل صوت وفيديو
══════════════════════════════════════════ */
function stopMedia(el){
  if(!el) return;
  el.querySelectorAll("video").forEach(v=>{
    try{ v.pause(); }catch(e){}
    v.removeAttribute("src");
    v.load();
  });
  el.querySelectorAll("iframe").forEach(fr=>{
    fr.src = "about:blank";
  });
}

/* ══════════════════════════════════════════
   CLOSE ALL
══════════════════════════════════════════ */
function closeAll(){
  clearInterval(qTimer); qTimer = null;
  document.querySelectorAll(".c-wrap.open").forEach(w=>{
    const body = w.querySelector(".c-body");
    if(body) stopMedia(body);
    w.classList.remove("open");
  });
  document.querySelectorAll(".row-arr.open").forEach(r=>r.classList.remove("open"));
  document.querySelectorAll(".quiz-row.open").forEach(r=>r.classList.remove("open"));
}

/* ══════════════════════════════════════════
   TOGGLE LECTURE
══════════════════════════════════════════ */
function togLec(li){
  const body = document.getElementById(`lbody-${li}`);
  const arr  = document.getElementById(`larr-${li}`);
  const open = body.classList.contains("open");
  body.classList.toggle("open", !open);
  arr.classList.toggle("open", !open);
}

function showLockMsg(li){
  const needed = li; // prev lecture
  const pct = Math.round(getLecPct(li - 1) * 100);
  alert(`🔒 هذه المحاضرة مقفولة\nأكمل ${70-pct}% إضافية من المحاضرة ${li} لفتحها\n(مكتمل حالياً: ${pct}%)`);
}

/* ══════════════════════════════════════════
   TOGGLE CONTENT (درس)
══════════════════════════════════════════ */
function togContent(li, si){
  const wrap = document.getElementById(`cwrap-${li}-${si}`);
  const rarr = document.getElementById(`rarr-${li}-${si}`);
  const isOpen = wrap.classList.contains("open");

  if(isOpen){
    stopMedia(document.getElementById(`cbody-${li}-${si}`));
    wrap.classList.remove("open");
    rarr.classList.remove("open");
    return;
  }

  closeAll();

  wrap.classList.add("open");
  rarr.classList.add("open");

  // mark progress
  markDone(li, si);

  setTimeout(()=>{
    const row = document.getElementById(`lrow-${li}-${si}`);
    if(row){
      const top = row.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({top, behavior:"smooth"});
    }
  }, 80);
}

function closeContent(e, li, si){
  e.stopPropagation();
  stopMedia(document.getElementById(`cbody-${li}-${si}`));
  document.getElementById(`cwrap-${li}-${si}`).classList.remove("open");
  document.getElementById(`rarr-${li}-${si}`).classList.remove("open");
}

/* ══════════════════════════════════════════
   TOGGLE QUIZ
══════════════════════════════════════════ */
function togQuiz(li){
  const wrap = document.getElementById(`qwrap-${li}`);
  const qrow = document.getElementById(`qrow-${li}`);
  const rarr = document.getElementById(`qrarr-${li}`);
  const isOpen = wrap.classList.contains("open");

  if(isOpen){
    clearInterval(qTimer); qTimer = null;
    wrap.classList.remove("open");
    qrow?.classList.remove("open");
    rarr?.classList.remove("open");
    return;
  }

  closeAll();

  const lec = course.lectures[li];
  quizData = lec.quiz;
  quizAns = {}; qLeft = qTotal = (quizData.time || 30) * 60;

  document.getElementById(`qbody-${li}`).innerHTML = buildQuiz(li);
  wrap.classList.add("open");
  qrow?.classList.add("open");
  rarr?.classList.add("open");

  setTimeout(()=>{
    const r = (qrow || wrap).getBoundingClientRect();
    window.scrollTo({top: r.top + window.scrollY - 72, behavior:"smooth"});
  }, 80);

  startTimer(li);
}

function closeQuiz(e, li){
  e.stopPropagation();
  clearInterval(qTimer); qTimer = null;
  document.getElementById(`qwrap-${li}`).classList.remove("open");
  document.getElementById(`qrow-${li}`)?.classList.remove("open");
  document.getElementById(`qrarr-${li}`)?.classList.remove("open");
}

/* ══════════════════════════════════════════
   QUIZ
══════════════════════════════════════════ */
function buildQuiz(li){
  const qs = quizData.questions;
  return `<div>
  <div class="qz-timer">
    <span class="qz-tlbl">⏱ الوقت المتبقي</span>
    <span class="qz-tval" id="qt-${li}">--:--</span>
  </div>
  <div class="qz-bar-wrap"><div class="qz-bar" id="qb-${li}"></div></div>
  ${qs.map((q,i)=>`
  <div class="q-card">
    <div class="q-txt">س${i+1}: ${q.question}</div>
    ${q.image ? `<img src="${q.image}" class="q-img-thumb">` : ""}
    ${q.options.map((o,oi)=>`
    <div class="q-opt" id="qo-${li}-${i}-${oi}" onclick="pickAns(${li},${i},${oi+1})">
      <input type="radio" name="qq${li}_${i}" style="width:auto;margin:0;accent-color:var(--p);">
      <span>${o}</span>
    </div>`).join("")}
  </div>`).join("")}
  <button class="qz-submit" onclick="submitQuiz(${li})">إنهاء الامتحان ✅</button>
  </div>`;
}

function pickAns(li, qi, val){
  quizAns[qi] = val;
  const n = quizData.questions[qi].options.length;
  for(let oi=0; oi<n; oi++){
    const d = document.getElementById(`qo-${li}-${qi}-${oi}`);
    if(d){
      d.classList.toggle("sel", oi+1 === val);
      d.querySelector("input").checked = (oi+1 === val);
    }
  }
}

function startTimer(li){
  clearInterval(qTimer);
  qTimer = setInterval(()=>{
    qLeft--;
    const m = Math.floor(qLeft/60), s = qLeft % 60;
    const te = document.getElementById(`qt-${li}`);
    const be = document.getElementById(`qb-${li}`);
    if(te) te.innerText = `${m<10?"0"+m:m}:${s<10?"0"+s:s}`;
    if(be){
      be.style.width = ((qLeft/qTotal)*100)+"%";
      be.style.background = qLeft < 60 ? "#dc2626" : "var(--p)";
    }
    if(qLeft <= 0){ clearInterval(qTimer); submitQuiz(li); }
  }, 1000);
}

function submitQuiz(li){
  clearInterval(qTimer); qTimer = null;
  const qs = quizData.questions;
  const un = qs.filter((_,i)=>!quizAns[i]).length;
  if(un > 0 && !confirm(`لم تجب على ${un} سؤال. هل تريد الإنهاء؟`)) return;
  let sc = 0;
  qs.forEach((q,i)=>{ if(quizAns[i] === q.answer) sc++; });
  const pct = Math.round((sc/qs.length)*100);
  const col = pct>=70 ? "#16a34a" : pct>=50 ? "#d97706" : "#dc2626";
  const emo = pct>=70 ? "🎉" : pct>=50 ? "👍" : "📚";
  const msg = pct>=70 ? "أحسنت! نتيجة ممتازة 🌟" : pct>=50 ? "نتيجة جيدة، يمكنك التحسين" : "راجع المادة وحاول مجدداً";
  document.getElementById(`qbody-${li}`).innerHTML = `
  <div class="res-wrap">
    <div style="font-size:66px;margin-bottom:10px;">${emo}</div>
    <div class="res-score" style="color:${col}">${sc}/${qs.length}</div>
    <div class="res-pct" style="color:${col}">${pct}%</div>
    <p class="res-msg">${msg}</p>
    <div class="res-qa">
    ${qs.map((q,i)=>{
      const ch=quizAns[i], ok=ch===q.answer;
      return `<div class="rqa ${ok?"rqa-ok":"rqa-no"}">
        <div class="rqa-q">س${i+1}: ${q.question}</div>
        <div class="rqa-a" style="color:${ok?"#16a34a":"#dc2626"}">${ok?"✅":"❌"} إجابتك: ${ch?q.options[ch-1]:"لم تجب"}</div>
        ${!ok?`<div class="rqa-a" style="color:#16a34a">✅ الصحيحة: ${q.options[q.answer-1]}</div>`:""}
      </div>`;
    }).join("")}
    </div>
  </div>`;
}
