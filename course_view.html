<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محتوى الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--primary:#6a1b9a;
--pd:#4a148c;
--red:#c62828;
--redd:#b71c1c;
--bg:#f4f0fb;
--card:#fff;
--txt:#1e1e2e;
--muted:#6b7280;
--bdr:#f0eaf8;
--sh:0 6px 28px rgba(106,27,154,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ─────────────────────────────── */
header{
background:linear-gradient(135deg,var(--primary) 0%,#9c27b0 55%,var(--pd) 100%);
color:#fff;position:sticky;top:0;z-index:200;
box-shadow:0 4px 20px rgba(74,20,140,0.35);
}
header::before{
content:"";position:absolute;top:-40px;left:-40px;
width:180px;height:180px;border-radius:50%;
background:rgba(255,255,255,0.05);pointer-events:none;
}
.hdr-inner{
display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;
}
.back-btn{
display:inline-flex;align-items:center;gap:5px;
padding:9px 16px;border:1.5px solid rgba(255,255,255,0.45);
border-radius:22px;background:rgba(255,255,255,0.15);
color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
cursor:pointer;transition:.22s;flex-shrink:0;
-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.back-btn:hover{background:rgba(255,255,255,0.28);}
.back-btn:active{transform:scale(.96);}
.back-btn svg{width:14px;height:14px;fill:#fff;}
.hdr-title{flex:1;text-align:center;font-size:clamp(14px,3.5vw,19px);font-weight:800;line-height:1.3;}
.hdr-space{width:78px;flex-shrink:0;}

/* ── PAGE ─────────────────────────────── */
.page{max-width:860px;margin:0 auto;padding:20px 14px 70px;}

/* ── INFO CARD ─────────────────────────── */
.info-card{
background:var(--card);border-radius:22px;overflow:hidden;
box-shadow:var(--sh);margin-bottom:24px;
animation:fadeUp .5s both;
}
.info-cover{width:100%;max-height:220px;object-fit:cover;display:block;}
.info-body{padding:18px 20px;}
.info-title{font-size:19px;font-weight:800;color:var(--txt);}
.info-desc{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.7;}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.badge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;}
.b-purple{background:#ede7f6;color:#6a1b9a;}
.b-blue{background:#e3f2fd;color:#1565c0;}
.b-orange{background:#fff3e0;color:#e65100;}

/* ── LECTURE BLOCK ───────────────────── */
.lec-block{
background:var(--card);border-radius:20px;box-shadow:var(--sh);
margin-bottom:14px;overflow:hidden;animation:fadeUp .4s both;
}
/* RED HEADER */
.lec-hdr{
background:linear-gradient(135deg,var(--red),var(--redd));
color:#fff;padding:15px 18px;cursor:pointer;
display:flex;align-items:center;gap:12px;
user-select:none;-webkit-tap-highlight-color:transparent;
transition:background .2s,filter .2s;
}
.lec-hdr:hover{filter:brightness(1.07);}
.lec-hdr:active{filter:brightness(.93);}

/* arrow circle — يدور لما يفتح */
.lec-arr{
width:30px;height:30px;flex-shrink:0;
background:rgba(255,255,255,0.2);border-radius:50%;
display:flex;align-items:center;justify-content:center;
transition:transform .32s cubic-bezier(.34,1.56,.64,1);
}
.lec-arr svg{width:15px;height:15px;fill:#fff;}
.lec-arr.open{transform:rotate(90deg);}

.lec-meta{flex:1;min-width:0;}
.lec-num{font-size:11px;opacity:.72;margin-bottom:2px;}
.lec-name{font-size:16px;font-weight:800;line-height:1.35;}
.lec-topics{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.topic-tag{background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:10px;font-size:11px;}
.lec-cnt{font-size:11px;opacity:.72;white-space:nowrap;flex-shrink:0;}

/* BODY — smooth slide */
.lec-body{
display:grid;grid-template-rows:0fr;
transition:grid-template-rows .34s ease;
}
.lec-body.open{grid-template-rows:1fr;}
.lec-body-inner{overflow:hidden;}

/* ── LESSON ROW ──────────────────────── */
.lesson-row{
display:flex;align-items:center;gap:13px;
padding:13px 18px;border-bottom:1px solid var(--bdr);
cursor:pointer;transition:background .15s;
-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.lesson-row:last-child{border-bottom:none;}
.lesson-row:hover{background:#faf5ff;}
.lesson-row:active{background:#f0e6ff;}

/* icon box */
.l-icon{
width:44px;height:44px;border-radius:13px;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
transition:transform .2s;
}
.lesson-row:hover .l-icon{transform:scale(1.08);}
.l-icon svg{width:22px;height:22px;}
.iv{background:#e3f2fd;} .iv svg{fill:#1565c0;}
.ii{background:#e8f5e9;} .ii svg{fill:#2e7d32;}
.if{background:#fff3e0;} .if svg{fill:#e65100;}
.it{background:#fce4ec;} .it svg{fill:#880e4f;}
.iq{background:#fff8e1;} .iq svg{fill:#f57f17;}

.l-info{flex:1;min-width:0;}
.l-name{font-size:14px;font-weight:700;color:var(--txt);line-height:1.4;}
.l-lbl{font-size:12px;color:var(--muted);margin-top:2px;}

/* row arrow — يدور لما يفتح */
.row-arr{
width:28px;height:28px;flex-shrink:0;
background:var(--bdr);border-radius:50%;
display:flex;align-items:center;justify-content:center;
transition:transform .32s cubic-bezier(.34,1.56,.64,1),background .2s;
}
.row-arr svg{width:12px;height:12px;fill:var(--muted);transition:fill .2s;}
.row-arr.open{transform:rotate(90deg);background:#ede7f6;}
.row-arr.open svg{fill:var(--primary);}
.quiz-row-btn .row-arr.open{background:#fff3cd;}

/* ── QUIZ ROW ────────────────────────── */
.quiz-row-btn{
display:flex;align-items:center;gap:13px;padding:13px 18px;
background:#fffde7;border-top:2px solid #ffe082;
cursor:pointer;transition:background .15s;
-webkit-tap-highlight-color:transparent;touch-action:manipulation;
text-decoration:none;
}
.quiz-row-btn:hover{background:#fff9c4;}
.quiz-row-btn:active{background:#fff59d;}
.quiz-row-btn.open .row-arr{transform:rotate(90deg);background:#fff3cd;}
.q-name{font-size:14px;font-weight:700;color:#e65100;}
.q-sub{font-size:12px;color:#888;margin-top:2px;}

/* ── INLINE CONTENT ─────────────────── */
/* smooth expand */
.content-wrap{
display:grid;grid-template-rows:0fr;
transition:grid-template-rows .35s ease,opacity .3s;
opacity:0;
}
.content-wrap.open{grid-template-rows:1fr;opacity:1;}
.content-inner{overflow:hidden;}

.c-hdr{
background:linear-gradient(135deg,var(--primary),var(--pd));
color:#fff;padding:11px 18px;
display:flex;justify-content:space-between;align-items:center;
}
.c-title{font-size:14px;font-weight:700;flex:1;}
.c-close{
background:rgba(255,255,255,0.18);border:none;color:#fff;
padding:6px 14px;border-radius:16px;cursor:pointer;
font-size:12px;font-family:'Cairo',sans-serif;font-weight:700;
-webkit-tap-highlight-color:transparent;transition:.2s;
}
.c-close:hover{background:rgba(255,255,255,0.32);}
.c-body{padding:16px;background:#f9f5ff;}

/* video */
.vid-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:14px;background:#000;}
.vid-wrap iframe,.vid-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:14px;}

/* image */
.c-img{width:100%;max-height:72vh;object-fit:contain;border-radius:14px;display:block;cursor:zoom-in;transition:transform .2s;}
.c-img:hover{transform:scale(1.01);}

/* file */
.file-iframe{width:100%;height:72vh;border:none;border-radius:14px;background:#fff;}
.open-file-btn{
display:inline-flex;align-items:center;gap:8px;margin-top:10px;
padding:11px 22px;background:linear-gradient(135deg,var(--primary),var(--pd));
color:#fff;border-radius:14px;font-family:'Cairo',sans-serif;
font-weight:700;font-size:14px;text-decoration:none;transition:.2s;
}
.open-file-btn:hover{opacity:.9;}

/* text */
.txt-content{
background:#fff;border-radius:14px;padding:22px;
font-size:15px;line-height:1.9;color:var(--txt);white-space:pre-wrap;
box-shadow:0 2px 12px rgba(0,0,0,.06);
}

/* ── QUIZ INLINE ─────────────────────── */
.qz-timer{
background:linear-gradient(135deg,var(--primary),var(--pd));
color:#fff;border-radius:14px;padding:12px 18px;margin-bottom:12px;
display:flex;justify-content:space-between;align-items:center;
}
.qz-tlbl{font-size:13px;font-weight:700;}
.qz-tval{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;}
.qz-bar-wrap{height:7px;background:#ede7f6;border-radius:10px;margin-bottom:18px;overflow:hidden;}
.qz-bar{height:100%;width:100%;background:var(--primary);transition:width 1s linear,background .6s;border-radius:10px;}

.q-card{
background:#fff;border-radius:15px;padding:16px;margin-bottom:12px;
box-shadow:0 2px 12px rgba(0,0,0,.07);
animation:fadeUp .3s both;
}
.q-txt{font-weight:700;font-size:15px;color:var(--txt);margin-bottom:10px;line-height:1.5;}
.q-img{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
.q-opt{
display:flex;align-items:center;gap:10px;
background:#f5f2ff;padding:10px 14px;border-radius:11px;
margin-bottom:8px;cursor:pointer;
transition:background .15s,border-color .15s,transform .15s;
border:2px solid transparent;
-webkit-tap-highlight-color:transparent;
}
.q-opt:last-child{margin-bottom:0;}
.q-opt:hover{background:#ede7f6;}
.q-opt.sel{background:#ede7f6;border-color:var(--primary);transform:scale(1.01);}
.q-opt input{width:auto;margin:0;accent-color:var(--primary);}
.q-opt span{font-size:14px;color:var(--txt);}
.qz-submit{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,var(--primary),var(--pd));
color:#fff;font-size:16px;font-weight:800;
font-family:'Cairo',sans-serif;cursor:pointer;margin-top:6px;
transition:transform .15s,box-shadow .15s;
-webkit-tap-highlight-color:transparent;
}
.qz-submit:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(74,20,140,.35);}
.qz-submit:active{transform:scale(.97);}

/* result */
.res-wrap{background:#fff;border-radius:18px;padding:28px 20px;text-align:center;animation:fadeUp .4s both;}
.res-score{font-size:66px;font-weight:800;line-height:1;}
.res-pct{font-size:22px;font-weight:700;margin-top:6px;}
.res-msg{font-size:14px;color:var(--muted);margin-top:10px;}
.res-qa{margin-top:20px;text-align:right;}
.rqa{border-radius:13px;padding:12px 14px;margin-bottom:8px;}
.rqa-ok{background:#e8f5e9;}.rqa-no{background:#ffebee;}
.rqa-q{font-weight:700;font-size:13px;color:#333;margin-bottom:4px;}
.rqa-a{font-size:13px;margin-bottom:2px;}

/* ── IMAGE ZOOM ──────────────────────── */
#imgZoom{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.92);z-index:999;
justify-content:center;align-items:center;cursor:zoom-out;
animation:fadeIn .2s;
}
#imgZoom.show{display:flex;}
#imgZoom img{max-width:96%;max-height:96%;border-radius:12px;animation:scaleIn .25s cubic-bezier(.34,1.56,.64,1);}

/* ── SPINNER ─────────────────────────── */
.spin-wrap{text-align:center;padding:60px 20px;}
.spin{display:inline-block;width:46px;height:46px;border:5px solid #ede7f6;border-top:5px solid var(--primary);border-radius:50%;animation:spin .8s linear infinite;}

/* ── EMPTY ────────────────────────────  */
.empty-lec{text-align:center;padding:22px;color:var(--muted);font-size:13px;}

/* ── KEYFRAMES ───────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{transform:scale(.78);}to{transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── RESPONSIVE ──────────────────────── */
@media(max-width:600px){
.page{padding:14px 10px 70px;}
.lec-hdr{padding:13px 14px;}
.lesson-row,.quiz-row-btn{padding:12px 14px;}
.c-body{padding:12px;}
.hdr-space{width:62px;}
}
</style>
</head>
<body>

<header>
<div class="hdr-inner">
<button class="back-btn" onclick="history.back()">
<svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
العودة
</button>
<div class="hdr-title" id="courseName">جاري التحميل...</div>
<div class="hdr-space"></div>
</div>
</header>

<div class="page">
<div id="infoSection"></div>
<div id="lecturesEl"><div class="spin-wrap"><div class="spin"></div></div></div>
</div>

<div id="imgZoom" onclick="this.classList.remove('show')"><img id="imgZoomImg"></div>

<script>
/* ═══════════════════════════════════════
   SVG ICONS
═══════════════════════════════════════ */
const IC = {
video: `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`,
"video-upload": `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`,
image: `<svg viewBox="0 0 24 24"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zm-10-9 3 4 2-2.5 3 3.5H5l4-5z"/></svg>`,
file:  `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`,
"file-upload": `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`,
text:  `<svg viewBox="0 0 24 24"><path d="M3 4h18v2H3zm0 4h18v2H3zm0 4h12v2H3zm0 4h12v2H3z"/></svg>`,
// ✅ أيقونة امتحان كلاسيكية — ورقة وقلم
quiz:  `<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/><line x1="8" y1="7" x2="16" y2="7" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="11" x2="16" y2="11" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="15" x2="12" y2="15" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><path d="M13.5 16.5l1.5 1.5 3-3" stroke="#2e7d32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
arrow: `<svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
};
const TLBL = {video:"فيديو","video-upload":"فيديو",image:"صورة",file:"ملف PDF","file-upload":"ملف PDF",text:"نص تعليمي"};
const TICLS= {video:"iv","video-upload":"iv",image:"ii",file:"if","file-upload":"if",text:"it"};

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const CI = localStorage.getItem("courseIndex");
let course = null;
let quizData=null, quizAns={}, qTimer=null, qLeft=0, qTotal=0;

/* ═══════════════════════════════════════
   LOAD
═══════════════════════════════════════ */
async function loadCourse(){
  try{
    const all = await fetch("courses.json").then(r=>r.json());
    course = all[CI];
    if(!course){ document.getElementById("lecturesEl").innerHTML=`<p style="text-align:center;color:red;padding:40px;">الكورس غير موجود</p>`; return; }
    render();
  }catch{
    document.getElementById("lecturesEl").innerHTML=`<p style="text-align:center;color:red;padding:40px;">خطأ في التحميل</p>`;
  }
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render(){
  document.getElementById("courseName").innerText = course.title;
  document.title = course.title;

  const lects = course.lectures||[];
  let ls=0,qz=0;
  lects.forEach(l=>{ if(l.lessons) ls+=l.lessons.length; if(l.quiz?.questions?.length) qz++; });

  // info card
  document.getElementById("infoSection").innerHTML=`
  <div class="info-card">
    ${course.cover?`<img src="${course.cover}" class="info-cover" loading="lazy">`:""}
    <div class="info-body">
      <div class="info-title">${course.title}</div>
      ${course.desc?`<div class="info-desc">${course.desc}</div>`:""}
      <div class="meta-row">
        <span class="badge b-purple">📖 ${lects.length} محاضرة</span>
        <span class="badge b-blue">📌 ${ls} درس</span>
        ${qz?`<span class="badge b-orange">📝 ${qz} امتحان</span>`:""}
      </div>
    </div>
  </div>`;

  if(!lects.length){
    document.getElementById("lecturesEl").innerHTML=`<div style="text-align:center;padding:50px;color:var(--muted);">📭 لا يوجد محتوى بعد</div>`;
    return;
  }

  document.getElementById("lecturesEl").innerHTML = lects.map((lec,li)=>{
    const lessons=lec.lessons||[];
    const hasQ = lec.quiz&&(lec.quiz.url||(lec.quiz.questions?.length));
    const tops = lec.topics?lec.topics.split('\n').filter(Boolean).map(t=>`<span class="topic-tag">${t}</span>`).join(""):"";

    const rowsHtml = lessons.length
      ? lessons.map((ls,si)=>lessonRow(ls,li,si)).join("")
      : `<div class="empty-lec">لا توجد دروس في هذه المحاضرة بعد</div>`;

    return `
    <div class="lec-block" style="animation-delay:${li*0.07}s">
      <div class="lec-hdr" onclick="togLec(${li})">
        <div class="lec-arr" id="larr-${li}">${IC.arrow}</div>
        <div class="lec-meta">
          <div class="lec-num">المحاضرة ${li+1}</div>
          <div class="lec-name">${lec.title}</div>
          ${tops?`<div class="lec-topics">${tops}</div>`:""}
        </div>
        <div class="lec-cnt">${lessons.length} درس${hasQ?" · امتحان":""}</div>
      </div>
      <div class="lec-body" id="lbody-${li}">
        <div class="lec-body-inner">
          ${rowsHtml}
          ${hasQ ? quizRow(lec,li) : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

function lessonRow(ls,li,si){
  const ic = TICLS[ls.type]||"it";
  return `
  <div class="lesson-row" id="lrow-${li}-${si}" onclick="togContent(${li},${si})">
    <div class="l-icon ${ic}">${IC[ls.type]||IC.text}</div>
    <div class="l-info">
      <div class="l-name">${ls.title}</div>
      <div class="l-lbl">${TLBL[ls.type]||ls.type}</div>
    </div>
    <div class="row-arr" id="rarr-${li}-${si}">${IC.arrow}</div>
  </div>
  <div class="content-wrap" id="cwrap-${li}-${si}">
    <div class="content-inner">
      <div class="c-hdr">
        <span class="c-title">${ls.title}</span>
        <button class="c-close" onclick="closeContent(event,${li},${si})">✕ إغلاق</button>
      </div>
      <div class="c-body" id="cbody-${li}-${si}">${buildContent(ls)}</div>
    </div>
  </div>`;
}

function quizRow(lec,li){
  if(lec.quiz.questions?.length){
    return `
    <div class="quiz-row-btn" id="qrow-${li}" onclick="togQuiz(${li})">
      <div class="l-icon iq">${IC.quiz}</div>
      <div class="l-info">
        <div class="q-name">${lec.quiz.name||"الامتحان"}</div>
        <div class="q-sub">${lec.quiz.questions.length} سؤال · ${lec.quiz.time||30} دقيقة</div>
      </div>
      <div class="row-arr" id="qrarr-${li}">${IC.arrow}</div>
    </div>
    <div class="content-wrap" id="qwrap-${li}">
      <div class="content-inner">
        <div class="c-hdr">
          <span class="c-title">📝 ${lec.quiz.name||"الامتحان"}</span>
          <button class="c-close" onclick="closeQuiz(event,${li})">✕ إغلاق</button>
        </div>
        <div class="c-body" id="qbody-${li}"></div>
      </div>
    </div>`;
  }
  return `
  <a href="${lec.quiz.url}" class="quiz-row-btn">
    <div class="l-icon iq">${IC.quiz}</div>
    <div class="l-info">
      <div class="q-name">${lec.quiz.name||"الامتحان"}</div>
      <div class="q-sub">اضغط لبدء الامتحان ←</div>
    </div>
    <div class="row-arr">${IC.arrow}</div>
  </a>`;
}

/* ═══════════════════════════════════════
   BUILD CONTENT HTML
═══════════════════════════════════════ */
function buildContent(ls){
  const t=ls.type;
  if(t==="video"||t==="video-upload"){
    const url=ls.videoUrl||ls.mediaUrl||"";
    const yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]+)/);
    const isDirect=t==="video-upload"||/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
    if(isDirect&&!yt)
      return `<div class="vid-wrap"><video controls preload="metadata" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;"></video></div>
              <script>document.currentScript.previousElementSibling.querySelector('video').src="${url}";<\/script>`;
    const embed=yt?`https://www.youtube.com/embed/${yt[1]}?rel=0&enablejsapi=1`:url;
    return `<div class="vid-wrap"><iframe id="yt-${Math.random().toString(36).slice(2)}" src="${embed}" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>`;
  }
  if(t==="image")
    return `<img src="${ls.imageUrl||''}" class="c-img" alt="${ls.title}" onclick="zoomImg(this.src)">`;
  if(t==="file"||t==="file-upload"){
    const url=ls.fileUrl||ls.mediaUrl||"";
    return `<iframe src="${url}" class="file-iframe"></iframe>
            <div style="text-align:center;margin-top:10px;"><a href="${url}" target="_blank" class="open-file-btn">📄 فتح في تبويب جديد</a></div>`;
  }
  if(t==="text")
    return `<div class="txt-content">${(ls.text||"").replace(/\n/g,"<br>")}</div>`;
  return `<p style="color:var(--muted);text-align:center;padding:20px;">لا يوجد محتوى</p>`;
}

/* ═══════════════════════════════════════
   TOGGLE LECTURE
═══════════════════════════════════════ */
function togLec(li){
  const body=document.getElementById(`lbody-${li}`);
  const arr =document.getElementById(`larr-${li}`);
  const opening=!body.classList.contains("open");
  body.classList.toggle("open",opening);
  arr.classList.toggle("open",opening);
}

/* ═══════════════════════════════════════
   TOGGLE CONTENT (درس)
═══════════════════════════════════════ */
function togContent(li,si){
  const wrap=document.getElementById(`cwrap-${li}-${si}`);
  const row =document.getElementById(`lrow-${li}-${si}`);
  const rarr=document.getElementById(`rarr-${li}-${si}`);
  const opening=!wrap.classList.contains("open");

  if(!opening){
    stopMedia(document.getElementById(`cbody-${li}-${si}`));
    wrap.classList.remove("open");
    rarr.classList.remove("open");
    return;
  }

  closeAll();

  wrap.classList.add("open");
  rarr.classList.add("open");

  setTimeout(()=>{
    const r=row.getBoundingClientRect();
    window.scrollTo({top:r.top+window.scrollY-72,behavior:'smooth'});
  },80);
}

function closeContent(e,li,si){
  e.stopPropagation();
  stopMedia(document.getElementById(`cbody-${li}-${si}`));
  document.getElementById(`cwrap-${li}-${si}`).classList.remove("open");
  document.getElementById(`rarr-${li}-${si}`).classList.remove("open");
}

/* ═══════════════════════════════════════
   TOGGLE QUIZ
═══════════════════════════════════════ */
function togQuiz(li){
  const wrap=document.getElementById(`qwrap-${li}`);
  const qrow=document.getElementById(`qrow-${li}`);
  const rarr=document.getElementById(`qrarr-${li}`);
  const opening=!wrap.classList.contains("open");

  if(!opening){
    clearInterval(qTimer); qTimer=null;
    wrap.classList.remove("open");
    qrow&&qrow.classList.remove("open");
    return;
  }

  closeAll();

  // init quiz
  const lec=course.lectures[li];
  quizData=lec.quiz; quizAns={}; qLeft=qTotal=(quizData.time||30)*60;
  document.getElementById(`qbody-${li}`).innerHTML=buildQuiz(li);
  wrap.classList.add("open");
  qrow&&qrow.classList.add("open");
  rarr&&rarr.classList.add("open"); // سهم الامتحان

  setTimeout(()=>{
    const r=(qrow||wrap).getBoundingClientRect();
    window.scrollTo({top:r.top+window.scrollY-72,behavior:'smooth'});
  },80);

  startTimer(li);
}

function closeQuiz(e,li){
  e.stopPropagation();
  clearInterval(qTimer); qTimer=null;
  document.getElementById(`qwrap-${li}`).classList.remove("open");
  document.getElementById(`qrow-${li}`)?.classList.remove("open");
  document.getElementById(`qrarr-${li}`)?.classList.remove("open");
  // لا يوجد media في الامتحان — فقط إغلاق
}

/* ═══════════════════════════════════════
   CLOSE ALL
═══════════════════════════════════════ */
function closeAll(){
  clearInterval(qTimer); qTimer=null;
  // وقف كل الميديا أولاً
  document.querySelectorAll(".content-wrap.open").forEach(w=>{
    const body=w.querySelector(".c-body");
    if(body) stopMedia(body);
  });
  // إغلاق كل الـ wraps
  document.querySelectorAll(".content-wrap.open").forEach(w=>w.classList.remove("open"));
  // إعادة سهم كل الدروس
  document.querySelectorAll(".row-arr.open").forEach(r=>r.classList.remove("open"));
  // إغلاق صف الامتحان
  document.querySelectorAll(".quiz-row-btn.open").forEach(r=>r.classList.remove("open"));
}

/* ═══════════════════════════════════════
   STOP MEDIA  — وقف الفيديو/الامتحان
═══════════════════════════════════════ */
function stopMedia(el){
  if(!el) return;
  // وقف <video> — pause ثم امسح الـ src
  el.querySelectorAll("video").forEach(v=>{
    try{ v.pause(); }catch(e){}
    v.removeAttribute("src");
    v.load();
  });
  // وقف <iframe> (YouTube / Cloudinary) — امسح الـ src تماماً
  el.querySelectorAll("iframe").forEach(fr=>{
    fr.src = "about:blank";
  });
}

/* ═══════════════════════════════════════
   QUIZ
═══════════════════════════════════════ */
function buildQuiz(li){
  const qs=quizData.questions;
  return `<div class="quiz-wrap">
  <div class="qz-timer">
    <span class="qz-tlbl">⏱ الوقت المتبقي</span>
    <span class="qz-tval" id="qt-${li}">--:--</span>
  </div>
  <div class="qz-bar-wrap"><div class="qz-bar" id="qb-${li}"></div></div>
  ${qs.map((q,i)=>`
  <div class="q-card" style="animation-delay:${i*.04}s">
    <div class="q-txt">س${i+1}: ${q.question}</div>
    ${q.image?`<img src="${q.image}" class="q-img">`:""}
    ${q.options.map((o,oi)=>`
    <div class="q-opt" id="qo-${li}-${i}-${oi}" onclick="pickAns(${li},${i},${oi+1})">
      <input type="radio" name="qq${li}_${i}" style="width:auto;margin:0;accent-color:var(--primary);">
      <span>${o}</span>
    </div>`).join("")}
  </div>`).join("")}
  <button class="qz-submit" onclick="submitQuiz(${li})">إنهاء الامتحان ✅</button>
  </div>`;
}

function pickAns(li,qi,val){
  quizAns[qi]=val;
  const n=quizData.questions[qi].options.length;
  for(let oi=0;oi<n;oi++){
    const d=document.getElementById(`qo-${li}-${qi}-${oi}`);
    if(d){ d.classList.toggle("sel",oi+1===val); d.querySelector("input").checked=oi+1===val; }
  }
}

function startTimer(li){
  clearInterval(qTimer);
  qTimer=setInterval(()=>{
    qLeft--;
    const m=Math.floor(qLeft/60),s=qLeft%60;
    const te=document.getElementById(`qt-${li}`);
    const be=document.getElementById(`qb-${li}`);
    if(te) te.innerText=`${m<10?"0"+m:m}:${s<10?"0"+s:s}`;
    if(be){ be.style.width=((qLeft/qTotal)*100)+"%"; be.style.background=qLeft<60?"#c62828":"var(--primary)"; }
    if(qLeft<=0){ clearInterval(qTimer); submitQuiz(li); }
  },1000);
}

function submitQuiz(li){
  clearInterval(qTimer); qTimer=null;
  const qs=quizData.questions;
  const un=qs.filter((_,i)=>!quizAns[i]).length;
  if(un>0&&!confirm(`لم تجب على ${un} سؤال. هل تريد الإنهاء؟`)) return;
  let sc=0;
  qs.forEach((q,i)=>{ if(quizAns[i]===q.answer) sc++; });
  const pct=Math.round((sc/qs.length)*100);
  const col=pct>=70?"#2e7d32":pct>=50?"#e65100":"#c62828";
  const emo=pct>=70?"🎉":pct>=50?"👍":"📚";
  const msg=pct>=70?"أحسنت! نتيجة ممتازة 🌟":pct>=50?"نتيجة جيدة، يمكنك التحسين":"راجع المادة وحاول مجدداً";
  document.getElementById(`qbody-${li}`).innerHTML=`
  <div class="res-wrap">
    <div style="font-size:64px;margin-bottom:8px;">${emo}</div>
    <div class="res-score" style="color:${col}">${sc}/${qs.length}</div>
    <div class="res-pct" style="color:${col}">${pct}%</div>
    <p class="res-msg">${msg}</p>
    <div class="res-qa">
    ${qs.map((q,i)=>{
      const ch=quizAns[i],ok=ch===q.answer;
      return `<div class="rqa ${ok?'rqa-ok':'rqa-no'}">
        <div class="rqa-q">س${i+1}: ${q.question}</div>
        <div class="rqa-a" style="color:${ok?'#2e7d32':'#c62828'}">${ok?'✅':'❌'} إجابتك: ${ch?q.options[ch-1]:'لم تجب'}</div>
        ${!ok?`<div class="rqa-a" style="color:#2e7d32">✅ الصحيحة: ${q.options[q.answer-1]}</div>`:''}
      </div>`;
    }).join("")}
    </div>
  </div>`;
}
