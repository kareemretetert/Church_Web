<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محتوى الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--primary:#6a1b9a;
--primary-dark:#4a148c;
--accent:#c62828;
--bg:#f0f4ff;
--card:#fff;
--text:#222;
--muted:#6b7280;
--lecture-header:#c62828;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:var(--bg);
min-height:100vh;
}

/* HEADER */
header{
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
padding:22px 15px;
text-align:center;
}

header h1{
font-size:clamp(18px,4vw,26px);
font-weight:800;
}

.back-btn{
display:inline-block;
margin-top:10px;
padding:8px 20px;
border:2px solid white;
border-radius:20px;
color:white;
text-decoration:none;
font-size:13px;
cursor:pointer;
background:none;
font-family:'Cairo',sans-serif;
transition:0.3s;
}

.back-btn:hover{background:rgba(255,255,255,0.2);}

/* COURSE INFO */
.course-info{
max-width:900px;
margin:20px auto 0;
padding:0 15px;
}

.info-card{
background:var(--card);
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.info-cover{
width:100%;
max-height:220px;
object-fit:cover;
display:block;
}

.info-body{
padding:18px;
}

.info-title{
font-size:20px;
font-weight:800;
color:var(--text);
}

.info-desc{
color:var(--muted);
font-size:14px;
margin-top:6px;
line-height:1.6;
}

.info-meta{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.badge{
padding:5px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.badge-purple{background:#ede7f6;color:#6a1b9a;}
.badge-blue{background:#e3f2fd;color:#1565c0;}
.badge-green{background:#e8f5e9;color:#2e7d32;}

/* CONTENT */
.content{
max-width:900px;
margin:20px auto 50px;
padding:0 15px;
}

/* LECTURE BLOCK — بنفس شكل الصورة */
.lecture-block{
background:var(--card);
border-radius:18px;
overflow:hidden;
margin-bottom:16px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
animation:fadeUp 0.4s;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

/* RED HEADER like in image */
.lecture-header{
background:linear-gradient(135deg,#c62828,#b71c1c);
color:white;
padding:16px 18px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
user-select:none;
}

.lecture-header:hover{
background:linear-gradient(135deg,#b71c1c,#a61c1c);
}

.lecture-header-right{
flex:1;
}

.lecture-num{
font-size:11px;
opacity:0.8;
margin-bottom:3px;
}

.lecture-name{
font-size:17px;
font-weight:800;
}

.lecture-topics{
margin-top:8px;
display:flex;
flex-wrap:wrap;
gap:5px;
}

.topic-tag{
background:rgba(255,255,255,0.2);
padding:3px 10px;
border-radius:10px;
font-size:11px;
}

.lecture-arrow{
font-size:18px;
transition:0.3s;
margin-top:3px;
}

.lecture-arrow.open{
transform:rotate(180deg);
}

/* LESSONS INSIDE */
.lecture-body{
padding:0;
}

.lesson-row{
display:flex;
align-items:center;
gap:14px;
padding:14px 18px;
border-bottom:1px solid #f0f0f0;
cursor:pointer;
transition:0.2s;
flex-wrap:wrap;
}

.lesson-row:last-child{border-bottom:none;}

.lesson-row:hover{
background:#faf5ff;
}

.lesson-icon{
width:42px;height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
flex-shrink:0;
}

.icon-video{background:#e3f2fd;}
.icon-image{background:#e8f5e9;}
.icon-file{background:#fff3e0;}
.icon-text{background:#fce4ec;}

.lesson-info{
flex:1;
min-width:150px;
}

.lesson-name{
font-size:15px;
font-weight:700;
color:var(--text);
}

.lesson-type-label{
font-size:12px;
color:var(--muted);
margin-top:2px;
}

.lesson-arrow{
color:#bbb;
font-size:16px;
}

/* QUIZ ROW */
.quiz-row{
display:flex;
align-items:center;
gap:14px;
padding:14px 18px;
background:#fff8e1;
border-top:2px solid #ffe082;
cursor:pointer;
transition:0.2s;
text-decoration:none;
}

.quiz-row:hover{background:#fff3cd;}

.quiz-icon{
width:42px;height:42px;
border-radius:12px;
background:#ffe082;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.quiz-info{flex:1;}
.quiz-name{font-size:15px;font-weight:700;color:#e65100;}
.quiz-sub{font-size:12px;color:#888;}

/* CONTENT VIEWER */
.viewer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.92);
z-index:9999;
display:none;
flex-direction:column;
animation:fadeIn 0.3s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.viewer.open{display:flex;}

.viewer-header{
background:linear-gradient(135deg,#6a1b9a,#4a148c);
color:white;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.viewer-title{
font-size:16px;
font-weight:700;
flex:1;
}

.viewer-close{
background:rgba(255,255,255,0.2);
border:none;
color:white;
padding:7px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
font-family:'Cairo',sans-serif;
transition:0.3s;
}

.viewer-close:hover{background:rgba(255,255,255,0.35);}

.viewer-body{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

/* VIDEO */
.video-wrapper{
width:100%;
max-width:800px;
position:relative;
padding-bottom:56.25%;
height:0;
border-radius:14px;
overflow:hidden;
background:#000;
}

.video-wrapper iframe{
position:absolute;
top:0;left:0;
width:100%;height:100%;
border:none;
}

/* IMAGE VIEWER */
.viewer-body img.full-img{
max-width:100%;
max-height:80vh;
border-radius:14px;
object-fit:contain;
}

/* FILE VIEWER */
.file-viewer{
width:100%;
max-width:800px;
height:75vh;
border-radius:14px;
border:none;
background:#fff;
}

/* TEXT VIEWER */
.text-content{
background:#fff;
border-radius:14px;
padding:24px;
max-width:700px;
width:100%;
font-size:16px;
line-height:1.9;
color:var(--text);
white-space:pre-wrap;
}

/* LOADER */
.spinner{
width:50px;height:50px;
border:5px solid rgba(255,255,255,0.2);
border-top:5px solid #fff;
border-radius:50%;
animation:spin 0.8s linear infinite;
margin:40px auto;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY LECTURE */
.empty-lessons{
text-align:center;
padding:20px;
color:var(--muted);
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:600px){
.lesson-row{padding:12px 14px;gap:10px;}
.lecture-header{padding:14px;}
.lesson-name{font-size:14px;}
header{padding:18px 12px;}
}
</style>
</head>
<body>

<header>
<h1 id="courseName">📚 محتوى الكورس</h1>
<button class="back-btn" onclick="history.back()">⬅ العودة</button>
</header>

<div class="course-info" id="courseInfoSection"></div>

<div class="content" id="lecturesContent">
<div style="text-align:center;padding:50px;color:var(--muted);">
<div class="spinner" style="border-top-color:#6a1b9a;border-color:#ddd;border-top-color:#6a1b9a;"></div>
<p>جاري تحميل المحتوى...</p>
</div>
</div>

<!-- CONTENT VIEWER OVERLAY -->
<div class="viewer" id="contentViewer">
<div class="viewer-header">
<span class="viewer-title" id="viewerTitle">الدرس</span>
<button class="viewer-close" onclick="closeViewer()">✕ إغلاق</button>
</div>
<div class="viewer-body" id="viewerBody"></div>
</div>

<script>
const courseIndex = localStorage.getItem("courseIndex");
let course = null;

async function loadCourse(){
try{
const res = await fetch("courses.json");
const all = await res.json();
course = all[courseIndex];
if(!course){ document.getElementById("lecturesContent").innerHTML = `<p style="text-align:center;color:red;">الكورس غير موجود</p>`; return; }
renderCourse();
}catch(e){
document.getElementById("lecturesContent").innerHTML = `<p style="text-align:center;color:red;">خطأ في تحميل الكورس</p>`;
}
}

function renderCourse(){
// Title
document.getElementById("courseName").innerText = "📚 " + course.title;
document.title = course.title;

// Info card
const infoSec = document.getElementById("courseInfoSection");
const lectCount = course.lectures ? course.lectures.length : 0;
let lessCount = 0;
if(course.lectures) course.lectures.forEach(l=>{ if(l.lessons) lessCount += l.lessons.length; });

infoSec.innerHTML = `
<div class="info-card">
${course.cover ? `<img src="${course.cover}" class="info-cover" alt="${course.title}">` : ""}
<div class="info-body">
<div class="info-title">${course.title}</div>
${course.desc ? `<div class="info-desc">${course.desc}</div>` : ""}
<div class="info-meta">
<span class="badge badge-purple">📖 ${lectCount} محاضرة</span>
<span class="badge badge-blue">📌 ${lessCount} درس</span>
</div>
</div>
</div>`;

// Lectures
const content = document.getElementById("lecturesContent");
if(!course.lectures || !course.lectures.length){
content.innerHTML = `<div style="text-align:center;padding:50px;color:var(--muted);">📭 لا يوجد محتوى بعد</div>`;
return;
}

content.innerHTML = course.lectures.map((lec,li)=>{
const lessons = lec.lessons || [];
const hasQuiz = lec.quiz && lec.quiz.url;

// topics
const topicsHtml = lec.topics
? lec.topics.split('\n').filter(Boolean).map(t=>`<span class="topic-tag">${t}</span>`).join("")
: "";

// lessons rows
const lessonsHtml = lessons.length
? lessons.map((ls,si)=>{
const icons = {video:"🎬",image:"🖼",file:"📄",text:"📝"};
const iconClasses = {video:"icon-video",image:"icon-image",file:"icon-file",text:"icon-text"};
const typeLabels = {video:"فيديو",image:"صورة",file:"ملف PDF",text:"نص تعليمي"};
return `
<div class="lesson-row" onclick="openLesson(${li},${si})">
<div class="lesson-icon ${iconClasses[ls.type]||'icon-text'}">${icons[ls.type]||'📌'}</div>
<div class="lesson-info">
<div class="lesson-name">${ls.title}</div>
<div class="lesson-type-label">${typeLabels[ls.type]||ls.type}</div>
</div>
<span class="lesson-arrow">‹</span>
</div>`;
}).join("")
: `<div class="empty-lessons">لا توجد دروس في هذه المحاضرة بعد</div>`;

// quiz row
const quizHtml = hasQuiz ? `
<a href="${lec.quiz.url}" class="quiz-row">
<div class="quiz-icon">📝</div>
<div class="quiz-info">
<div class="quiz-name">${lec.quiz.name || "الامتحان"}</div>
<div class="quiz-sub">اضغط لبدء الامتحان</div>
</div>
<span style="color:#e65100;font-size:16px;">‹</span>
</a>` : "";

return `
<div class="lecture-block">
<div class="lecture-header" onclick="toggleLecture(${li})">
<div class="lecture-header-right">
<div class="lecture-num">المحاضرة ${li+1}</div>
<div class="lecture-name">${lec.title}</div>
${topicsHtml ? `<div class="lecture-topics">${topicsHtml}</div>` : ""}
</div>
<div class="lecture-arrow" id="arrow-${li}">▼</div>
</div>
<div class="lecture-body" id="lecture-body-${li}">
${lessonsHtml}
${quizHtml}
</div>
</div>`;
}).join("");
}

function toggleLecture(li){
const body = document.getElementById(`lecture-body-${li}`);
const arrow = document.getElementById(`arrow-${li}`);
const isOpen = body.style.display !== "none";
body.style.display = isOpen ? "none" : "block";
arrow.classList.toggle("open", !isOpen);
}

// =====================
// 📺 OPEN LESSON VIEWER
// =====================
function openLesson(li,si){
const ls = course.lectures[li].lessons[si];
document.getElementById("viewerTitle").innerText = ls.title;
document.getElementById("viewerBody").innerHTML = getViewerContent(ls);
document.getElementById("contentViewer").classList.add("open");
document.body.style.overflow = "hidden";
}

function getViewerContent(ls){
if(ls.type === "video"){
const url = ls.videoUrl || "";
// support youtube
let embedUrl = url;
const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]+)/);
if(ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?rel=0`;

return `
<div class="video-wrapper" style="max-width:800px;width:100%;">
<iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
</div>`;
}

if(ls.type === "image"){
return `<img src="${ls.imageUrl||''}" class="full-img" alt="${ls.title}">`;
}

if(ls.type === "file"){
return `<iframe src="${ls.fileUrl||''}" class="file-viewer"></iframe>`;
}

if(ls.type === "text"){
return `<div class="text-content">${(ls.text||"").replace(/\n/g,"<br>")}</div>`;
}

return `<p style="color:#fff;">لا يوجد محتوى</p>`;
}

function closeViewer(){
document.getElementById("contentViewer").classList.remove("open");
document.getElementById("viewerBody").innerHTML = "";
document.body.style.overflow = "";
}

// close on ESC
document.addEventListener("keydown",e=>{
if(e.key === "Escape") closeViewer();
});

loadCourse();
</script>
</body>
</html>
