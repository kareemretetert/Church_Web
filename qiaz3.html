<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة المتاهة الصعبة</title>

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#e3f2fd,#ffffff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.game-shell{
  width:95%;
  max-width:900px;
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  position:relative;
}

h1{
  text-align:center;
  color:#0d47a1;
  margin-bottom:10px;
}

/* رسائل الفوز والخسارة */
.message{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  padding:25px 40px;
  border-radius:20px;
  font-size:1.5rem;
  font-weight:800;
  color:#fff;
  display:none;
  z-index:10;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:pop 0.4s ease forwards;
}

@keyframes pop{
  to{transform:translate(-50%,-50%) scale(1);}
}

#win-message{
  background:linear-gradient(135deg,#00c853,#2e7d32);
}

#lose-message{
  background:linear-gradient(135deg,#d50000,#b71c1c);
}

canvas{
  border:4px solid #0d47a1;
  border-radius:12px;
  display:block;
  margin:auto;
  background:#fff;
}

/* التايمر */
.timer{
  text-align:center;
  font-size:1.2rem;
  font-weight:bold;
  margin-bottom:10px;
  color:#333;
}

.controls{
  text-align:center;
  margin-top:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#1565c0;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0d47a1;
}
</style>
</head>

<body>

<div class="game-shell">
<h1>متاهة التحدي 😈</h1>

<div class="timer" id="timerText">05:00</div>

<div id="win-message" class="message">🎉 برافو! وصلت للنهاية</div>
<div id="lose-message" class="message">⏰ الوقت انتهى!</div>

<canvas id="mazeCanvas" width="600" height="600"></canvas>

<div class="controls">
<button onclick="setup()">إعادة اللعب</button>
</div>

</div>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

const rows = 35;
const cols = 35;
const cellSize = canvas.width / cols;

let grid=[];
let player={x:0,y:0};
let end={x:cols-1,y:rows-1};

let timeLeft=300;
let timerInterval;
let gameEnded=false;

class Cell{
  constructor(x,y){
    this.x=x;this.y=y;
    this.walls=[true,true,true,true];
    this.visited=false;
  }
  draw(){
    const px=this.x*cellSize;
    const py=this.y*cellSize;

    ctx.strokeStyle="#222";
    ctx.lineWidth=2;

    if(this.walls[0]) line(px,py,px+cellSize,py);
    if(this.walls[1]) line(px+cellSize,py,px+cellSize,py+cellSize);
    if(this.walls[2]) line(px+cellSize,py+cellSize,px,py+cellSize);
    if(this.walls[3]) line(px,py+cellSize,px,py);
  }
}

function line(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

function getCell(x,y){
  if(x<0||y<0||x>=cols||y>=rows) return null;
  return grid[y*cols+x];
}

function removeWalls(a,b){
  const dx=b.x-a.x;
  const dy=b.y-a.y;

  if(dx===1){a.walls[1]=false;b.walls[3]=false;}
  if(dx===-1){a.walls[3]=false;b.walls[1]=false;}
  if(dy===1){a.walls[2]=false;b.walls[0]=false;}
  if(dy===-1){a.walls[0]=false;b.walls[2]=false;}
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// توليد المتاهة (مسار واحد صحيح)
function generateMaze(){
  grid=[];
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      grid.push(new Cell(x,y));
    }
  }

  let stack=[];
  let start=getCell(0,0);
  start.visited=true;
  stack.push(start);

  while(stack.length){
    let current=stack[stack.length-1];
    let neighbors=[];

    const dirs=[
      getCell(current.x,current.y-1),
      getCell(current.x+1,current.y),
      getCell(current.x,current.y+1),
      getCell(current.x-1,current.y)
    ];

    dirs.forEach(n=>{if(n&&!n.visited) neighbors.push(n)});

    if(neighbors.length){
      let next=shuffle(neighbors)[0];
      next.visited=true;
      removeWalls(current,next);
      stack.push(next);
    }else{
      stack.pop();
    }
  }
}

// loops قليلة
function addLoops(prob=0.05){
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      let cell=getCell(x,y);

      if(Math.random()<prob){
        let right=getCell(x+1,y);
        if(right) removeWalls(cell,right);
      }

      if(Math.random()<prob){
        let bottom=getCell(x,y+1);
        if(bottom) removeWalls(cell,bottom);
      }
    }
  }
}

// خداع قرب النهاية
function fakePaths(){
  for(let i=0;i<40;i++){
    let x=cols-2-Math.floor(Math.random()*6);
    let y=rows-2-Math.floor(Math.random()*6);

    let cell=getCell(x,y);

    let n=[
      getCell(x+1,y),
      getCell(x-1,y),
      getCell(x,y+1),
      getCell(x,y-1)
    ];

    n.forEach(c=>{
      if(c && Math.random()<0.3){
        removeWalls(cell,c);
      }
    });
  }
}

// رسم
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  grid.forEach(c=>c.draw());

  // النهاية ⭐
  ctx.fillStyle="#ffca28";
  ctx.beginPath();
  ctx.arc(end.x*cellSize+cellSize/2,end.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
  ctx.fill();

  // اللاعب
  ctx.fillStyle="#1e88e5";
  ctx.beginPath();
  ctx.arc(player.x*cellSize+cellSize/2,player.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
  ctx.fill();
}

// الحركة
document.addEventListener("keydown",e=>{
  if(gameEnded) return;

  let dx=0,dy=0;
  if(e.key==="ArrowUp") dy=-1;
  if(e.key==="ArrowDown") dy=1;
  if(e.key==="ArrowLeft") dx=-1;
  if(e.key==="ArrowRight") dx=1;

  let cell=getCell(player.x,player.y);
  let dir = dx===1?1:dx===-1?3:dy===1?2:0;

  if(!cell.walls[dir]){
    player.x+=dx;
    player.y+=dy;
  }

  if(player.x===end.x && player.y===end.y){
    gameEnded=true;
    document.getElementById("win-message").style.display="block";
    clearInterval(timerInterval);
  }

  draw();
});

// تايمر
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gameEnded) return;

    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=String(timeLeft%60).padStart(2,'0');

    document.getElementById("timerText").textContent=`${m}:${s}`;

    if(timeLeft<=0){
      gameEnded=true;
      document.getElementById("lose-message").style.display="block";
      clearInterval(timerInterval);
    }
  },1000);
}

// البداية
function setup(){
  player={x:0,y:0};
  end={x:cols-1,y:rows-1};

  timeLeft=300;
  gameEnded=false;

  document.getElementById("win-message").style.display="none";
  document.getElementById("lose-message").style.display="none";

  generateMaze();
  addLoops(0.05);
  fakePaths();

  draw();
  startTimer();
}

setup();
</script>

</body>
</html>
