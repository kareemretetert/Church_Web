<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <meta content="Kareem Hosny" name="author"/>
  <meta content="كريم حسني, الكنيسة, العزية, اجتماع ثانوي" name="keywords"/>
  <meta content="الموقع معمول بكل حب لمساعدة وخدمة الكنيسة بواسطة كريم حسني" name="description"/>
  <link href="imgsfile/icon.png" rel="icon" type="image/x-icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>لعبة المتاهة</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6a1b9a;
      --primary-dark: #4a148c;
      --bg: #eef8ff;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #5b6472;
      --blue: #1e88e5;
      --blue-dark: #1565c0;
      --warning: #fb8c00;
      --danger: #e53935;
      --shadow: 0 12px 30px rgba(0, 64, 128, 0.15);
    }

    body {
      min-height: 100vh;
      font-family: 'Cairo', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(106, 27, 154, 0.08), transparent 22%),
        linear-gradient(180deg, #f8fcff 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    .game-shell {
      width: min(950px, 100%);
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(106, 27, 154, 0.10);
      border-radius: 26px;
      box-shadow: 0 18px 40px rgba(40, 50, 90, 0.12);
      padding: 22px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .title-box h1 {
      font-size: 1.8rem;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }

    .title-box p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.8;
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid rgba(106, 27, 154, 0.12);
      border-radius: 20px;
      padding: 10px 14px;
      box-shadow: 0 10px 25px rgba(74, 20, 140, 0.08);
    }

    .timer-box {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }

    .timer-box svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-track {
      fill: none;
      stroke: #e8eef7;
      stroke-width: 10;
    }

    .timer-progress {
      fill: none;
      stroke: var(--blue);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
    }

    .timer-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .time-text {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--blue-dark);
      line-height: 1;
    }

    .time-label {
      margin-top: 5px;
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 700;
    }

    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    canvas {
      border: 4px solid #0f4c81;
      background-color: white;
      border-radius: 16px;
      box-shadow: var(--shadow);
      touch-action: none;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 11px 22px;
      font-size: 1rem;
      border: none;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s ease;
      font-family: inherit;
      font-weight: 700;
      box-shadow: 0 10px 18px rgba(30, 136, 229, 0.18);
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    #win-message,
    #lose-message {
      display: none;
      width: fit-content;
      max-width: 100%;
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      animation: pop 0.5s ease forwards;
    }

    #win-message {
      background: #28a745;
      color: #fff;
    }

    #lose-message {
      background: #e53935;
      color: #fff;
    }

    @keyframes pop {
      0% { transform: scale(0.88); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 700px) {
      .game-shell {
        padding: 16px;
      }

      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .timer-wrap {
        justify-content: center;
      }

      .title-box {
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .timer-box {
        width: 84px;
        height: 84px;
      }

      .title-box h1 {
        font-size: 1.45rem;
      }

      .title-box p {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="top-bar">
      <div class="title-box">
        <h1>لعبة المتاهة</h1>
        <p>في طريق واحد فقط للنهاية، لكن فيه تفريعات كتير مضللة من أول اللعبة لآخرها.</p>
      </div>

      <div class="timer-wrap">
        <div class="timer-box">
          <svg viewBox="0 0 100 100">
            <circle class="timer-track" cx="50" cy="50" r="42"></circle>
            <circle class="timer-progress" id="timerProgress" cx="50" cy="50" r="42"></circle>
          </svg>
          <div class="timer-content">
            <div class="time-text" id="timerText">5:00</div>
            <div class="time-label">الوقت</div>
          </div>
        </div>
      </div>
    </div>

    <div class="game-area">
      <div id="win-message">برافو! وصلت للنهاية ✅</div>
      <div id="lose-message">انتهى الوقت ⏰ جرّب مرة تانية</div>
      <canvas id="mazeCanvas" width="540" height="540"></canvas>

      <div class="controls">
        <button class="action-btn" onclick="restartGame()">إعادة اللعب</button>
        <button class="action-btn" onclick="history.back()">العودة</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');

    const timerText = document.getElementById('timerText');
    const timerProgress = document.getElementById('timerProgress');
    const winMessage = document.getElementById('win-message');
    const loseMessage = document.getElementById('lose-message');

    const rows = 20;
    const cols = 20;
    const cellSize = canvas.width / cols;

    const TOTAL_TIME = 300;
    let timeLeft = TOTAL_TIME;
    let timerInterval;
    let gameEnded = false;

    let player = { x: 0, y: 0 };
    let grid = [];
    let keysPressed = {};
    let dragging = false;
    let lastTouchTime = 0;
    let lastTouch = null;

    const finishImage = new Image();
    finishImage.src = 'imgsfile/game/jes.png';

    const radius = 42;
    const circumference = 2 * Math.PI * radius;
    timerProgress.style.strokeDasharray = circumference;
    timerProgress.style.strokeDashoffset = 0;

    class Cell {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.walls = [true, true, true, true]; // top right bottom left
        this.inMainPath = false;
      }

      draw() {
        const x = this.x * cellSize;
        const y = this.y * cellSize;

        ctx.strokeStyle = '#2d3748';
        ctx.lineWidth = 2;

        if (this.walls[0]) drawLine(x, y, x + cellSize, y);
        if (this.walls[1]) drawLine(x + cellSize, y, x + cellSize, y + cellSize);
        if (this.walls[2]) drawLine(x + cellSize, y + cellSize, x, y + cellSize);
        if (this.walls[3]) drawLine(x, y + cellSize, x, y);
      }
    }

    function drawLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function index(x, y) {
      return y * cols + x;
    }

    function getCell(x, y) {
      if (x < 0 || y < 0 || x >= cols || y >= rows) return null;
      return grid[index(x, y)];
    }

    function resetGrid() {
      grid = [];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          grid.push(new Cell(x, y));
        }
      }
    }

    function removeWalls(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;

      if (dx === 1) {
        a.walls[1] = false;
        b.walls[3] = false;
      } else if (dx === -1) {
        a.walls[3] = false;
        b.walls[1] = false;
      } else if (dy === 1) {
        a.walls[2] = false;
        b.walls[0] = false;
      } else if (dy === -1) {
        a.walls[0] = false;
        b.walls[2] = false;
      }
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getNeighbors(cell) {
      const dirs = [
        { dx: 0, dy: -1 },
        { dx: 1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: -1, dy: 0 }
      ];

      const result = [];
      for (const d of dirs) {
        const nx = cell.x + d.dx;
        const ny = cell.y + d.dy;
        const neighbor = getCell(nx, ny);
        if (neighbor) result.push(neighbor);
      }
      return result;
    }

    function manhattan(x1, y1, x2, y2) {
      return Math.abs(x1 - x2) + Math.abs(y1 - y2);
    }

    // نبني مسار رئيسي طويل جدًا وبالتراجع
    function buildMainPath() {
      const start = getCell(0, 0);
      const end = getCell(cols - 1, rows - 1);

      let bestPath = null;
      let bestLength = -1;

      for (let attempt = 0; attempt < 140; attempt++) {
        const visited = new Set();
        const path = [];

        function dfs(cell) {
          visited.add(index(cell.x, cell.y));
          path.push(cell);

          if (cell === end) {
            if (path.length > bestLength) {
              bestLength = path.length;
              bestPath = [...path];
            }
            path.pop();
            visited.delete(index(cell.x, cell.y));
            return;
          }

          let neighbors = getNeighbors(cell).filter(n => !visited.has(index(n.x, n.y)));

          neighbors.sort((a, b) => {
            const scoreA = manhattan(a.x, a.y, end.x, end.y) + Math.random() * 6;
            const scoreB = manhattan(b.x, b.y, end.x, end.y) + Math.random() * 6;
            return scoreB - scoreA;
          });

          for (const next of neighbors) {
            dfs(next);
          }

          path.pop();
          visited.delete(index(cell.x, cell.y));
        }

        dfs(start);
      }

      if (!bestPath) bestPath = [start, end];

      for (let i = 0; i < bestPath.length - 1; i++) {
        const current = bestPath[i];
        const next = bestPath[i + 1];
        current.inMainPath = true;
        next.inMainPath = true;
        removeWalls(current, next);
      }

      return bestPath;
    }

    function cellHasAnyOpening(cell) {
      return cell.walls.some(w => w === false);
    }

    function countOpenWalls(cell) {
      return cell.walls.filter(w => !w).length;
    }

    // نعمل تفريعات طويلة مضللة طالعة من المسار الرئيسي
    function createBranch(startCell, usedSet, maxLength, preferNearGoal = false) {
      let current = startCell;
      let previous = null;
      let length = 0;

      while (length < maxLength) {
        let neighbors = getNeighbors(current).filter(n => {
          if (usedSet.has(index(n.x, n.y))) return false;
          return true;
        });

        if (neighbors.length === 0) break;

        neighbors.sort((a, b) => {
          const goalX = cols - 1;
          const goalY = rows - 1;
          const da = manhattan(a.x, a.y, goalX, goalY);
          const db = manhattan(b.x, b.y, goalX, goalY);

          if (preferNearGoal) {
            return da - db;
          }
          return Math.random() - 0.5;
        });

        const next = neighbors[0];

        removeWalls(current, next);
        usedSet.add(index(next.x, next.y));

        previous = current;
        current = next;
        length++;

        // أحيانًا نطلع منه فرع فرعي صغير يضلل أكتر
        if (length > 2 && Math.random() < 0.33) {
          createMiniDeadEnd(current, usedSet, 2 + Math.floor(Math.random() * 3));
        }
      }
    }

    function createMiniDeadEnd(fromCell, usedSet, steps) {
      let current = fromCell;

      for (let i = 0; i < steps; i++) {
        let neighbors = shuffle(getNeighbors(current)).filter(n => !usedSet.has(index(n.x, n.y)));
        if (!neighbors.length) break;

        const next = neighbors[0];
        removeWalls(current, next);
        usedSet.add(index(next.x, next.y));
        current = next;
      }
    }

    function generateMaze() {
      resetGrid();

      const mainPath = buildMainPath();
      const usedSet = new Set(mainPath.map(c => index(c.x, c.y)));

      // نفتح من البداية أكتر من طريق واضح
      const earlyPathCells = mainPath.slice(1, Math.min(7, mainPath.length - 1));
      const start = getCell(0, 0);

      // فرعين كبار قريبين من البداية
      for (let i = 0; i < earlyPathCells.length; i++) {
        if (Math.random() < 0.8) {
          const anchor = earlyPathCells[i];
          const neighbors = shuffle(getNeighbors(anchor)).filter(n => !usedSet.has(index(n.x, n.y)));
          if (neighbors.length) {
            const branchStart = neighbors[0];
            removeWalls(anchor, branchStart);
            usedSet.add(index(branchStart.x, branchStart.y));
            createBranch(branchStart, usedSet, 5 + Math.floor(Math.random() * 6), false);
          }
        }
      }

      // فرع مباشر من البداية نفسها لو أمكن
      let startNeighbors = shuffle(getNeighbors(start)).filter(n => {
        if (usedSet.has(index(n.x, n.y))) return false;
        return true;
      });

      if (startNeighbors.length) {
        const branchStart = startNeighbors[0];
        removeWalls(start, branchStart);
        usedSet.add(index(branchStart.x, branchStart.y));
        createBranch(branchStart, usedSet, 7 + Math.floor(Math.random() * 5), false);
      }

      // تفريعات على طول الطريق الصحيح
      for (let i = 2; i < mainPath.length - 2; i++) {
        const cell = mainPath[i];

        let chance = 0.45;
        if (i < 6) chance = 0.7;
        if (i > mainPath.length * 0.7) chance = 0.65;

        if (Math.random() < chance) {
          const neighbors = shuffle(getNeighbors(cell)).filter(n => !usedSet.has(index(n.x, n.y)));
          if (neighbors.length) {
            const branchStart = neighbors[0];
            removeWalls(cell, branchStart);
            usedSet.add(index(branchStart.x, branchStart.y));

            const nearGoal = i > mainPath.length * 0.65;
            const branchLength = nearGoal
              ? 6 + Math.floor(Math.random() * 6)
              : 3 + Math.floor(Math.random() * 7);

            createBranch(branchStart, usedSet, branchLength, nearGoal);
          }
        }
      }

      // تفريعات خادعة قرب النهاية جدًا لكنها لا تدخل خلية النهاية نفسها
      const nearEndCells = mainPath.slice(Math.max(0, mainPath.length - 8), mainPath.length - 1);

      for (const cell of nearEndCells) {
        if (Math.random() < 0.85) {
          const neighbors = shuffle(getNeighbors(cell)).filter(n => {
            if (n.x === cols - 1 && n.y === rows - 1) return false;
            return !usedSet.has(index(n.x, n.y));
          });

          if (neighbors.length) {
            const branchStart = neighbors[0];
            removeWalls(cell, branchStart);
            usedSet.add(index(branchStart.x, branchStart.y));
            createBranch(branchStart, usedSet, 4 + Math.floor(Math.random() * 5), true);
          }
        }
      }
    }

    function drawMaze() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      grid.forEach(cell => cell.draw());

      ctx.drawImage(
        finishImage,
        (cols - 1) * cellSize + 4,
        (rows - 1) * cellSize + 4,
        cellSize - 8,
        cellSize - 8
      );

      drawPlayer();
    }

    function drawPlayer() {
      const x = player.x * cellSize;
      const y = player.y * cellSize;

      ctx.fillStyle = '#1e88e5';
      ctx.beginPath();
      ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize / 3.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function updateTimerUI() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerText.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;

      const progressRatio = timeLeft / TOTAL_TIME;
      timerProgress.style.strokeDashoffset = circumference * (1 - progressRatio);

      if (timeLeft <= 45) {
        timerProgress.style.stroke = '#e53935';
        timerText.style.color = '#c62828';
      } else if (timeLeft <= 90) {
        timerProgress.style.stroke = '#fb8c00';
        timerText.style.color = '#ef6c00';
      } else {
        timerProgress.style.stroke = '#1e88e5';
        timerText.style.color = '#1565c0';
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (gameEnded) return;

        timeLeft--;
        updateTimerUI();

        if (timeLeft <= 0) {
          timeLeft = 0;
          updateTimerUI();
          endGame(false);
        }
      }, 1000);
    }

    function endGame(won) {
      gameEnded = true;
      clearInterval(timerInterval);

      if (won) {
        winMessage.style.display = 'block';
        loseMessage.style.display = 'none';
      } else {
        loseMessage.style.display = 'block';
        winMessage.style.display = 'none';
      }
    }

    function setup() {
      winMessage.style.display = 'none';
      loseMessage.style.display = 'none';

      player = { x: 0, y: 0 };
      gameEnded = false;
      timeLeft = TOTAL_TIME;

      generateMaze();
      updateTimerUI();
      drawMaze();
      startTimer();
    }

    function restartGame() {
      setup();
    }

    function movePlayer(dx, dy) {
      if (gameEnded) return;

      const newX = player.x + dx;
      const newY = player.y + dy;

      if (newX < 0 || newY < 0 || newX >= cols || newY >= rows) return;

      const current = getCell(player.x, player.y);
      const dir = dx === 1 ? 1 : dx === -1 ? 3 : dy === 1 ? 2 : 0;

      if (!current.walls[dir]) {
        player.x = newX;
        player.y = newY;
        drawMaze();

        if (player.x === cols - 1 && player.y === rows - 1) {
          endGame(true);
        }
      }
    }

    document.addEventListener('keydown', e => {
      keysPressed[e.key] = true;
    });

    document.addEventListener('keyup', e => {
      delete keysPressed[e.key];
    });

    setInterval(() => {
      if (gameEnded) return;

      if (keysPressed['ArrowUp']) movePlayer(0, -1);
      else if (keysPressed['ArrowDown']) movePlayer(0, 1);
      else if (keysPressed['ArrowLeft']) movePlayer(-1, 0);
      else if (keysPressed['ArrowRight']) movePlayer(1, 0);
    }, 120);

    canvas.addEventListener('touchstart', e => {
      dragging = true;
      lastTouch = e.touches[0];
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      const now = Date.now();
      if (now - lastTouchTime < 110) return;
      lastTouchTime = now;

      if (!dragging || gameEnded) return;

      const newTouch = e.touches[0];
      const dx = newTouch.clientX - lastTouch.clientX;
      const dy = newTouch.clientY - lastTouch.clientY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      const threshold = 6;

      if (absX > threshold || absY > threshold) {
        if (absX > absY) {
          if (dx > 0) movePlayer(1, 0);
          else movePlayer(-1, 0);
        } else {
          if (dy > 0) movePlayer(0, 1);
          else movePlayer(0, -1);
        }
        lastTouch = newTouch;
      }
    }, { passive: true });

    canvas.addEventListener('touchend', () => {
      dragging = false;
    });

    finishImage.onload = setup;
    finishImage.onerror = setup;
  </script>
</body>
</html>
