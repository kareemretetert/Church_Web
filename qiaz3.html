<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة المتاهة الصعبة</title>

<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#eaf7ff;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.game-shell{width:90%;max-width:900px;background:#fff;border-radius:24px;padding:20px;box-shadow:0 14px 35px rgba(0,64,128,0.14);}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.title-box h1{color:#004080;font-size:1.9rem;margin-bottom:4px;}
.timer-box{position:relative;width:110px;height:110px;}
.timer-box svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-track{fill:none;stroke:#dbe8f5;stroke-width:10;}
.timer-progress{fill:none;stroke:#1e88e5;stroke-width:10;stroke-linecap:round;}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;color:#1565c0;}
canvas{border:4px solid #004080;background:#fff;border-radius:14px;max-width:100%;}
.message{display:none;padding:14px;border-radius:14px;font-weight:800;text-align:center;color:#fff;}
#win-message{background:#28a745;}
#lose-message{background:#e53935;}
.controls{display:flex;gap:10px;justify-content:center;margin-top:10px;}
button{padding:10px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer;}
</style>
</head>

<body>
<div class="game-shell">

<div class="top-bar">
  <h1>متاهة مجنونة 😈</h1>
  <div class="timer-box">
    <svg viewBox="0 0 100 100">
      <circle class="timer-track" cx="50" cy="50" r="42"></circle>
      <circle class="timer-progress" id="timerProgress" cx="50" cy="50" r="42"></circle>
    </svg>
    <div class="timer-text">
      <span id="timerText">5:00</span>
    </div>
  </div>
</div>

<div id="win-message" class="message">برافو! وصلت للنهاية ✅</div>
<div id="lose-message" class="message">انتهى الوقت ⏰</div>

<canvas id="mazeCanvas" width="600" height="600"></canvas>

<div class="controls">
  <button onclick="setup()">إعادة اللعب</button>
</div>

</div>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

const rows = 35;
const cols = 35;
const cellSize = canvas.width / cols;

let grid = [];
let player = {x:0,y:0};
let end = {x:0,y:0};

let timeLeft = 300;
let timerInterval;
let gameEnded = false;

class Cell{
  constructor(x,y){
    this.x=x;this.y=y;
    this.walls=[true,true,true,true];
    this.visited=false;
  }
  draw(){
    const px=this.x*cellSize;
    const py=this.y*cellSize;
    ctx.strokeStyle="#000";
    if(this.walls[0]) line(px,py,px+cellSize,py);
    if(this.walls[1]) line(px+cellSize,py,px+cellSize,py+cellSize);
    if(this.walls[2]) line(px+cellSize,py+cellSize,px,py+cellSize);
    if(this.walls[3]) line(px,py+cellSize,px,py);
  }
}

function line(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

function getCell(x,y){
  if(x<0||y<0||x>=cols||y>=rows) return null;
  return grid[y*cols+x];
}

function removeWalls(a,b){
  const dx=b.x-a.x;
  const dy=b.y-a.y;
  if(dx===1){a.walls[1]=false;b.walls[3]=false;}
  if(dx===-1){a.walls[3]=false;b.walls[1]=false;}
  if(dy===1){a.walls[2]=false;b.walls[0]=false;}
  if(dy===-1){a.walls[0]=false;b.walls[2]=false;}
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// توليد المتاهة
function generateMaze(){
  grid=[];
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      grid.push(new Cell(x,y));
    }
  }

  let stack=[];
  let start=getCell(0,0);
  start.visited=true;
  stack.push(start);

  while(stack.length){
    let current=stack[stack.length-1];
    let neighbors=[];

    const dirs=[
      getCell(current.x,current.y-1),
      getCell(current.x+1,current.y),
      getCell(current.x,current.y+1),
      getCell(current.x-1,current.y)
    ];

    dirs.forEach(n=>{if(n&&!n.visited) neighbors.push(n)});

    if(neighbors.length){
      let next=shuffle(neighbors)[0];
      next.visited=true;
      removeWalls(current,next);
      stack.push(next);
    }else{
      stack.pop();
    }
  }
}

// إضافة التشعبات
function addLoops(prob=0.18){
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      let cell=getCell(x,y);

      if(Math.random()<prob){
        let right=getCell(x+1,y);
        if(right) removeWalls(cell,right);
      }

      if(Math.random()<prob){
        let bottom=getCell(x,y+1);
        if(bottom) removeWalls(cell,bottom);
      }
    }
  }
}

// رسم
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  grid.forEach(c=>c.draw());

  // النهاية
  ctx.fillStyle="green";
  ctx.fillRect(end.x*cellSize+5,end.y*cellSize+5,cellSize-10,cellSize-10);

  // اللاعب
  ctx.fillStyle="blue";
  ctx.beginPath();
  ctx.arc(player.x*cellSize+cellSize/2,player.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
  ctx.fill();
}

// حركة
document.addEventListener("keydown",e=>{
  if(gameEnded) return;

  let dx=0,dy=0;
  if(e.key==="ArrowUp") dy=-1;
  if(e.key==="ArrowDown") dy=1;
  if(e.key==="ArrowLeft") dx=-1;
  if(e.key==="ArrowRight") dx=1;

  let cell=getCell(player.x,player.y);
  let dir = dx===1?1:dx===-1?3:dy===1?2:0;

  if(!cell.walls[dir]){
    player.x+=dx;
    player.y+=dy;
  }

  if(player.x===end.x && player.y===end.y){
    gameEnded=true;
    document.getElementById("win-message").style.display="block";
    clearInterval(timerInterval);
  }

  draw();
});

// تايمر
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gameEnded) return;

    timeLeft--;
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timerText").textContent=`${m}:${s}`;

    if(timeLeft<=0){
      gameEnded=true;
      document.getElementById("lose-message").style.display="block";
      clearInterval(timerInterval);
    }
  },1000);
}

// البداية
function setup(){
  player={x:0,y:0};
  timeLeft=300;
  gameEnded=false;

  document.getElementById("win-message").style.display="none";
  document.getElementById("lose-message").style.display="none";

  generateMaze();
  addLoops(0.18);

  // نهاية عشوائية
  end={
    x:Math.floor(Math.random()*cols),
    y:Math.floor(Math.random()*rows)
  };

  draw();
  startTimer();
}

setup();
</script>

</body>
</html>
