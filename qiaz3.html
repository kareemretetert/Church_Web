<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة المتاهة الصعبة</title>

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#eaf7ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.game-shell{
width:90%;
max-width:900px;
background:#fff;
border-radius:24px;
padding:20px;
box-shadow:0 14px 35px rgba(0,64,128,0.14);
position:relative;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.title-box h1{
color:#004080;
font-size:1.9rem;
margin-bottom:4px;
}

.timer-box{
position:relative;
width:110px;
height:110px;
}

.timer-box svg{
width:100%;
height:100%;
transform:rotate(-90deg);
}

.timer-track{
fill:none;
stroke:#dbe8f5;
stroke-width:10;
}

.timer-progress{
fill:none;
stroke:#1e88e5;
stroke-width:10;
stroke-linecap:round;
transition:stroke-dashoffset 1s linear,stroke 0.3s ease;
}

.timer-text{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:800;
color:#1565c0;
}

canvas{
border:4px solid #004080;
background:#fff;
border-radius:14px;
max-width:100%;
display:block;
margin:auto;
}

/* رسائل الفوز والخسارة */
.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
padding:22px 40px;
border-radius:18px;
font-size:1.4rem;
font-weight:800;
text-align:center;
color:#fff;
display:none;
z-index:5;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
animation:popup .35s ease forwards;
}

@keyframes popup{
to{transform:translate(-50%,-50%) scale(1);}
}

#win-message{
background:linear-gradient(135deg,#28a745,#1b7c31);
}

#lose-message{
background:linear-gradient(135deg,#e53935,#b71c1c);
}

.controls{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
margin-top:15px;
}

.action-btn{
padding:10px 22px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#1e88e5 0%,#1565c0 100%);
color:white;
font-family:inherit;
font-size:1rem;
font-weight:700;
cursor:pointer;
transition:0.25s ease;
}

.action-btn:hover{
transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="game-shell">

<div class="top-bar">
<div class="title-box">
<h1>لعبة المتاهة الصعبة</h1>
</div>

<div class="timer-box">
<svg viewBox="0 0 100 100">
<circle class="timer-track" cx="50" cy="50" r="42"></circle>
<circle class="timer-progress" id="timerProgress" cx="50" cy="50" r="42"></circle>
</svg>
<div class="timer-text">
<span id="timerText">5:00</span>
</div>
</div>
</div>

<div id="win-message" class="message">🎉 برافو! وصلت للنهاية</div>
<div id="lose-message" class="message">⏰ انتهى الوقت</div>

<canvas id="mazeCanvas" width="600" height="600"></canvas>

<div class="controls">
<button class="action-btn" onclick="setup()">إعادة اللعب</button>
</div>

</div>

<script>
const canvas=document.getElementById('mazeCanvas');
const ctx=canvas.getContext('2d');

const rows=35;
const cols=35;
const cellSize=canvas.width/cols;

const TOTAL_TIME=300;
let timeLeft=TOTAL_TIME;
let timerInterval=null;
let gameEnded=false;

let grid=[];
let player={x:0,y:0};
let end={x:cols-1,y:rows-1};

const timerText=document.getElementById('timerText');
const timerProgress=document.getElementById('timerProgress');
const winMessage=document.getElementById('win-message');
const loseMessage=document.getElementById('lose-message');

const radius=42;
const circumference=2*Math.PI*radius;
timerProgress.style.strokeDasharray=circumference;
timerProgress.style.strokeDashoffset=0;

class Cell{
constructor(x,y){
this.x=x;
this.y=y;
this.walls=[true,true,true,true];
this.visited=false;
}
draw(){
const px=this.x*cellSize;
const py=this.y*cellSize;
ctx.strokeStyle='#2d3748';
ctx.lineWidth=2;

if(this.walls[0])line(px,py,px+cellSize,py);
if(this.walls[1])line(px+cellSize,py,px+cellSize,py+cellSize);
if(this.walls[2])line(px+cellSize,py+cellSize,px,py+cellSize);
if(this.walls[3])line(px,py+cellSize,px,py);
}
}

function line(x1,y1,x2,y2){
ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();
}

function getCell(x,y){
if(x<0||y<0||x>=cols||y>=rows)return null;
return grid[y*cols+x];
}

function removeWalls(a,b){
const dx=b.x-a.x;
const dy=b.y-a.y;

if(dx===1){a.walls[1]=false;b.walls[3]=false;}
if(dx===-1){a.walls[3]=false;b.walls[1]=false;}
if(dy===1){a.walls[2]=false;b.walls[0]=false;}
if(dy===-1){a.walls[0]=false;b.walls[2]=false;}
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function generateMaze(){
grid=[];
for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
grid.push(new Cell(x,y));
}
}

let stack=[];
let start=getCell(0,0);
start.visited=true;
stack.push(start);

while(stack.length){
let current=stack[stack.length-1];
let neighbors=[];

const dirs=[
getCell(current.x,current.y-1),
getCell(current.x+1,current.y),
getCell(current.x,current.y+1),
getCell(current.x-1,current.y)
];

dirs.forEach(n=>{if(n&&!n.visited)neighbors.push(n)});

if(neighbors.length){
let next=shuffle(neighbors)[0];
next.visited=true;
removeWalls(current,next);
stack.push(next);
}else{
stack.pop();
}
}
}

/* loops قليلة */
function addLoops(prob=0.05){
for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
let cell=getCell(x,y);

if(Math.random()<prob){
let right=getCell(x+1,y);
if(right)removeWalls(cell,right);
}

if(Math.random()<prob){
let bottom=getCell(x,y+1);
if(bottom)removeWalls(cell,bottom);
}
}
}
}

/* خداع قرب النهاية */
function fakePaths(){
for(let i=0;i<40;i++){
let x=cols-2-Math.floor(Math.random()*6);
let y=rows-2-Math.floor(Math.random()*6);
let cell=getCell(x,y);

let n=[
getCell(x+1,y),
getCell(x-1,y),
getCell(x,y+1),
getCell(x,y-1)
];

n.forEach(c=>{
if(c && Math.random()<0.3){
removeWalls(cell,c);
}
});
}
}

function drawMaze(){
ctx.clearRect(0,0,canvas.width,canvas.height);
grid.forEach(c=>c.draw());

/* النهاية ⭐ */
ctx.fillStyle='#ffca28';
ctx.beginPath();
ctx.arc(end.x*cellSize+cellSize/2,end.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
ctx.fill();

/* اللاعب */
ctx.fillStyle='#1e88e5';
ctx.beginPath();
ctx.arc(player.x*cellSize+cellSize/2,player.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);
ctx.fill();
}

function movePlayer(dx,dy){
if(gameEnded)return;

const newX=player.x+dx;
const newY=player.y+dy;

if(newX<0||newY<0||newX>=cols||newY>=rows)return;

const current=getCell(player.x,player.y);
const dir=dx===1?1:dx===-1?3:dy===1?2:0;

if(!current.walls[dir]){
player.x=newX;
player.y=newY;

if(player.x===end.x && player.y===end.y){
gameEnded=true;
clearInterval(timerInterval);
winMessage.style.display='block';
}
}

drawMaze();
}

document.addEventListener('keydown',e=>{
if(e.key==="ArrowUp")movePlayer(0,-1);
if(e.key==="ArrowDown")movePlayer(0,1);
if(e.key==="ArrowLeft")movePlayer(-1,0);
if(e.key==="ArrowRight")movePlayer(1,0);
});

function updateTimerUI(){
const m=Math.floor(timeLeft/60);
const s=timeLeft%60;
timerText.textContent=`${m}:${String(s).padStart(2,'0')}`;
const ratio=timeLeft/TOTAL_TIME;
timerProgress.style.strokeDashoffset=circumference*(1-ratio);
}

function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
if(gameEnded)return;

timeLeft--;
if(timeLeft<0)timeLeft=0;

updateTimerUI();

if(timeLeft===0){
gameEnded=true;
loseMessage.style.display='block';
clearInterval(timerInterval);
}
},1000);
}

function setup(){
player={x:0,y:0};
end={x:cols-1,y:rows-1};
timeLeft=TOTAL_TIME;
gameEnded=false;

winMessage.style.display='none';
loseMessage.style.display='none';

generateMaze();
addLoops(0.05);
fakePaths();

updateTimerUI();
drawMaze();
startTimer();
}

setup();
</script>

</body>
</html>
