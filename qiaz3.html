<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متاهة احترافية</title>

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#eaf7ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.game-shell{
width:95%;
max-width:500px;
background:#fff;
border-radius:20px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

canvas{
width:100%;
height:auto;
border:3px solid #004080;
border-radius:10px;
}

/* رسائل */
.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px;
border-radius:15px;
font-weight:bold;
display:none;
color:#fff;
z-index:5;
}

#win-message{background:#28a745;}
#lose-message{background:#e53935;}

/* أزرار الموبايل */
.controls{
display:grid;
grid-template-columns:60px 60px 60px;
justify-content:center;
gap:10px;
margin-top:10px;
}

.btn{
padding:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
}
</style>
</head>

<body>

<div class="game-shell">
<canvas id="mazeCanvas" width="500" height="500"></canvas>

<div id="win-message" class="message">🎉 فزت!</div>
<div id="lose-message" class="message">⏰ انتهى الوقت</div>

<div class="controls">
<div></div>
<button class="btn" onclick="move(0,-1)">⬆</button>
<div></div>
<button class="btn" onclick="move(-1,0)">⬅</button>
<button class="btn" onclick="move(0,1)">⬇</button>
<button class="btn" onclick="move(1,0)">➡</button>
</div>
</div>

<script>
const canvas=document.getElementById("mazeCanvas");
const ctx=canvas.getContext("2d");

const rows=30, cols=30;
const size=canvas.width/cols;

let grid=[];
let player={x:0,y:0};
let end={x:cols-1,y:rows-1};

class Cell{
constructor(x,y){
this.x=x;this.y=y;
this.walls=[true,true,true,true];
this.visited=false;
}
}

function get(x,y){
if(x<0||y<0||x>=cols||y>=rows)return null;
return grid[y*cols+x];
}

function remove(a,b){
const dx=b.x-a.x,dy=b.y-a.y;
if(dx==1){a.walls[1]=b.walls[3]=false;}
if(dx==-1){a.walls[3]=b.walls[1]=false;}
if(dy==1){a.walls[2]=b.walls[0]=false;}
if(dy==-1){a.walls[0]=b.walls[2]=false;}
}

function generate(){
grid=[];
for(let y=0;y<rows;y++)
for(let x=0;x<cols;x++)
grid.push(new Cell(x,y));

let stack=[get(0,0)];
stack[0].visited=true;

while(stack.length){
let c=stack[stack.length-1];
let n=[get(c.x+1,c.y),get(c.x-1,c.y),get(c.x,c.y+1),get(c.x,c.y-1)]
.filter(v=>v&&!v.visited);

if(n.length){
let next=n[Math.floor(Math.random()*n.length)];
next.visited=true;
remove(c,next);
stack.push(next);
}else stack.pop();
}
}

/* نجيب المسار الصحيح */
function getPath(){
let queue=[[0,0]];
let visited={};
let parent={};

while(queue.length){
let [x,y]=queue.shift();
if(x==end.x && y==end.y) break;

let cell=get(x,y);

[[0,-1,0],[1,0,1],[0,1,2],[-1,0,3]].forEach(([dx,dy,dir])=>{
if(!cell.walls[dir]){
let nx=x+dx,ny=y+dy;
let key=nx+","+ny;
if(!visited[key]){
visited[key]=true;
parent[key]=[x,y];
queue.push([nx,ny]);
}
}
});
}

let path=[];
let cur=[end.x,end.y];
while(cur){
path.push(cur);
cur=parent[cur[0]+","+cur[1]];
}
return path;
}

/* فروع مقفولة */
function addDeadEnds(path){
path.forEach(([x,y])=>{
if(Math.random()<0.6){

let dir=[[1,0],[-1,0],[0,1],[0,-1]]
[Math.floor(Math.random()*4)];

let nx=x+dir[0],ny=y+dir[1];
let start=get(nx,ny);

if(start && start.walls.every(w=>w)){ // غير مستخدم
remove(get(x,y),start);

// نمد الفرع
let current=start;
for(let i=0;i<Math.random()*8+5;i++){
let opts=[
get(current.x+1,current.y),
get(current.x-1,current.y),
get(current.x,current.y+1),
get(current.x,current.y-1)
].filter(c=>c && c.walls.every(w=>w));

if(!opts.length) break;

let next=opts[Math.floor(Math.random()*opts.length)];
remove(current,next);
current=next;
}
}
}
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

grid.forEach(c=>{
let x=c.x*size,y=c.y*size;
ctx.strokeStyle="#000";

if(c.walls[0]) line(x,y,x+size,y);
if(c.walls[1]) line(x+size,y,x+size,y+size);
if(c.walls[2]) line(x+size,y+size,x,y+size);
if(c.walls[3]) line(x,y+size,x,y);
});

// النهاية
ctx.fillStyle="gold";
ctx.fillRect(end.x*size+5,end.y*size+5,size-10,size-10);

// اللاعب
ctx.fillStyle="blue";
ctx.beginPath();
ctx.arc(player.x*size+size/2,player.y*size+size/2,size/3,0,Math.PI*2);
ctx.fill();
}

function line(x1,y1,x2,y2){
ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}

function move(dx,dy){
let cell=get(player.x,player.y);
let dir=dx==1?1:dx==-1?3:dy==1?2:0;

if(!cell.walls[dir]){
player.x+=dx;
player.y+=dy;
}

if(player.x==end.x && player.y==end.y){
document.getElementById("win-message").style.display="block";
}

draw();
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp")move(0,-1);
if(e.key=="ArrowDown")move(0,1);
if(e.key=="ArrowLeft")move(-1,0);
if(e.key=="ArrowRight")move(1,0);
});

function setup(){
player={x:0,y:0};

generate();
let path=getPath();
addDeadEnds(path);

draw();
}

setup();
</script>

</body>
</html>
