<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الحضور والغياب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Cairo',sans-serif;direction:rtl;
  padding:16px;min-height:100vh;
  background:linear-gradient(-45deg,#667eea,#764ba2,#43cea2,#185a9d);
  background-size:400% 400%;
  animation:gradBG 10s ease infinite;
  overflow-x:hidden;
}
@keyframes gradBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── GLASS SECTION ── */
.section{
  max-width:900px;margin:0 auto 18px;padding:20px;border-radius:20px;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(16px);
  box-shadow:0 10px 40px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.22);
  animation:fadeIn .4s both;
}
h1{text-align:center;color:#fff;font-size:clamp(20px,4vw,28px);font-weight:800;margin-bottom:4px;}
.subtitle{text-align:center;color:rgba(255,255,255,.75);font-size:14px;margin-bottom:16px;}

h2{color:#fff;font-size:18px;font-weight:700;margin-bottom:12px;}
label{display:block;margin-top:10px;color:#eee;font-weight:600;font-size:14px;}
input,select{
  width:100%;margin-top:5px;padding:12px 14px;border-radius:12px;border:none;
  background:rgba(255,255,255,.92);font-size:15px;font-family:'Cairo',sans-serif;
  transition:.25s;
}
input:focus,select:focus{transform:scale(1.01);box-shadow:0 0 0 3px rgba(255,255,255,.4);outline:none;}

/* ── BUTTONS ── */
button{
  width:100%;margin-top:12px;padding:13px;border:none;border-radius:14px;
  cursor:pointer;font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;transition:.25s;
}
button:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(0,0,0,.25);}
button:active{transform:scale(.98);}
.btn-danger{background:linear-gradient(135deg,#ff416c,#ff4b2b);}
.btn-success{background:linear-gradient(135deg,#43cea2,#185a9d);}
.btn-warn{background:linear-gradient(135deg,#f7971e,#ffd200);color:#333;}
.btn-pdf{background:linear-gradient(135deg,#8e44ad,#3498db);}
.btn-small{
  margin-top:0;padding:7px 14px;width:auto;font-size:13px;border-radius:10px;
  display:inline-flex;align-items:center;gap:5px;
}

/* ── STATS BAR ── */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stat-box{
  flex:1;min-width:90px;background:rgba(255,255,255,.18);border-radius:14px;
  padding:10px 14px;text-align:center;
}
.stat-box .num{font-size:26px;font-weight:800;color:#fff;}
.stat-box .lbl{font-size:12px;color:rgba(255,255,255,.8);}

/* ── CLASS CARD ── */
.class-card{
  background:rgba(255,255,255,.93);border-radius:18px;padding:18px;
  margin-bottom:18px;box-shadow:0 6px 24px rgba(0,0,0,.15);
  animation:fadeIn .4s both;
}
.class-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:14px;
}
.class-title{font-size:18px;font-weight:800;color:#1e293b;}
.class-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* ── SORT BAR ── */
.sort-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;
}
.sort-bar span{font-size:13px;color:#64748b;font-weight:600;}
.sort-btn{
  padding:5px 14px;font-size:12px;border-radius:20px;border:1.5px solid #cbd5e1;
  background:#f8fafc;color:#475569;cursor:pointer;font-family:'Cairo',sans-serif;
  font-weight:600;transition:.2s;margin-top:0;width:auto;
}
.sort-btn.active{background:#6a1b9a;color:#fff;border-color:#6a1b9a;}
.sort-btn:hover{background:#ede7f6;border-color:#9c27b0;}

/* ── MEMBER LIST ── */
.member-list{display:flex;flex-direction:column;gap:6px;}
.member-row{
  display:flex;align-items:center;gap:10px;
  background:#f8fafc;border-radius:12px;padding:10px 14px;
  border:1.5px solid #e2e8f0;transition:.2s;
}
.member-row:hover{background:#ede7f6;border-color:#9c27b0;}
.member-num{
  width:28px;height:28px;border-radius:50%;background:#6a1b9a;
  color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.member-name{flex:1;font-size:15px;font-weight:600;color:#1e293b;}
.member-stats{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.badge{
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;
}
.badge-present{background:#dcfce7;color:#166534;}
.badge-absent{background:#fee2e2;color:#991b1b;}
.badge-rate{background:#ede7f6;color:#5b21b6;}

/* ── ATTEND BTN ── */
.attend-btn{
  width:36px;height:36px;border-radius:10px;border:2px solid #e2e8f0;
  background:#f1f5f9;cursor:pointer;font-size:18px;display:flex;
  align-items:center;justify-content:center;transition:.2s;margin:0;padding:0;
  flex-shrink:0;
}
.attend-btn:hover{transform:scale(1.12);}
.attend-btn.present{background:#dcfce7;border-color:#22c55e;}
.attend-btn.absent{background:#fee2e2;border-color:#ef4444;}
.attend-btn.neutral{background:#f1f5f9;border-color:#cbd5e1;}

/* ── HISTORY ── */
.history-dots{display:flex;gap:4px;flex-wrap:wrap;}
.dot{
  width:16px;height:16px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;
  title:'';transition:.2s;
}
.dot-p{background:#22c55e;}
.dot-a{background:#ef4444;}
.dot-n{background:#cbd5e1;}
.dot:hover{transform:scale(1.3);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;
  display:none;justify-content:center;align-items:center;padding:16px;
}
.modal-bg.open{display:flex;}
.modal{
  background:#fff;border-radius:20px;padding:24px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation:fadeIn .3s both;
}
.modal h3{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:16px;text-align:center;}
.modal label{color:#374151;font-size:14px;}
.modal input{background:#f8fafc;border:1.5px solid #e2e8f0;font-family:'Cairo',sans-serif;}
.modal input:focus{border-color:#6a1b9a;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions button{flex:1;}

/* ── HISTORY MODAL ── */
.hist-week{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid #f1f5f9;font-size:14px;
}
.hist-week:last-child{border-bottom:none;}
.hist-date{flex:1;color:#475569;font-weight:600;}
.hist-status{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;}
.hist-p{background:#dcfce7;color:#166534;}
.hist-a{background:#fee2e2;color:#991b1b;}

/* ── NO DATA ── */
.no-data{text-align:center;color:rgba(255,255,255,.6);padding:30px;font-size:15px;}
.no-members{text-align:center;color:#94a3b8;padding:20px;font-size:14px;}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;
  display:none;justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
.spinner{width:50px;height:50px;border:5px solid rgba(255,255,255,.2);border-top:5px solid #00c6ff;border-radius:50%;animation:spin .8s linear infinite;}
#loader p{color:#fff;font-size:18px;font-family:'Cairo',sans-serif;}

/* ── MOBILE ── */
@media(max-width:600px){
  body{padding:10px;}
  .member-row{flex-wrap:wrap;}
  .history-dots{margin-top:4px;}
  .class-title{font-size:16px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="section">
  <h1>⛪ لوحة الحضور والغياب</h1>
  <p class="subtitle">كنيسة السيدة العذراء مريم</p>

  <div class="stats-row" id="globalStats">
    <div class="stat-box"><div class="num" id="gs-classes">0</div><div class="lbl">فصول</div></div>
    <div class="stat-box"><div class="num" id="gs-members">0</div><div class="lbl">مخدومين</div></div>
    <div class="stat-box"><div class="num" id="gs-weeks">0</div><div class="lbl">أسابيع</div></div>
    <div class="stat-box"><div class="num" id="gs-rate">0%</div><div class="lbl">معدل حضور</div></div>
  </div>

  <!-- ADD CLASS -->
  <div style="display:flex;gap:10px;align-items:flex-end;">
    <div style="flex:1;">
      <label>اسم الفصل الجديد</label>
      <input id="newClassName" placeholder="مثال: فصل المرحلة الإعدادية">
    </div>
    <button class="btn-success btn-small" style="padding:12px 20px;margin-top:0;align-self:flex-end;width:auto;" onclick="addClass()">➕ إضافة فصل</button>
  </div>
</div>

<!-- CLASSES CONTAINER -->
<div id="classesContainer">
  <div class="no-data">لا يوجد فصول بعد — أضف فصلاً جديداً أعلاه</div>
</div>

<!-- ══ MODALS ══ -->

<!-- Add/Edit Member Modal -->
<div class="modal-bg" id="memberModal">
  <div class="modal">
    <h3 id="memberModalTitle">إضافة مخدوم جديد</h3>
    <label>الاسم الكامل *</label>
    <input id="memberName" placeholder="الاسم الكامل">
    <label>السن (اختياري)</label>
    <input id="memberAge" type="number" placeholder="مثال: 14">
    <label>ملاحظات (اختياري)</label>
    <input id="memberNotes" placeholder="أي معلومة إضافية">
    <div class="modal-actions">
      <button class="btn-success" onclick="saveMember()">💾 حفظ</button>
      <button class="btn-danger" onclick="closeModal('memberModal')">❌ إلغاء</button>
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-bg" id="historyModal">
  <div class="modal">
    <h3 id="historyTitle">سجل الحضور</h3>
    <div id="historyContent"></div>
    <button style="margin-top:14px;" onclick="closeModal('historyModal')">إغلاق</button>
  </div>
</div>

<!-- Attendance Session Modal -->
<div class="modal-bg" id="sessionModal">
  <div class="modal">
    <h3>تسجيل جلسة جديدة</h3>
    <label>تاريخ الجلسة</label>
    <input id="sessionDate" type="date">
    <div class="modal-actions">
      <button class="btn-success" onclick="startSession()">✅ بدء التسجيل</button>
      <button class="btn-danger" onclick="closeModal('sessionModal')">❌ إلغاء</button>
    </div>
  </div>
</div>
  <!-- Bulk Attendance Modal -->
<div class="modal-bg" id="bulkModal">
  <div class="modal">
    <h3>تسجيل الحضور الجماعي</h3>

    <label>تاريخ الجلسة</label>
    <input id="bulkDate" type="date">

    <div id="bulkList" style="margin-top:15px;"></div>

    <div class="modal-actions">
      <button class="btn-success" onclick="saveBulkAttendance()">💾 حفظ</button>
      <button class="btn-danger" onclick="closeModal('bulkModal')">❌ إلغاء</button>
    </div>
  </div>
</div>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div><p>جاري التحميل...</p></div>


  
<script>
/* ═══════════════════════════════════════
   DATA STRUCTURE
   classes: [{id, name, members:[{id,name,age,notes,attendance:{date:'P'|'A'}}]}]
═══════════════════════════════════════ */

const KEY = "church_attendance_v2";
let data = {classes:[]};
let editingMember = null;  /* {classId, memberId} or null */
let editingClass  = null;
let currentSessionClass = null;

/* ── LOAD / SAVE ── */
function load(){
  try{ data = JSON.parse(localStorage.getItem(KEY)) || {classes:[]}; }
  catch{ data = {classes:[]}; }
  if(!data.classes) data.classes = [];
}
function save(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

/* ── UTILS ── */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today(){ return new Date().toISOString().split('T')[0]; }
function formatDate(d){
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function getClass(cid){ return data.classes.find(c=>c.id===cid); }
function getMember(cid,mid){ const cl=getClass(cid); return cl?cl.members.find(m=>m.id===mid):null; }

function presentCount(m){ return Object.values(m.attendance||{}).filter(v=>v==='P').length; }
function absentCount(m){ return Object.values(m.attendance||{}).filter(v=>v==='A').length; }
function totalSessions(m){ return Object.keys(m.attendance||{}).length; }
function attendRate(m){
  const t=totalSessions(m); if(!t) return 0;
  return Math.round((presentCount(m)/t)*100);
}

function allDates(cls){
  const set=new Set();
  (cls.members||[]).forEach(m=>Object.keys(m.attendance||{}).forEach(d=>set.add(d)));
  return [...set].sort();
}

/* ── GLOBAL STATS ── */
function updateGlobalStats(){
  const total = data.classes.reduce((s,c)=>s+(c.members?.length||0),0);
  const allM  = data.classes.flatMap(c=>c.members||[]);
  const weeks = data.classes.reduce((s,c)=>Math.max(s,allDates(c).length),0);
  const rates = allM.map(attendRate);
  const avgRate = rates.length ? Math.round(rates.reduce((a,b)=>a+b,0)/rates.length) : 0;
  document.getElementById('gs-classes').innerText = data.classes.length;
  document.getElementById('gs-members').innerText = total;
  document.getElementById('gs-weeks').innerText   = weeks;
  document.getElementById('gs-rate').innerText    = avgRate + '%';
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderAll(){
  updateGlobalStats();
  const cont = document.getElementById('classesContainer');
  if(!data.classes.length){
    cont.innerHTML = '<div class="no-data">لا يوجد فصول بعد — أضف فصلاً جديداً أعلاه</div>';
    return;
  }
  cont.innerHTML = '';
  data.classes.forEach(cls=>cont.appendChild(buildClassCard(cls)));
}

function buildClassCard(cls){
  const div = document.createElement('div');
  div.className = 'section';
  div.id = 'class-'+cls.id;
  div.style.animationDelay = '.1s';

  const sortMode = cls._sort || 'alpha';
  const dates    = allDates(cls);
  const members  = sortMembers(cls.members||[], sortMode);

  div.innerHTML = `
  <div class="class-header">
    <div class="class-title">📚 ${cls.name}
      <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,.65);margin-right:8px;">(${members.length} مخدوم)</span>
    </div>
   <div class="class-actions">
  <button class="btn-success btn-small" onclick="openAddMember('${cls.id}')">➕ مخدوم</button>

  <button class="btn-success btn-small" onclick="openBulkAttendance('${cls.id}')">
    📋 تسجيل الحضور
  </button>

  <button class="btn-pdf btn-small" onclick="exportPDF('${cls.id}')">📄 PDF</button>
  <button class="btn-warn btn-small" onclick="openSession('${cls.id}')">📅 جلسة</button>
  <button class="btn-danger btn-small" onclick="deleteClass('${cls.id}')">🗑</button>
</div>
  </div>

  <div class="sort-bar">
    <span>ترتيب:</span>
    <button class="sort-btn ${sortMode==='alpha'?'active':''}" onclick="setSort('${cls.id}','alpha')">أبجدي</button>
    <button class="sort-btn ${sortMode==='present'?'active':''}" onclick="setSort('${cls.id}','present')">الأكثر حضوراً</button>
    <button class="sort-btn ${sortMode==='absent'?'active':''}" onclick="setSort('${cls.id}','absent')">الأكثر غياباً</button>
  </div>

  <div class="member-list" id="ml-${cls.id}">
    ${members.length ? members.map((m,i)=>buildMemberRow(cls.id,m,i+1,dates)).join('') : '<div class="no-members">لا يوجد مخدومين — أضف مخدوماً جديداً</div>'}
  </div>`;

  return div;
}

function buildMemberRow(cid, m, rank, dates){
  const p = presentCount(m);
  const a = absentCount(m);
  const r = attendRate(m);

  /* last 8 dates as dots */
  const recentDates = dates.slice(-8);
  const dots = recentDates.map(d=>{
    const v = (m.attendance||{})[d];
    const cls2 = v==='P'?'dot-p':v==='A'?'dot-a':'dot-n';
    const lbl  = v==='P'?'✓':v==='A'?'✗':'·';
    return `<div class="dot ${cls2}" title="${formatDate(d)}">${lbl}</div>`;
  }).join('');

  /* today session status */
  const todayVal = (m.attendance||{})[today()];
  const pClass   = todayVal==='P'?'present':todayVal==='A'?'absent':'neutral';
  const pIcon    = todayVal==='P'?'✓':todayVal==='A'?'✗':'○';

  return `
  <div class="member-row" id="mr-${cid}-${m.id}">
    <div class="member-num">${rank}</div>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span class="member-name">${m.name}</span>
        ${m.age?`<span style="font-size:12px;color:#94a3b8;">(${m.age})</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
        <span class="badge badge-present">✓ ${p}</span>
        <span class="badge badge-absent">✗ ${a}</span>
        <span class="badge badge-rate">${r}%</span>
        <div class="history-dots">${dots}</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
      <button class="attend-btn ${pClass}" onclick="quickAttend('${cid}','${m.id}','${today()}')" title="تسجيل حضور/غياب اليوم">${pIcon}</button>
      <button class="btn-small" style="background:linear-gradient(135deg,#8e44ad,#3498db);" onclick="showHistory('${cid}','${m.id}')">📋</button>
      <button class="btn-small btn-warn" onclick="openEditMember('${cid}','${m.id}')">✏️</button>
      <button class="btn-small btn-danger" onclick="deleteMember('${cid}','${m.id}')">🗑</button>
    </div>
  </div>`;
}

function sortMembers(members, mode){
  const arr = [...members];
  if(mode==='alpha')   arr.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
  if(mode==='present') arr.sort((a,b)=>presentCount(b)-presentCount(a));
  if(mode==='absent')  arr.sort((a,b)=>absentCount(b)-absentCount(a));
  return arr;
}

/* ═══════════════════════════════════════
   ACTIONS — CLASS
═══════════════════════════════════════ */
function addClass(){
  const name = document.getElementById('newClassName').value.trim();
  if(!name){ alert('اكتب اسم الفصل'); return; }
  data.classes.push({id:uid(), name, members:[], _sort:'alpha'});
  save();
  document.getElementById('newClassName').value = '';
  renderAll();
}

function deleteClass(cid){
  if(!confirm('هل تريد حذف هذا الفصل وكل بياناته؟')) return;
  data.classes = data.classes.filter(c=>c.id!==cid);
  save(); renderAll();
}

function setSort(cid, mode){
  const cls = getClass(cid); if(!cls) return;
  cls._sort = mode; save(); renderAll();
}

/* ═══════════════════════════════════════
   ACTIONS — MEMBER
═══════════════════════════════════════ */
function openAddMember(cid){
  editingMember = {cid, mid:null};
  document.getElementById('memberModalTitle').innerText = 'إضافة مخدوم جديد';
  document.getElementById('memberName').value  = '';
  document.getElementById('memberAge').value   = '';
  document.getElementById('memberNotes').value = '';
  openModal('memberModal');
}

function openEditMember(cid, mid){
  const m = getMember(cid, mid); if(!m) return;
  editingMember = {cid, mid};
  document.getElementById('memberModalTitle').innerText = 'تعديل بيانات المخدوم';
  document.getElementById('memberName').value  = m.name;
  document.getElementById('memberAge').value   = m.age||'';
  document.getElementById('memberNotes').value = m.notes||'';
  openModal('memberModal');
}

function saveMember(){
  const name  = document.getElementById('memberName').value.trim();
  const age   = document.getElementById('memberAge').value.trim();
  const notes = document.getElementById('memberNotes').value.trim();
  if(!name){ alert('اكتب اسم المخدوم'); return; }

  const cls = getClass(editingMember.cid); if(!cls) return;

  if(editingMember.mid){
    const m = getMember(editingMember.cid, editingMember.mid); if(!m) return;
    m.name=name; m.age=age; m.notes=notes;
  }else{
    cls.members.push({id:uid(),name,age,notes,attendance:{}});
  }
  save(); closeModal('memberModal'); renderAll();
}

function deleteMember(cid, mid){
  if(!confirm('هل تريد حذف هذا المخدوم؟')) return;
  const cls = getClass(cid); if(!cls) return;
  cls.members = cls.members.filter(m=>m.id!==mid);
  save(); renderAll();
}

/* ═══════════════════════════════════════
   ATTENDANCE
═══════════════════════════════════════ */
function quickAttend(cid, mid, date){
  const m = getMember(cid, mid); if(!m) return;
  if(!m.attendance) m.attendance={};
  const cur = m.attendance[date];
  /* cycle: none → P → A → none */
  if(!cur)      m.attendance[date] = 'P';
  else if(cur==='P') m.attendance[date] = 'A';
  else               delete m.attendance[date];
  save(); renderAll();
}

function openSession(cid){
  currentSessionClass = cid;
  document.getElementById('sessionDate').value = today();
  openModal('sessionModal');
}

function startSession(){
  const date = document.getElementById('sessionDate').value;
  if(!date){ alert('اختر التاريخ'); return; }
  const cls = getClass(currentSessionClass); if(!cls) return;

  /* ensure all members have an entry for this date (default neutral) */
  (cls.members||[]).forEach(m=>{
    if(!m.attendance) m.attendance={};
    /* don't override existing */
  });
  save(); closeModal('sessionModal');
  /* scroll to class */
  const el = document.getElementById('class-'+currentSessionClass);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  renderAll();
  alert(`✅ جلسة ${formatDate(date)} جاهزة — سجّل الحضور بالضغط على ○ بجانب كل اسم`);
}

/* bulk attendance for a session */
function markAllPresent(cid){
  const cls=getClass(cid); if(!cls) return;
  const d=today();
  (cls.members||[]).forEach(m=>{if(!m.attendance)m.attendance={};m.attendance[d]='P';});
  save();renderAll();
}

/* ═══════════════════════════════════════
   HISTORY
═══════════════════════════════════════ */
function showHistory(cid, mid){
  const m = getMember(cid, mid); if(!m) return;
  document.getElementById('historyTitle').innerText = `سجل حضور: ${m.name}`;
  const att = m.attendance || {};
  const dates = Object.keys(att).sort().reverse();

  if(!dates.length){
    document.getElementById('historyContent').innerHTML='<p style="text-align:center;color:#94a3b8;padding:16px;">لا يوجد سجل بعد</p>';
  }else{
    const p=presentCount(m),a=absentCount(m),r=attendRate(m);
    document.getElementById('historyContent').innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <span class="badge badge-present" style="font-size:13px;">حضر ${p} مرة</span>
      <span class="badge badge-absent" style="font-size:13px;">غاب ${a} مرة</span>
      <span class="badge badge-rate" style="font-size:13px;">معدل ${r}%</span>
    </div>
    ${dates.map(d=>`
    <div class="hist-week">
      <span class="hist-date">${formatDate(d)}</span>
      <span class="hist-status ${att[d]==='P'?'hist-p':'hist-a'}">${att[d]==='P'?'✓ حاضر':'✗ غائب'}</span>
    </div>`).join('')}`;
  }
  openModal('historyModal');
}

/* ═══════════════════════════════════════
   PDF EXPORT
═══════════════════════════════════════ */
function exportWeekPDF(){
  const date = document.getElementById("weekSelect").value;
  const cls = getClass(pdfClassId);

  const body = [
    ["#", "الاسم", "الحالة"]
  ];

  cls.members.forEach((m,i)=>{
    const val = (m.attendance||{})[date];

    const status =
      val === 'P' ? 'حاضر' :
      val === 'A' ? 'غايب' :
      '-';

    body.push([i+1, m.name, status]);
  });

  const docDefinition = {
    content: [
      {text: `سجل حضور - ${cls.name}`, style: "header"},
      {text: `التاريخ: ${formatDate(date)}`, margin:[0,0,0,10]},
      {
        table: {
          body: body
        }
      }
    ],
    defaultStyle: {
      font: "Roboto" // بيدعم العربي تلقائي
    }
  };

  pdfMake.createPdf(docDefinition).download(`attendance_${cls.name}_${date}.pdf`);

  closeModal("weekPdfModal");
}

/* ═══════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════ */
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

/* close modal on bg click */
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('open'); });
});

/* Enter key in class input */
document.getElementById('newClassName').addEventListener('keydown',e=>{
  if(e.key==='Enter') addClass();
});

  /* ═══════════════════════════════════════
   BULK ATTENDANCE (الحضور الجماعي)
═══════════════════════════════════════ */

let bulkClassId = null;

function openBulkAttendance(cid){
  bulkClassId = cid;

  const cls = getClass(cid);
  if(!cls) return;

  const date = today();
  document.getElementById("bulkDate").value = date;

  const list = document.getElementById("bulkList");

  list.innerHTML = cls.members.map(m => {

    const val = (m.attendance || {})[date];

    return `
      <div style="display:flex;justify-content:space-between;align-items:center;
                  background:#f8fafc;padding:10px;border-radius:10px;margin-bottom:8px;">
        
        <span>${m.name}</span>

        <div>
          <label>
            <input type="radio" name="att_${m.id}" value="P" ${val==='P'?'checked':''}> حاضر
          </label>

          <label style="margin-right:10px;">
            <input type="radio" name="att_${m.id}" value="A" ${val==='A'?'checked':''}> غائب
          </label>
        </div>
      </div>
    `;
  }).join("");

  openModal("bulkModal");
}

function saveBulkAttendance(){
  const date = document.getElementById("bulkDate").value;

  if(!date){
    alert("اختار التاريخ");
    return;
  }

  const cls = getClass(bulkClassId);
  if(!cls) return;

  cls.members.forEach(m=>{
    const selected = document.querySelector(`input[name="att_${m.id}"]:checked`);

    if(!m.attendance) m.attendance = {};

    if(selected){
      m.attendance[date] = selected.value;
    }
  });

  save();
  closeModal("bulkModal");
  renderAll();

  alert("✅ تم حفظ الحضور بنجاح");
}
