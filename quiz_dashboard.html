<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة إدارة الامتحانات</title>

<style>
body{
font-family:Tajawal, Tahoma;
direction:rtl;
margin:0;
padding:20px;

/* خلفية متحركة */
background: linear-gradient(-45deg, #667eea, #764ba2, #43cea2, #185a9d);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* كارد رئيسي */
.section{
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);

box-shadow:0 10px 40px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

/* عناوين */
h2{
text-align:center;
color:#fff;
margin-bottom:10px;
}

/* labels */
label{
display:block;
margin-top:12px;
color:#eee;
font-weight:bold;
}

/* inputs */
input{
width:100%;
margin-top:6px;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.9);
box-sizing:border-box;
font-size:15px;
transition:0.3s;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.5);
outline:none;
}

/* أزرار */
button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:bold;

background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}


.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

@media(max-width:600px){
.options{
grid-template-columns:1fr;
}
}

  
/* زرار رفع */
.upload-btn{
background: linear-gradient(135deg,#43cea2,#185a9d);
color:#fff;
text-align:center;
padding:14px;
border-radius:15px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.upload-btn:hover{
transform:scale(1.05);
}

.upload-text{
font-size:13px;
color:#ddd;
margin-top:5px;
text-align:center;
}


.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.modal-content input,
.modal-content select{
margin-top:10px;
}
  
  .questions-container{
margin-top:15px;
}

.q-card{
background:rgba(255,255,255,0.95);
padding:15px;
margin-top:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
cursor:grab;
transition:0.3s;
}
.q-card:hover{
transform:scale(1.02);
}

.q-actions{
display:flex;
gap:10px;
margin-top:10px;
}


select{
background: linear-gradient(135deg,#ffffff,#f1f1f1);
font-weight:bold;
}

select:hover{
transform:scale(1.02);
}


  .modal-content{
background: rgba(255,255,255,0.95);
backdrop-filter: blur(10px);
}

.modal-content input{
background:#fff;
}
  
.q-actions button{
flex:1;
padding:8px;
font-size:14px;
border-radius:10px;
}

.editBtn{
background:linear-gradient(135deg,#f7971e,#ffd200);
}

.deleteBtn{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* Animation */
.q-card{
animation:fade 0.4s;
}
  
/* كروت الامتحانات */
.card{
background:rgba(255,255,255,0.9);
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.deleteBtn{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}



.q-card.dragging{
opacity:0.5;
transform:scale(0.95);
}

.q-card{
transition:transform 0.2s, box-shadow 0.2s;
}



  

.q-header{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.q-text{
font-size:16px;
margin-bottom:10px;
}

.q-options{
list-style:none;
padding:0;
}

.q-options li{
background:#f1f1f1;
margin:5px 0;
padding:8px;
border-radius:8px;
}

.q-options li.correct{
background:#d4edda;
color:#155724;
font-weight:bold;
}

.q-img{
width:100%;
max-height:200px;
object-fit:cover;
border-radius:10px;
margin:10px 0;
}




  
.error{
background: linear-gradient(135deg,#43cea2,#185a9d);
color:#fff;
padding:10px;
border-radius:10px;
margin-top:10px;
display:none;
}
  
select{
width:100%;
margin-top:6px;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.9);
font-size:15px;
cursor:pointer;
transition:0.3s;
}

select:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.5);
outline:none;
}




.modal-content.big{
width:95%;
max-width:500px;
max-height:90vh;
overflow:auto;
border-radius:20px;
animation:fade 0.3s;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:15px;
}

.modal-actions button{
flex:1;
}

  

.card{
animation:fade 1s;
}


  .q-card.dragging{
opacity:0.5;
transform:scale(0.95);
}

.q-card{
transition:transform 0.2s, box-shadow 0.2s;
}
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
  
.spinner{
width:60px;
height:60px;
border:6px solid #eee;
border-top:6px solid #00c6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

#loader p{
color:white;
font-size:20px;
text-align:center;
}

/* موبايل */
@media (max-width:600px){
.section{
max-width:95%;
padding:15px;
}
}


/* تكبير للكومبيوتر */
.section{
max-width:1000px;
}

/* موبايل */
@media(max-width:768px){

body{
padding:10px;
}

.section{
max-width:100%;
padding:15px;
border-radius:15px;
}

input, select, button{
font-size:14px;
padding:10px;
}

h2{
font-size:18px;
}

}

/* شاشات كبيرة */
@media(min-width:1200px){
.section{
max-width:1100px;
}
}

  
</style>
</head>

<body>

<!-- إنشاء امتحان -->

<div class="section">

<h2>إنشاء امتحان جديد</h2>

<label>اسم الامتحان</label> <input id="quizTitle">

<label>وقت الامتحان (بالدقائق)</label> <input id="quizTime" type="number" value="30">

</div>

<!-- إضافة سؤال -->

<div class="section">

<h2>إضافة سؤال</h2>

<input id="question" placeholder="اكتب السؤال">

<label>صورة للسؤال (اختياري)</label>

<div class="upload-btn" onclick="document.getElementById('questionImage').click()">
اختيار صورة
</div>

<div class="upload-text" id="imgText">
لم يتم اختيار صورة
</div>

<input type="file" id="questionImage" accept="image/*" hidden>

<div class="options">

<label>اختيار 1</label>
<input id="opt1">

<label>اختيار 2</label>
<input id="opt2">

<label>اختيار 3 (اختياري)</label>
<input id="opt3">

<label>اختيار 4 (اختياري)</label>
<input id="opt4">

</div>

<label>الإجابة الصحيحة</label>
<select id="answerNumber">
<option value="">اختر الإجابة</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<button onclick="addQuestion()">إضافة السؤال</button>
<div id="errorBox" class="error"></div>
<p id="qCount">عدد الأسئلة: 0</p>

 <button onclick="toggleQuestions()" id="toggleBtn">
إخفاء الأسئلة
</button> 
<div id="questionsList"></div>
  
<button onclick="publishQuiz()">نشر الامتحان</button>

</div>

<!-- عرض الامتحانات -->

<div class="section">

<h2>الامتحانات الحالية</h2>

<div id="quizList"></div>

</div>


<script>
const password="kimo123"
const entered=prompt("ادخل كلمة المرور")

if(entered!==password){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>كلمة المرور غير صحيحة</h2>"
throw new Error("access denied")
}

let quizzes=[]
let questions=[]
let editIndex = null;
// تحميل الامتحانات
async function loadQuizzes(){
try{
const res=await fetch("quiz.json")
quizzes=await res.json()
renderQuiz()
}catch{
document.getElementById("quizList").innerHTML="لا يوجد امتحانات"
}
}
window.onload=loadQuizzes

// 📸 رفع صورة
async function uploadImage(file){

const url = "https://api.cloudinary.com/v1_1/ddiegmhji/image/upload"

const formData = new FormData()
formData.append("file", file)
formData.append("upload_preset", "my_upload")

const res = await fetch(url,{
method:"POST",
body:formData
})

const data = await res.json()

if(!data.secure_url) throw "upload failed"

return data.secure_url
}



  function showError(msg){
let box=document.getElementById("errorBox")
box.style.display="block"
box.innerText=msg
}

function hideError(){
document.getElementById("errorBox").style.display="none"
}
// ➕ إضافة سؤال
async function addQuestion(){

showLoader()

try{

const q=document.getElementById("question").value

let options=[]
const o1=document.getElementById("opt1").value
const o2=document.getElementById("opt2").value
const o3=document.getElementById("opt3").value
const o4=document.getElementById("opt4").value

if(o1) options.push(o1)
if(o2) options.push(o2)
if(o3) options.push(o3)
if(o4) options.push(o4)

const answerInput = document.getElementById("answerNumber").value
const answer = parseInt(answerInput)

// ❌ تحقق أقوى
if(!answerInput){
hideLoader()
showError("لازم تختار رقم الإجابة الصحيحة")
return
}

if(isNaN(answer)){
hideLoader()
showError("الإجابة لازم تكون رقم")
return
}

if(answer < 1 || answer > options.length){
hideLoader()
showError("رقم الإجابة غير صحيح")
return
}

if(!q || options.length < 2){
hideLoader()
showError("يجب إدخال سؤال واختيارين على الأقل")
return
}

// 📸 صورة
let imageUrl = ""
const imageFile = document.getElementById("questionImage").files[0]

if(imageFile){
try{
imageUrl = await uploadImage(imageFile)
}catch{
hideLoader()
showError("فشل رفع الصورة")
return
}
}

if(editIndex !== null){
questions[editIndex] = {
question:q,
options:options,
answer:answer,
image:imageUrl
}
editIndex = null
}else{
questions.push({
question:q,
options:options,
answer:answer,
image:imageUrl
})
}

renderQuestions()
  
document.getElementById("qCount").innerText="عدد الأسئلة: "+questions.length

clearFields()

hideLoader()
showError("تم إضافة السؤال")
}catch(e){
hideLoader()
showError("حصل خطأ")
console.log(e)
}

}

  
// حفظ على GitHub
async function updateJSONFile(data){
await fetch("/.netlify/functions/saveQuiz",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)
})
}


let hidden = false

function toggleQuestions(){

const list = document.getElementById("questionsList")
const btn = document.getElementById("toggleBtn")

hidden = !hidden

if(hidden){
list.style.display = "none"
btn.innerText = "إظهار الأسئلة"
}else{
list.style.display = "block"
btn.innerText = "إخفاء الأسئلة"
}

}

  
// نشر الامتحان
async function publishQuiz(){

showLoader()

try{

const title=document.getElementById("quizTitle").value
const time=document.getElementById("quizTime").value

if(!title || questions.length==0){
hideLoader()
showError("اكتب اسم الامتحان وأضف أسئلة")
return
}

const newQuiz={
title:title,
time:time,
questions:questions
}

quizzes.unshift(newQuiz)

await updateJSONFile(quizzes)

renderQuiz()

questions=[]
document.getElementById("qCount").innerText="عدد الأسئلة: 0"

hideLoader()
alert("تم نشر الامتحان 🎉")

}catch(e){
hideLoader()
alert("فشل النشر")
console.log(e)
}

}

// عرض الامتحانات
function renderQuiz(){

const container=document.getElementById("quizList")
container.innerHTML=""

quizzes.forEach((q,i)=>{

container.innerHTML+=`
<div class="card">
<b>${q.title}</b>
<p>عدد الأسئلة: ${q.questions.length}</p>
<p>الوقت: ${q.time} دقيقة</p>

<button class="deleteBtn" onclick="deleteQuiz(${i})">
حذف الامتحان
</button>

</div>
`
})
}

// حذف
async function deleteQuiz(i){

if(!confirm("هل تريد حذف الامتحان؟")) return

quizzes.splice(i,1)

await updateJSONFile(quizzes)

renderQuiz()
}

// تنظيف
function clearFields(){
document.getElementById("question").value=""
document.getElementById("opt1").value=""
document.getElementById("opt2").value=""
document.getElementById("opt3").value=""
document.getElementById("opt4").value=""
document.getElementById("answerNumber").value=""
document.getElementById("questionImage").value=""

document.getElementById("imgText").innerText = "لم يتم اختيار صورة"
}






document.getElementById("questionImage").onchange = function () {

let file = this.files[0]
let text = document.getElementById("imgText")

if(file){
text.innerText = "📸 " + file.name
}else{
text.innerText = "لم يتم اختيار صورة"
}

}

// 👇 تضيف ده تحته
setTimeout(() => {
let editImg = document.getElementById("editImage")
if(editImg){
editImg.onchange = function () {
let file = this.files[0]
let text = document.getElementById("editImgText")

if(file){
text.innerText = "📸 " + file.name
}else{
text.innerText = "لم يتم اختيار صورة"
}
}
}
}, 500)

  function showLoader(){
document.getElementById("loader").style.display="flex"
}

function hideLoader(){
document.getElementById("loader").style.display="none"
}



  
function renderQuestions(){

const container = document.getElementById("questionsList")
container.innerHTML = ""

questions.forEach((q,i)=>{

let div = document.createElement("div")
div.className = "q-card"
div.draggable = true

  
div.innerHTML = `
<div class="q-header">
<span>سؤال ${i+1}</span>
</div>

<div class="q-body">
<p class="q-text">${q.question}</p>

${q.image ? `<img src="${q.image}" class="q-img">` : ""}

<ul class="q-options">
${q.options.map((opt,idx)=>`
<li class="${q.answer == idx+1 ? 'correct' : ''}">
${idx+1}) ${opt}
</li>
`).join("")}
</ul>
</div>

<div class="q-actions">
<button class="editBtn" onclick="openEdit(${i})">تعديل</button>
<button class="deleteBtn" onclick="deleteQuestion(${i})">حذف</button>
</div>
`

// drag
div.ondragstart = (e)=>{
div.classList.add("dragging")
e.dataTransfer.setData("index", i)
e.dataTransfer.effectAllowed = "move"
}

div.ondragend = ()=>{
div.classList.remove("dragging")
}

div.ondragover = (e)=> e.preventDefault()

div.ondrop = (e)=>{
let from = e.dataTransfer.getData("index")

let item = questions[from]
questions.splice(from,1)
questions.splice(i,0,item)

renderQuestions()
}

container.appendChild(div)

})

document.getElementById("qCount").innerText="عدد الأسئلة: "+questions.length
}
 
  function editQuestion(i){

let q = questions[i]

document.getElementById("question").value = q.question
document.getElementById("opt1").value = q.options[0] || ""
document.getElementById("opt2").value = q.options[1] || ""
document.getElementById("opt3").value = q.options[2] || ""
document.getElementById("opt4").value = q.options[3] || ""
document.getElementById("answerNumber").value = q.answer

editIndex = i
}
  function deleteQuestion(i){
questions.splice(i,1)
renderQuestions()
}






  let currentEditIndex = null;

function openEdit(i){

currentEditIndex = i
let q = questions[i]

document.getElementById("editModal").style.display="flex"

document.getElementById("editQuestionText").value = q.question
document.getElementById("editOpt1").value = q.options[0] || ""
document.getElementById("editOpt2").value = q.options[1] || ""
document.getElementById("editOpt3").value = q.options[2] || ""
document.getElementById("editOpt4").value = q.options[3] || ""
document.getElementById("editAnswer").value = q.answer
  document.getElementById("editImgText").innerText = q.image 
? "📸 يوجد صورة حالية" 
: "لم يتم اختيار صورة";
}

function closeEdit(){
document.getElementById("editModal").style.display="none"
}

async function saveEdit(){

showLoader()

try{

let q = questions[currentEditIndex]

let newImage = document.getElementById("editImage").files[0]

if(newImage){
q.image = await uploadImage(newImage)
}

q.question = document.getElementById("editQuestionText").value

q.options = [
document.getElementById("editOpt1").value,
document.getElementById("editOpt2").value,
document.getElementById("editOpt3").value,
document.getElementById("editOpt4").value
].filter(Boolean)

q.answer = parseInt(document.getElementById("editAnswer").value)

closeEdit()
renderQuestions()

hideLoader()

}catch(e){
hideLoader()
alert("فشل التعديل")
console.log(e)
}



if(!q.question || q.options.length < 2){
hideLoader()
alert("لازم سؤال واختيارين على الأقل")
return
}

if(!q.answer || q.answer > q.options.length){
hideLoader()
alert("الإجابة غير صحيحة")
return
}
  
}


  window.onclick = function(e){
let modal = document.getElementById("editModal")
if(e.target == modal){
modal.style.display = "none"
}
}
</script>





  
<div id="editModal" class="modal">

<div class="modal-content big">

<h3>✏️ تعديل السؤال</h3>

<input id="editQuestionText" placeholder="اكتب السؤال">

<label>صورة (اختياري)</label>
<div class="upload-btn" onclick="document.getElementById('editImage').click()">اختيار صورة</div>
<div class="upload-text" id="editImgText">لم يتم اختيار صورة</div>
<input type="file" id="editImage" hidden>

<div class="options">

<input id="editOpt1" placeholder="اختيار 1">
<input id="editOpt2" placeholder="اختيار 2">
<input id="editOpt3" placeholder="اختيار 3">
<input id="editOpt4" placeholder="اختيار 4">

</div>

<select id="editAnswer">
<option value="">اختر الإجابة</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<div class="modal-actions">
<button onclick="saveEdit()">💾 حفظ</button>
<button onclick="closeEdit()">❌ إلغاء</button>
</div>

</div>
</div>


  
<div id="loader">
  <div class="spinner"></div>
  <p>
جاري تنفيذ العملية... ⏳<br>
قد يستغرق الأمر بعض الوقت
</p>
</div>
</body>
</html>
