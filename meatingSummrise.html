<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ملخص الاجتماع</title>
  <meta name="author" content="Kareem Hosny" />
  <meta name="description" content="الموقع معمول بكل حب لمساعدة وخدمة الكنيسة بواسطة كريم حسني" />
  <meta name="keywords" content="كريم حسني, كنيسة, العزية, اجتماع ثانوي" />
  <link rel="icon" href="imgsfile/icon.png" type="image/x-icon" />


  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      direction: rtl;
      background-color: #f0f8ff;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      color: #444;
      font-size: 2rem;
    }
    .back-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      background-image: linear-gradient(to left,#cf98d6d2,rgb(181, 70, 196));
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #38373a;
      transition: 0.3s;
    }
    .btn:hover {
      background-color: #666;
    }
    .content p {
  text-align: right;
}

.content img, .content video {
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
    .content {
  max-width: 1100px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
    }
    img, video {
      max-width: 100%;
      display: block;
      margin: 20px auto;
      border-radius: 8px;
    }
    .archive-card {
      margin-bottom: 30px;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="back-buttons">
    <a class="btn" href="index.html">الصفحة الرئيسية ⬅</a>
    <a class="btn" href="archive-final.html">الأرشيف</a>
  </div>
  <div class="header">
    <h1 id="title">تحميل آخر تلخيص...</h1>
    <p id="date"></p>
  </div>
  <div class="content">
    <img id="image" style="display:none;">
    <p id="content"></p>
    <div id="video"></div>
  </div>





  
<script>
fetch("summaries.json")
.then(res => res.json())
.then(list => {

if(!list.length){
document.getElementById("title").innerText = "لا يوجد تلخيصات"
return
}

const a = list[0]

document.getElementById("title").innerText = a.title
document.getElementById("date").innerText = "📅 التاريخ: " + a.date

const contentDiv = document.querySelector(".content")

// نفضي المحتوى
contentDiv.innerHTML = ""

// 🖼️ الصور
if(a.images && a.images.length){
const imagesBox = document.createElement("div")

a.images.forEach(img=>{
const image=document.createElement("img")
image.src=img
image.style.maxHeight="400px"
image.style.objectFit="cover"
imagesBox.appendChild(image)
})

contentDiv.appendChild(imagesBox)
}

// 🎥 الفيديوهات
if(a.videos && a.videos.length){
const videoBox = document.createElement("div")

a.videos.forEach(v=>{
const video=document.createElement("video")
video.controls=true
video.src=v
video.style.maxHeight="400px"
videoBox.appendChild(video)
})

contentDiv.appendChild(videoBox)
}

// 📄 الملفات
if(a.files && a.files.length){
const filesBox = document.createElement("div")

a.files.forEach(f=>{
const link=document.createElement("a")
link.href=f
link.innerText="📄 تحميل الملف"
link.style.display="block"
link.style.margin="10px 0"
link.style.fontWeight="bold"
filesBox.appendChild(link)
})

contentDiv.appendChild(filesBox)
}

// 📝 المحتوى (في الآخر 👇)
const text=document.createElement("p")
text.innerText = a.content
text.style.marginTop="20px"
text.style.lineHeight="1.8"
text.style.fontSize="16px"

contentDiv.appendChild(text)

})
</script>
</body>
</html>
