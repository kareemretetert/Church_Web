<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ملخص الاجتماع</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Tahoma;
  direction: rtl;
  background: #f0f8ff;
  padding: 20px;
}

/* أزرار */
.back-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.btn {
  background-image: linear-gradient(to left,#cf98d6d2,rgb(181, 70, 196));
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid #38373a;
  transition: 0.3s;
}

.btn:hover {
  background-color: #666;
}

/* العنوان */
.header {
  text-align: center;
  margin-bottom: 25px;
}

h1 {
  font-size: 2rem;
}

/* الكارت */
.content {
  max-width: 1100px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* النص */
.content p {
  line-height: 1.9;
  font-size: 17px;
  margin-top: 25px;
}

/* الصور */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* lightbox */
.lightbox {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* الفيديو */
video {
  width: 100%;
  border-radius: 12px;
  margin-top: 20px;
}

/* الملفات */
.file-link {
  display: block;
  padding: 12px;
  background: #f5f5f5;
  border-radius: 8px;
  margin-top: 10px;
  text-decoration: none;
  color: #333;
  font-weight: bold;
  transition: 0.3s;
}

.file-link:hover {
  background: #e0e0e0;
}

</style>
</head>

<body>

<div class="back-buttons">
  <a class="btn" href="index.html">الصفحة الرئيسية ⬅</a>
  <a class="btn" href="archive-final.html">الأرشيف</a>
</div>

<div class="header">
  <h1 id="title">تحميل...</h1>
  <p id="date"></p>
</div>

<div class="content"></div>

<script>
fetch("summaries.json")
.then(res => res.json())
.then(list => {

if(!list.length){
document.getElementById("title").innerText = "لا يوجد تلخيصات"
return
}

const a = list[0]

document.getElementById("title").innerText = a.title
document.getElementById("date").innerText = "📅 " + a.date

const contentDiv = document.querySelector(".content")
contentDiv.innerHTML = ""

// 🖼️ الصور (Gallery)
if(a.images && a.images.length){

const gallery = document.createElement("div")
gallery.className = "gallery"

a.images.forEach(img=>{
const image=document.createElement("img")
image.src=img

image.onclick = ()=>{
const lightbox = document.createElement("div")
lightbox.className="lightbox"

const bigImg=document.createElement("img")
bigImg.src=img

lightbox.appendChild(bigImg)
lightbox.onclick = ()=> lightbox.remove()

document.body.appendChild(lightbox)
}

gallery.appendChild(image)
})

contentDiv.appendChild(gallery)
}

// 🎥 الفيديو
if(a.videos && a.videos.length){
a.videos.forEach(v=>{
const video=document.createElement("video")
video.controls=true
video.src=v
contentDiv.appendChild(video)
})
}

// 📄 الملفات
if(a.files && a.files.length){
a.files.forEach(f=>{
const link=document.createElement("a")
link.href=f
link.innerText="📄 تحميل الملف"
link.className="file-link"
link.target="_blank"
contentDiv.appendChild(link)
})
}

// 📝 النص
const text=document.createElement("p")
text.innerText = a.content
contentDiv.appendChild(text)

})
</script>

</body>
</html>
