<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة الحضور والغياب</title>

<style>
body{
font-family:Tajawal, Tahoma;
direction:rtl;
margin:0;
padding:20px;

background: linear-gradient(-45deg, #667eea, #764ba2, #43cea2, #185a9d);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
min-height: 100vh;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.section{
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

h2{
text-align:center;
color:#fff;
margin-bottom:10px;
text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

h3{
color:#fff;
margin-bottom:8px;
font-size:16px;
}

label{
display:block;
margin-top:12px;
color:#eee;
font-weight:bold;
}

input, select{
width:100%;
margin-top:6px;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.9);
box-sizing:border-box;
font-size:15px;
transition:0.3s;
font-family:Tajawal, Tahoma;
}

input:focus, select:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.5);
outline:none;
}

button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
transition:0.3s;
font-family:Tajawal, Tahoma;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.btn-green{
background:linear-gradient(135deg,#43cea2,#185a9d);
}

.btn-red{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.btn-orange{
background:linear-gradient(135deg,#f7971e,#ffd200);
color:#333;
}

.btn-small{
padding:8px 16px;
font-size:13px;
margin-top:8px;
width:auto;
display:inline-block;
}

.card{
background:rgba(255,255,255,0.92);
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
color:#333;
}

.card b{
font-size:16px;
color:#333;
}

.card p{
margin:5px 0;
color:#555;
font-size:14px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:15px;
}

.stat-box{
background:rgba(255,255,255,0.2);
border-radius:15px;
padding:15px;
text-align:center;
border:1px solid rgba(255,255,255,0.3);
}

.stat-box .num{
font-size:28px;
font-weight:bold;
color:#fff;
}

.stat-box .lbl{
font-size:12px;
color:#ddd;
margin-top:4px;
}

.member-row{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
margin-top:8px;
background:rgba(255,255,255,0.1);
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
}

.member-name{
color:#fff;
font-size:15px;
font-weight:bold;
}

.toggle-wrap{
display:flex;
gap:8px;
}

.tog-present, .tog-absent{
padding:8px 16px;
border-radius:20px;
border:none;
cursor:pointer;
font-size:13px;
font-weight:bold;
margin-top:0;
width:auto;
font-family:Tajawal, Tahoma;
transition:0.2s;
}

.tog-present{
background:rgba(67,206,162,0.3);
color:#fff;
border:2px solid rgba(67,206,162,0.5);
}

.tog-present.active{
background:linear-gradient(135deg,#43cea2,#185a9d);
border-color:#43cea2;
transform:scale(1.08);
}

.tog-absent{
background:rgba(255,65,108,0.3);
color:#fff;
border:2px solid rgba(255,65,108,0.5);
}

.tog-absent.active{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
border-color:#ff416c;
transform:scale(1.08);
}

.badge-present{
background:linear-gradient(135deg,#43cea2,#185a9d);
color:#fff;
padding:3px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.badge-absent{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:#fff;
padding:3px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.session-card{
background:rgba(255,255,255,0.92);
padding:12px 15px;
margin-top:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.session-card:hover{
transform:scale(1.01);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.session-date{
font-size:13px;
color:#888;
margin-top:3px;
}

.progress-bar-wrap{
background:rgba(255,255,255,0.2);
border-radius:10px;
height:8px;
margin-top:8px;
overflow:hidden;
}

.progress-bar-fill{
height:100%;
border-radius:10px;
background:linear-gradient(90deg,#43cea2,#185a9d);
transition:0.5s;
}

.class-selector{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.class-btn{
padding:14px;
border-radius:15px;
border:2px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.15);
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
margin-top:0;
font-family:Tajawal, Tahoma;
}

.class-btn:hover, .class-btn.active{
background:rgba(255,255,255,0.3);
border-color:#fff;
transform:scale(1.03);
}

.tabs{
display:flex;
gap:8px;
margin-bottom:5px;
flex-wrap:wrap;
}

.tab-btn{
padding:10px 18px;
border-radius:25px;
border:2px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.1);
color:#fff;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
margin-top:0;
width:auto;
font-family:Tajawal, Tahoma;
}

.tab-btn.active{
background:rgba(255,255,255,0.35);
border-color:#fff;
}

.tab-content{ display:none; }
.tab-content.active{ display:block; }

.info-text{
color:#ddd;
font-size:13px;
text-align:center;
margin-top:8px;
}

#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:60px;height:60px;
border:6px solid #eee;
border-top:6px solid #00c6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{ to{transform:rotate(360deg);} }

#loader p{
color:white;
font-size:20px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:10px;
}

th{
background:rgba(0,0,0,0.1);
padding:8px 10px;
text-align:right;
color:#333;
border-bottom:2px solid rgba(0,0,0,0.1);
}

td{
padding:8px 10px;
border-bottom:1px solid rgba(0,0,0,0.07);
color:#444;
}

tr:last-child td{ border-bottom:none; }

.download-btn{
background:linear-gradient(135deg,#f7971e,#ffd200);
color:#333;
font-size:13px;
padding:8px;
margin-top:8px;
}

@media(max-width:600px){
.section{ max-width:95%; padding:15px; }
.stats-grid{ grid-template-columns:repeat(2,1fr); }
.class-selector{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- ===== PASSWORD ===== -->
<script>
const PASSWORD = "kimo123"
const entered = prompt("ادخل كلمة المرور للدخول")
if(entered !== PASSWORD){
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:100px;color:#fff'>كلمة المرور غير صحيحة ❌</h2>"
  throw new Error("access denied")
}
</script>

<!-- ===== HEADER ===== -->
<div class="section">
  <h2>📋 لوحة الحضور والغياب</h2>
  <p class="info-text" id="today-label"></p>

  <div class="stats-grid" id="stats-bar">
    <div class="stat-box"><div class="num" id="s-classes">0</div><div class="lbl">الفصول</div></div>
    <div class="stat-box"><div class="num" id="s-members">0</div><div class="lbl">المخدومين</div></div>
    <div class="stat-box"><div class="num" id="s-rate">0%</div><div class="lbl">معدل الحضور</div></div>
  </div>
</div>

<!-- ===== TABS NAV ===== -->
<div class="section" style="padding:15px">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab-classes')">🏫 الفصول</button>
    <button class="tab-btn" onclick="switchTab('tab-attendance')">✅ أخذ الحضور</button>
    <button class="tab-btn" onclick="switchTab('tab-history')">📅 السجلات</button>
    <button class="tab-btn" onclick="switchTab('tab-reports')">📊 التقارير</button>
  </div>
</div>

<!-- ===== TAB: CLASSES ===== -->
<div id="tab-classes" class="tab-content active">

  <div class="section">
    <h2>➕ إضافة فصل جديد</h2>
    <label>اسم الفصل</label>
    <input id="className" placeholder="مثال: فصل الكبار">
    <button onclick="addClass()">إضافة الفصل</button>
  </div>

  <div class="section">
    <h2>➕ إضافة مخدوم لفصل</h2>
    <label>اختر الفصل</label>
    <select id="memberClassSelect"></select>
    <label>اسم المخدوم</label>
    <input id="memberName" placeholder="اسم المخدوم">
    <button onclick="addMember()">إضافة المخدوم</button>
  </div>

  <div class="section">
    <h2>🏫 الفصول الحالية</h2>
    <div id="classList"></div>
  </div>

</div>

<!-- ===== TAB: ATTENDANCE ===== -->
<div id="tab-attendance" class="tab-content">

  <div class="section">
    <h2>✅ أخذ الحضور</h2>
    <label>اختر الفصل</label>
    <div class="class-selector" id="attClassSelector"></div>
  </div>

  <div id="attendance-form-wrapper"></div>

</div>

<!-- ===== TAB: HISTORY ===== -->
<div id="tab-history" class="tab-content">

  <div class="section">
    <h2>📅 سجل جلسات الحضور</h2>
    <label>فلترة بالفصل</label>
    <select id="historyFilter" onchange="renderHistory()"></select>
    <div id="historyList"></div>
  </div>

</div>

<!-- ===== TAB: REPORTS ===== -->
<div id="tab-reports" class="tab-content">

  <div class="section">
    <h2>📊 تقارير الحضور</h2>
    <label>اختر الفصل</label>
    <select id="reportClassSelect" onchange="renderReport()"></select>
    <div id="reportContent"></div>
  </div>

</div>

<!-- ===== LOADER ===== -->
<div id="loader">
  <div class="spinner"></div>
  <p>جاري الحفظ... ⏳<br>قد يستغرق الأمر بعض الوقت</p>
</div>

<script>
// ===========================
// DATA
// ===========================
let db = { classes: [], sessions: [] }

const TODAY = new Date()
document.getElementById("today-label").textContent =
  TODAY.toLocaleDateString("ar-EG", { weekday:"long", year:"numeric", month:"long", day:"numeric" })

// ===========================
// LOAD FROM GITHUB
// ===========================
async function loadDB(){
  try{
    const res = await fetch("attendance.json?t=" + Date.now())
    db = await res.json()
  } catch {
    db = { classes:[], sessions:[] }
  }
  refreshAll()
}

// ===========================
// SAVE TO GITHUB VIA NETLIFY
// ===========================
async function saveDB(){
  showLoader()
  try{
    const res = await fetch("/.netlify/functions/saveAttendance", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(db)
    })
    if(!res.ok) throw "save failed"
  } catch(e){
    alert("فشل الحفظ ❌")
    console.error(e)
  }
  hideLoader()
}

// ===========================
// STATS
// ===========================
function updateStats(){
  const totalMembers = db.classes.reduce((s,c) => s + c.members.length, 0)
  const allRecords = db.sessions.flatMap(s => s.records)
  const presentCount = allRecords.filter(r => r.status === "present").length
  const rate = allRecords.length ? Math.round(presentCount / allRecords.length * 100) : 0

  document.getElementById("s-classes").textContent = db.classes.length
  document.getElementById("s-members").textContent = totalMembers
  document.getElementById("s-rate").textContent = rate + "%"
}

// ===========================
// TABS
// ===========================
function switchTab(tabId){
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"))
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"))
  document.getElementById(tabId).classList.add("active")
  event.target.classList.add("active")
  if(tabId === "tab-history") renderHistory()
  if(tabId === "tab-reports") renderReport()
}

// ===========================
// CLASSES
// ===========================
function addClass(){
  const name = document.getElementById("className").value.trim()
  if(!name) return alert("ادخل اسم الفصل")
  db.classes.push({ id: uid(), name, members: [] })
  document.getElementById("className").value = ""
  saveDB().then(() => refreshAll())
}

function deleteClass(cid){
  if(!confirm("هل تريد حذف الفصل وكل بياناته؟")) return
  db.classes = db.classes.filter(c => c.id !== cid)
  db.sessions = db.sessions.filter(s => s.classId !== cid)
  saveDB().then(() => refreshAll())
}

function renderClassList(){
  const el = document.getElementById("classList")
  if(!db.classes.length){ el.innerHTML = '<p class="info-text">لا يوجد فصول بعد</p>'; return }
  el.innerHTML = db.classes.map(c => {
    const sessions = db.sessions.filter(s => s.classId === c.id)
    const rate = classRate(c.id)
    return `
    <div class="card">
      <b>🏫 ${c.name}</b>
      <p>عدد المخدومين: ${c.members.length} | جلسات الحضور: ${sessions.length} | معدل الحضور: ${rate}%</p>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${rate}%"></div></div>
      <div style="margin-top:10px">
        ${c.members.map(m => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee">
            <span style="color:#333;font-size:14px">👤 ${m.name}</span>
            <span style="font-size:12px;color:#888">${memberRate(c.id, m.id)}% حضور</span>
            <button class="btn-small btn-red" style="background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:Tajawal" onclick="deleteMember('${c.id}','${m.id}')">حذف</button>
          </div>
        `).join("")}
      </div>
      <button class="btn-red" onclick="deleteClass('${c.id}')">حذف الفصل</button>
    </div>`
  }).join("")
}

// ===========================
// MEMBERS
// ===========================
function addMember(){
  const cid = document.getElementById("memberClassSelect").value
  const name = document.getElementById("memberName").value.trim()
  if(!cid) return alert("اختر الفصل")
  if(!name) return alert("ادخل اسم المخدوم")
  const cl = db.classes.find(c => c.id === cid)
  cl.members.push({ id: uid(), name })
  document.getElementById("memberName").value = ""
  saveDB().then(() => refreshAll())
}

function deleteMember(cid, mid){
  if(!confirm("حذف المخدوم؟")) return
  const cl = db.classes.find(c => c.id === cid)
  cl.members = cl.members.filter(m => m.id !== mid)
  db.sessions.forEach(s => { s.records = s.records.filter(r => r.memberId !== mid) })
  saveDB().then(() => refreshAll())
}

// ===========================
// ATTENDANCE
// ===========================
let currentSession = { classId: null, statuses: {} }

function renderAttClassSelector(){
  const el = document.getElementById("attClassSelector")
  if(!db.classes.length){ el.innerHTML = '<p class="info-text" style="grid-column:span 2">أضف فصلاً أولاً من تبويب الفصول</p>'; return }
  el.innerHTML = db.classes.map(c =>
    `<button class="class-btn" id="cbtn-${c.id}" onclick="selectAttClass('${c.id}')">${c.name}<br><small style="font-weight:normal;opacity:.8">${c.members.length} مخدوم</small></button>`
  ).join("")
}

function selectAttClass(cid){
  document.querySelectorAll(".class-btn").forEach(b => b.classList.remove("active"))
  const btn = document.getElementById("cbtn-" + cid)
  if(btn) btn.classList.add("active")

  const cl = db.classes.find(c => c.id === cid)
  currentSession = { classId: cid, statuses: {} }
  cl.members.forEach(m => currentSession.statuses[m.id] = "present")

  renderAttForm(cl)
}

function renderAttForm(cl){
  const wrapper = document.getElementById("attendance-form-wrapper")
  const dateStr = fmtDate(TODAY)

  wrapper.innerHTML = `
  <div class="section">
    <h2>✅ ${cl.name} — ${dateStr}</h2>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn-green" style="background:linear-gradient(135deg,#43cea2,#185a9d);color:#fff;border:none;border-radius:12px;padding:10px;flex:1;font-size:14px;font-weight:bold;cursor:pointer;font-family:Tajawal" onclick="setAll('present')">تحضير الكل ✅</button>
      <button class="btn-red" style="background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff;border:none;border-radius:12px;padding:10px;flex:1;font-size:14px;font-weight:bold;cursor:pointer;font-family:Tajawal" onclick="setAll('absent')">تغيب الكل ❌</button>
    </div>
    ${cl.members.length === 0
      ? '<p class="info-text">لا يوجد مخدومين في هذا الفصل. أضف مخدومين أولاً.</p>'
      : cl.members.map(m => `
        <div class="member-row" id="mrow-${m.id}">
          <span class="member-name">👤 ${m.name}</span>
          <div class="toggle-wrap">
            <button class="tog-present active" id="tp-${m.id}" onclick="setStatus('${m.id}','present')">حاضر</button>
            <button class="tog-absent" id="ta-${m.id}" onclick="setStatus('${m.id}','absent')">غائب</button>
          </div>
        </div>
      `).join("")
    }
    ${cl.members.length ? `<button onclick="saveAttendance()">💾 حفظ الحضور</button>` : ""}
  </div>`
}

function setStatus(mid, status){
  currentSession.statuses[mid] = status
  const tp = document.getElementById("tp-" + mid)
  const ta = document.getElementById("ta-" + mid)
  if(!tp || !ta) return
  tp.className = "tog-present" + (status === "present" ? " active" : "")
  ta.className = "tog-absent" + (status === "absent" ? " active" : "")
}

function setAll(status){
  Object.keys(currentSession.statuses).forEach(mid => setStatus(mid, status))
}

async function saveAttendance(){
  if(!currentSession.classId) return alert("اختر فصلاً أولاً")
  const cl = db.classes.find(c => c.id === currentSession.classId)
  const dateStr = fmtDate(TODAY)

  const records = cl.members.map(m => ({
    memberId: m.id,
    name: m.name,
    status: currentSession.statuses[m.id] || "absent"
  }))

  const existing = db.sessions.findIndex(s => s.classId === currentSession.classId && s.date === dateStr)
  const session = { id: uid(), classId: currentSession.classId, date: dateStr, records }

  if(existing >= 0) db.sessions[existing] = session
  else db.sessions.push(session)

  await saveDB()

  const present = records.filter(r => r.status === "present").length
  alert(`✅ تم حفظ الحضور\nحضر: ${present} | غاب: ${records.length - present}`)
  updateStats()
}

// ===========================
// HISTORY
// ===========================
function renderHistory(){
  populateSelect("historyFilter", true)
  const filterVal = document.getElementById("historyFilter").value
  const el = document.getElementById("historyList")

  let sessions = [...db.sessions].sort((a,b) => b.date.localeCompare(a.date))
  if(filterVal !== "all") sessions = sessions.filter(s => s.classId === filterVal)

  if(!sessions.length){ el.innerHTML = '<p class="info-text">لا يوجد سجلات حضور بعد</p>'; return }

  el.innerHTML = sessions.map(s => {
    const cl = db.classes.find(c => c.id === s.classId)
    const present = s.records.filter(r => r.status === "present").length
    const rate = s.records.length ? Math.round(present / s.records.length * 100) : 0
    return `
    <div class="session-card" onclick="toggleSessionDetail('sd-${s.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <b style="color:#333">${cl ? cl.name : "؟"}</b>
          <div class="session-date">📅 ${s.date}</div>
        </div>
        <div style="text-align:center">
          <span class="badge-present">${present} حضر</span>&nbsp;
          <span class="badge-absent">${s.records.length - present} غاب</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${rate}%"></div></div>
      <div id="sd-${s.id}" style="display:none;margin-top:10px">
        ${s.records.map(r =>
          `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee">
            <span style="color:#333;font-size:13px">${r.name}</span>
            <span class="${r.status === "present" ? "badge-present" : "badge-absent"}">${r.status === "present" ? "حاضر" : "غائب"}</span>
          </div>`
        ).join("")}
        <button class="download-btn" onclick="downloadSession('${s.id}','${s.classId}',event)">⬇️ تنزيل هذه الجلسة</button>
      </div>
    </div>`
  }).join("")
}

function toggleSessionDetail(id){
  const el = document.getElementById(id)
  if(el) el.style.display = el.style.display === "none" ? "block" : "none"
}

// ===========================
// REPORTS
// ===========================
function renderReport(){
  populateSelect("reportClassSelect", false)
  const cid = document.getElementById("reportClassSelect").value
  const el = document.getElementById("reportContent")
  if(!cid){ el.innerHTML = ""; return }

  const cl = db.classes.find(c => c.id === cid)
  const sessions = db.sessions.filter(s => s.classId === cid).sort((a,b) => a.date.localeCompare(b.date))

  if(!sessions.length){ el.innerHTML = '<p class="info-text" style="color:#555">لا يوجد جلسات لهذا الفصل بعد</p>'; return }

  let html = `
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0">
    <button class="download-btn" onclick="downloadFullReport('${cid}')">⬇️ تنزيل الجدول الكامل</button>
    <button class="download-btn" onclick="downloadSessionPicker('${cid}')">⬇️ تنزيل جلسة بعينها</button>
  </div>
  <div style="overflow-x:auto">
  <table>
    <thead>
      <tr>
        <th>المخدوم</th>
        ${sessions.map(s => `<th style="white-space:nowrap;font-size:11px">${s.date.slice(5)}</th>`).join("")}
        <th>النسبة</th>
      </tr>
    </thead>
    <tbody>
      ${cl.members.map(m => {
        let present = 0
        const cells = sessions.map(s => {
          const r = s.records.find(r => r.memberId === m.id)
          const isP = r && r.status === "present"
          if(isP) present++
          return `<td style="text-align:center">${r ? (isP ? '<span class="badge-present">ح</span>' : '<span class="badge-absent">غ</span>') : "—"}</td>`
        }).join("")
        const rate = Math.round(present / sessions.length * 100)
        return `<tr><td style="font-weight:bold;white-space:nowrap">${m.name}</td>${cells}<td style="font-weight:bold;color:${rate >= 75 ? "#059669" : "#dc2626"}">${rate}%</td></tr>`
      }).join("")}
    </tbody>
  </table>
  </div>`

  el.innerHTML = html
}

// ===========================
// DOWNLOAD
// ===========================
function downloadFullReport(cid){
  const cl = db.classes.find(c => c.id === cid)
  const sessions = db.sessions.filter(s => s.classId === cid).sort((a,b) => a.date.localeCompare(b.date))
  if(!sessions.length) return alert("لا يوجد جلسات")

  let csv = "\uFEFF" + "الاسم," + sessions.map(s => s.date).join(",") + ",نسبة الحضور\n"
  cl.members.forEach(m => {
    let p = 0
    const row = [m.name]
    sessions.forEach(s => {
      const r = s.records.find(r => r.memberId === m.id)
      const isP = r && r.status === "present"
      if(isP) p++
      row.push(isP ? "حاضر" : "غائب")
    })
    row.push(Math.round(p / sessions.length * 100) + "%")
    csv += row.join(",") + "\n"
  })
  dlCSV(csv, `${cl.name}_الجدول_الكامل.csv`)
}

function downloadSession(sid, cid, e){
  e && e.stopPropagation()
  const s = db.sessions.find(x => x.id === sid)
  const cl = db.classes.find(c => c.id === cid)
  let csv = "\uFEFF" + "الاسم,الحالة\n"
  s.records.forEach(r => { csv += `${r.name},${r.status === "present" ? "حاضر" : "غائب"}\n` })
  dlCSV(csv, `${cl.name}_${s.date}.csv`)
}

function downloadSessionPicker(cid){
  const sessions = db.sessions.filter(s => s.classId === cid).sort((a,b) => b.date.localeCompare(a.date))
  if(!sessions.length) return alert("لا يوجد جلسات")
  const opts = sessions.map((s,i) => `${i+1}. ${s.date} (حضر ${s.records.filter(r=>r.status==="present").length})`).join("\n")
  const choice = prompt("اختر رقم الجلسة:\n" + opts)
  const idx = parseInt(choice) - 1
  if(isNaN(idx) || idx < 0 || idx >= sessions.length) return
  downloadSession(sessions[idx].id, cid, null)
}

function dlCSV(csv, filename){
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" })
  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = filename
  a.click()
}

// ===========================
// HELPERS
// ===========================
function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36) }
function fmtDate(d){ return d.toISOString().slice(0,10) }

function classRate(cid){
  const sessions = db.sessions.filter(s => s.classId === cid)
  if(!sessions.length) return 0
  const p = sessions.flatMap(s => s.records.filter(r => r.status === "present")).length
  const t = sessions.flatMap(s => s.records).length
  return t ? Math.round(p / t * 100) : 0
}

function memberRate(cid, mid){
  const sessions = db.sessions.filter(s => s.classId === cid)
  if(!sessions.length) return 0
  const p = sessions.filter(s => s.records.find(r => r.memberId === mid && r.status === "present")).length
  return Math.round(p / sessions.length * 100)
}

function populateSelect(id, withAll){
  const el = document.getElementById(id)
  const current = el.value
  el.innerHTML = (withAll ? '<option value="all">كل الفصول</option>' : "") +
    db.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join("")
  if(current) el.value = current
}

function refreshAll(){
  updateStats()
  renderClassList()
  renderAttClassSelector()
  populateSelect("memberClassSelect", false)
}

function showLoader(){ document.getElementById("loader").style.display = "flex" }
function hideLoader(){ document.getElementById("loader").style.display = "none" }
