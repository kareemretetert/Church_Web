<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الكورس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--primary:#22c55e;
--text:#fff;
--muted:#cbd5e1;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
}

/* 🔥 HEADER */
.course-header{
text-align:center;
padding:20px;
}

.course-cover{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.course-header h1{
margin:10px 0 5px;
font-size:clamp(22px,5vw,32px);
}

.course-header p{
color:var(--muted);
font-size:14px;
}

/* 🔥 CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:15px;
}

/* 🔥 CARD */
.lecture-card{
background:var(--card);
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
animation:fadeUp 0.5s ease;
}

/* HEADER */
.lecture-header{
background:linear-gradient(135deg,#166534,#22c55e);
padding:15px;
border-radius:15px;
margin-bottom:12px;
}

.lecture-header h3{
margin:0;
font-size:18px;
}

.lecture-header p{
margin:5px 0 0;
font-size:13px;
color:#e2e8f0;
}

/* BUTTONS */
.btn{
background:#334155;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
transition:0.3s;
}

.btn:hover{
background:#475569;
}

/* LESSONS */
.lessons{
display:none;
margin-top:10px;
}

.lesson-item{
background:#020617;
padding:10px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
display:flex;
justify-content:space-between;
}

.lesson-item:hover{
background:#1e293b;
transform:scale(1.02);
}

/* TAG */
.type{
font-size:12px;
color:#94a3b8;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* 📱 موبايل */
@media(max-width:600px){

.course-header{
padding:15px;
}

.lecture-header h3{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container" id="courseContainer"></div>

<script>

const index = localStorage.getItem("courseIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const course = data[index]
const container = document.getElementById("courseContainer")

// 🔥 HEADER
container.innerHTML += `
<div class="course-header">

<img src="${course.image || 'https://via.placeholder.com/600x250'}" class="course-cover">

<h1>📖 ${course.title}</h1>

<p>${course.description || ''}</p>

</div>
`

// 🔥 LECTURES
course.lectures.forEach((lec, i)=>{

container.innerHTML += `
<div class="lecture-card">

<div class="lecture-header">
<h3>📚 ${lec.title}</h3>
<p>${lec.subtitle || ""}</p>
</div>

<div class="btn" onclick="toggleLessons(${i})">
<span>عرض الدروس (${lec.lessons.length})</span>
<span>▼</span>
</div>

<div class="lessons" id="lessons-${i}">

${lec.lessons.map((l,j)=>`
<div class="lesson-item" onclick="openLesson(${i},${j})">

<span>${getIcon(l.type)} ${l.title}</span>

<span class="type">${getTypeName(l.type)}</span>

</div>
`).join("")}

</div>

<div class="btn" onclick="openExam(${lec.examId})">
<span>🧠 اختبار المحاضرة</span>
<span>▶</span>
</div>

</div>
`

})

})

// 🔽 فتح/إغلاق الدروس
function toggleLessons(i){
const el = document.getElementById("lessons-"+i)
el.style.display = el.style.display === "block" ? "none" : "block"
}

// 🎯 فتح درس
function openLesson(lecIndex, lessonIndex){

localStorage.setItem("lectureIndex", lecIndex)
localStorage.setItem("lessonIndex", lessonIndex)

window.location.href = "lesson-view.html"
}

// 🧠 امتحان
function openExam(id){
localStorage.setItem("quizIndex", id)
window.location.href="quiz.html"
}

// 🎨 أيقونات
function getIcon(type){
if(type=="video") return "🎥"
if(type=="file") return "📄"
if(type=="image") return "🖼️"
return "📌"
}

// 🏷️ نوع الدرس
function getTypeName(type){
if(type=="video") return "فيديو"
if(type=="file") return "ملف"
if(type=="image") return "صورة"
return ""
}

</script>

</body>
</html>
