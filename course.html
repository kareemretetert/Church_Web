<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض الكورس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f172a;
color:#fff;
}

/* HEADER */
.header{
padding:20px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

/* VIDEO */
.video-box{
background:#000;
border-radius:15px;
overflow:hidden;
}

.video-box iframe{
width:100%;
height:400px;
border:none;
}

/* CONTENT */
.content{
margin-top:10px;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
}

/* SIDEBAR */
.sidebar{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
max-height:500px;
overflow:auto;
}

/* LESSON */
.lesson{
padding:10px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
transition:0.3s;
}

.lesson:hover{
background:#6366f1;
}

.lesson.active{
background:#8b5cf6;
}

/* 📱 موبايل */
@media(max-width:768px){
.container{
grid-template-columns:1fr;
}

.video-box iframe{
height:250px;
}
}

</style>
</head>

<body>

<div class="header">
<h2 id="courseTitle">اسم الكورس</h2>
</div>

<div class="container">

<!-- الفيديو + المحتوى -->
<div>

<div class="video-box">
<iframe id="videoPlayer"></iframe>
</div>

<div class="content" id="lessonContent">
وصف الدرس
</div>

</div>

<!-- قائمة الدروس -->
<div class="sidebar" id="lessonsList">
</div>

</div>

<script>

// 📥 نجيب الكورس المختار
const index = localStorage.getItem("courseIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const course = data[index]

document.getElementById("courseTitle").innerText = course.title

const lessons = course.lessons

// عرض الدروس
lessons.forEach((lesson,i)=>{
document.getElementById("lessonsList").innerHTML += `
<div class="lesson" onclick="playLesson(${i})">
${lesson.title}
</div>
`
})

// أول درس
if(lessons.length > 0){
playLesson(0)
}

})

// تشغيل الدرس
function playLesson(i){

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const index = localStorage.getItem("courseIndex")
const lesson = data[index].lessons[i]

// فيديو
document.getElementById("videoPlayer").src = lesson.video

// شرح
document.getElementById("lessonContent").innerText = lesson.content

// active
document.querySelectorAll(".lesson").forEach(el=>el.classList.remove("active"))
document.querySelectorAll(".lesson")[i].classList.add("active")

})

}

</script>

</body>
</html>
