<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الكورس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f172a;
color:#fff;
padding:15px;
}

/* 🔥 الكارت */
.lesson-card{
background:#1e293b;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
overflow:hidden;
}

/* 🔴 الهيدر */
.lesson-header{
background:linear-gradient(135deg,#ef4444,#dc2626);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.lesson-header h3{
margin:0;
font-size:20px;
}

.lesson-header p{
margin:5px 0 0;
font-size:13px;
color:#fcdede;
}

/* 🟠 الأزرار */
.lesson-btn{
background:#334155;
margin-bottom:10px;
padding:15px;
border-radius:12px;
cursor:pointer;
font-size:15px;
transition:0.3s;
display:flex;
justify-content:space-between;
align-items:center;
}

.lesson-btn:hover{
background:#475569;
transform:scale(1.02);
}

/* أيقونة */
.icon{
font-size:18px;
opacity:0.7;
}

/* 📱 موبايل */
@media(max-width:600px){

.lesson-header h3{
font-size:16px;
}

.lesson-btn{
font-size:14px;
padding:12px;
}

}

</style>
</head>

<body>

<div id="courseContainer"></div>

<script>

// 📥 تحميل الكورس
const index = localStorage.getItem("courseIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const course = data[index]
const container = document.getElementById("courseContainer")

course.lessons.forEach((lesson,i)=>{

container.innerHTML += `
<div class="lesson-card">

<div class="lesson-header">
<h3>${lesson.title}</h3>
<p>${lesson.subtitle || ""}</p>
</div>

<div class="lesson-btn" onclick="openVideo(${i})">
<span>📺 جزء الشرح والتدريبات</span>
<span class="icon">▶</span>
</div>

<div class="lesson-btn" onclick="openHomework(${i})">
<span>📝 تسليم الواجب</span>
<span class="icon">+</span>
</div>

<div class="lesson-btn" onclick="openExam(${i})">
<span>📊 الامتحان</span>
<span class="icon">★</span>
</div>

</div>
`
})

})

// 🎥 فتح الفيديو
function openVideo(i){
localStorage.setItem("lessonIndex", i)
window.location.href="lesson-video.html"
}

// 📝 الواجب
function openHomework(i){
alert("هنا صفحة رفع الواجب")
}

// 📊 الامتحان
function openExam(i){
window.location.href="quiz.html"
}

</script>

</body>
</html>
