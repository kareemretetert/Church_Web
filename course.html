<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل الكورس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--primary:#8b5cf6;
--text:#fff;
--muted:#cbd5e1;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
padding:15px;
}

/* عنوان الكورس */
.course-header{
text-align:center;
margin-bottom:25px;
}

.course-header h1{
margin:0;
font-size:22px;
}

.course-header p{
color:var(--muted);
font-size:14px;
}

/* كارت المحاضرة */
.lecture-card{
background:var(--card);
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* الهيدر */
.lecture-header{
padding:15px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.lecture-header h3{
margin:0;
font-size:16px;
}

.lecture-header p{
margin:5px 0 0;
font-size:12px;
color:#eee;
}

/* السهم */
.arrow{
transition:0.3s;
}

/* المحتوى */
.lecture-body{
padding:15px;
display:none;
}

/* زر */
.btn{
background:#334155;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn:hover{
background:#475569;
}

/* الدروس */
.lessons{
margin-top:10px;
display:none;
}

.lesson-item{
background:#020617;
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.lesson-item:hover{
background:#1e293b;
}

/* موبايل */
@media(max-width:600px){

.course-header h1{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="course-header" id="courseHeader"></div>

<div id="courseContainer"></div>

<script>

// 📥 تحميل الكورس
const index = localStorage.getItem("courseIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const course = data[index]

// 🟣 عنوان الكورس
document.getElementById("courseHeader").innerHTML = `
<h1>📚 ${course.title}</h1>
<p>${course.description || ""}</p>
`

const container = document.getElementById("courseContainer")

course.lectures.forEach((lec, i)=>{

container.innerHTML += `

<div class="lecture-card">

<div class="lecture-header" onclick="toggleLecture(${i})">
<div>
<h3>📖 ${lec.title}</h3>
<p>${lec.subtitle || ""}</p>
</div>
<span class="arrow" id="arrow-${i}">▼</span>
</div>

<div class="lecture-body" id="lecture-body-${i}">

${lec.lessons && lec.lessons.length ? `
<div class="btn" onclick="toggleLessons(${i})">
<span>📚 عرض الدروس (${lec.lessons.length})</span>
<span id="lessons-arrow-${i}">▼</span>
</div>

<div class="lessons" id="lessons-${i}">
${lec.lessons.map((l,j)=>`
<div class="lesson-item" onclick="openLesson(${i},${j})">
📌 ${l.title}
</div>
`).join("")}
</div>
` : ""}

${lec.examId !== null && lec.examId !== undefined ? `
<div class="btn" onclick="openExam(${lec.examId})">
<span>🧠 اختبار المحاضرة</span>
<span>▶</span>
</div>
` : ""}

</div>

</div>
`
})

})

// 🔽 طي المحاضرة
function toggleLecture(i){
const body = document.getElementById("lecture-body-"+i)
const arrow = document.getElementById("arrow-"+i)

if(body.style.display === "block"){
body.style.display = "none"
arrow.style.transform = "rotate(0deg)"
}else{
body.style.display = "block"
arrow.style.transform = "rotate(180deg)"
}
}

// 🔽 عرض الدروس
function toggleLessons(i){
const el = document.getElementById("lessons-"+i)
const arrow = document.getElementById("lessons-arrow-"+i)

if(el.style.display === "block"){
el.style.display = "none"
arrow.innerHTML = "▼"
}else{
el.style.display = "block"
arrow.innerHTML = "▲"
}
}

// 📖 فتح درس
function openLesson(lecIndex, lessonIndex){
localStorage.setItem("lectureIndex", lecIndex)
localStorage.setItem("lessonIndex", lessonIndex)
window.location.href = "lesson-view.html"
}

// 🧠 فتح امتحان
function openExam(id){
localStorage.setItem("quizIndex", id)
window.location.href = "quiz.html"
}

</script>

</body>
</html>
