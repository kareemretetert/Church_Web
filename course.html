<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الكورس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f172a;
color:#fff;
padding:15px;
}

/* الكارت */
.lecture-card{
background:#1e293b;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* الهيدر */
.lecture-header{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.lecture-header h3{
margin:0;
}

.lecture-header p{
margin:5px 0 0;
font-size:13px;
color:#ddd;
}

/* الأزرار */
.btn{
background:#334155;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
display:flex;
justify-content:space-between;
}

.btn:hover{
background:#475569;
}

/* دروس */
.lessons{
display:none;
margin-top:10px;
}

.lesson-item{
background:#0f172a;
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.lesson-item:hover{
background:#1e293b;
}

</style>
</head>

<body>

<div id="courseContainer"></div>

<script>

const index = localStorage.getItem("courseIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const course = data[index]
const container = document.getElementById("courseContainer")

course.lectures.forEach((lec, i)=>{

container.innerHTML += `
<div class="lecture-card">

<div class="lecture-header">
<h3>${lec.title}</h3>
<p>${lec.subtitle || ""}</p>
</div>

<div class="btn" onclick="toggleLessons(${i})">
<span>📚 عرض الدروس</span>
<span>▼</span>
</div>

<div class="lessons" id="lessons-${i}">
${lec.lessons.map((l,j)=>`
<div class="lesson-item" onclick="openLesson(${i},${j})">
📌 ${l.title}
</div>
`).join("")}
</div>

<div class="btn" onclick="openExam(${lec.examId})">
<span>🧠 الامتحان</span>
<span>▶</span>
</div>

</div>
`

})

})

// عرض/إخفاء الدروس
function toggleLessons(i){
const el = document.getElementById("lessons-"+i)
el.style.display = el.style.display === "block" ? "none" : "block"
}

// فتح درس
function openLesson(lecIndex, lessonIndex){

localStorage.setItem("lectureIndex", lecIndex)
localStorage.setItem("lessonIndex", lessonIndex)

window.location.href = "lesson-view.html"
}

// فتح امتحان
function openExam(id){
localStorage.setItem("quizIndex", id)
window.location.href="quiz.html"
}

</script>

</body>
</html>
