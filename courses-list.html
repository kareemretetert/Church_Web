<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#6a1b9a;
--primary-dark:#4a148c;
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--text:#fff;
--muted:#cbd5e1;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:var(--text);
}

/* 🔥 HEADER */
header{
text-align:center;
padding:30px 10px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
}

header h1{
margin:0;
font-size:clamp(22px,5vw,32px);
}

/* 🔥 CONTAINER */
.container{
max-width:1200px;
margin:25px auto;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* 🔥 CARD */
.card{
background:var(--card);
padding:18px;
border-radius:20px;
backdrop-filter: blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
transition:0.4s;
transform:translateY(20px);
opacity:0;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:scale(1.03);
}

/* صورة */
.course-img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* badge */
.badge{
background:rgba(255,255,255,0.1);
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
width:fit-content;
}

/* title */
.card h3{
margin:5px 0;
font-size:18px;
}

/* description */
.card p{
color:var(--muted);
font-size:14px;
margin-bottom:12px;
flex-grow:1;
}

/* instructor */
.instructor{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

/* button */
.start-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#8b5cf6,#6366f1);
color:white;
font-weight:bold;
cursor:pointer;
font-size:14px;
margin-top:auto;
transition:0.3s;
}

.start-btn:hover{
opacity:0.85;
}

/* 📱 موبايل */
@media(max-width:600px){

header{
padding:20px 10px;
}

.container{
grid-template-columns:1fr;
gap:12px;
}

.card{
padding:15px;
border-radius:15px;
}

.card h3{
font-size:16px;
}

.start-btn{
font-size:13px;
padding:10px;
}

}

</style>
</head>

<body>

<header>
<h1>📚 الكورسات الدينية</h1>
</header>

<div class="container" id="coursesContainer"></div>

<script>

// 📥 تحميل الكورسات (نفس فكرة quiz.json)
fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("coursesContainer")

data.forEach((course,index)=>{

container.innerHTML+=`
<div class="card" style="transition-delay:${index*0.1}s">

<img src="${course.image || 'https://via.placeholder.com/300x200'}" class="course-img">

<span class="badge">كورس</span>

<h3>${course.title}</h3>

<p>${course.description || 'لا يوجد وصف'}</p>

<div class="instructor">👤 ${course.instructor || 'غير محدد'}</div>

<button class="start-btn" onclick="openCourse(${index})">
عرض الكورس
</button>

</div>
`
})

// ✨ animation
setTimeout(()=>{
document.querySelectorAll(".card").forEach(card=>{
card.classList.add("show")
})
},200)

})

// 🔗 فتح الكورس
function openCourse(index){
localStorage.setItem("courseIndex", index)
window.location.href="course.html"
}

</script>

</body>
</html>
