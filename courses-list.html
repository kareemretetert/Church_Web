<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--text:#fff;
--muted:#cbd5e1;
--primary:#8b5cf6;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:var(--text);
}

/* 🔥 HEADER */
header{
text-align:center;
padding:30px 10px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
}

header h1{
margin:0;
font-size:clamp(22px,5vw,32px);
}

/* 🔍 SEARCH */
.search-box{
max-width:400px;
margin:20px auto 0;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

/* 📦 CONTAINER */
.container{
max-width:1200px;
margin:25px auto;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* 🧱 CARD */
.card{
background:var(--card);
border-radius:20px;
overflow:hidden;
backdrop-filter: blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.4s;
cursor:pointer;
transform:translateY(20px);
opacity:0;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* صورة */
.card img{
width:100%;
height:160px;
object-fit:cover;
}

/* محتوى */
.card-content{
padding:15px;
display:flex;
flex-direction:column;
}

/* badge */
.badge{
background:rgba(255,255,255,0.1);
padding:5px 10px;
border-radius:20px;
font-size:12px;
width:fit-content;
margin-bottom:10px;
}

/* title */
.card h3{
margin:5px 0;
font-size:18px;
}

/* desc */
.card p{
color:var(--muted);
font-size:14px;
flex-grow:1;
}

/* instructor */
.instructor{
font-size:13px;
color:#aaa;
margin:10px 0;
}

/* زر */
.start-btn{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#8b5cf6,#6366f1);
color:#fff;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
opacity:0.85;
}

/* ❌ empty */
.empty{
text-align:center;
opacity:0.7;
margin-top:50px;
}

/* 📱 موبايل */
@media(max-width:600px){

.container{
grid-template-columns:1fr;
gap:12px;
}

.card h3{
font-size:16px;
}

}

</style>
</head>

<body>

<header>
<h1>📚 الكورسات الدينية</h1>

<div class="search-box">
<input type="text" placeholder="ابحث عن كورس..." id="searchInput">
</div>

</header>

<div class="container" id="coursesContainer"></div>

<div class="empty" id="emptyMsg" style="display:none;">
🚫 لا يوجد كورسات حالياً
</div>

<script>

let allCourses = []

// 📥 تحميل الكورسات
fetch("courses.json")
.then(res=>res.json())
.then(data=>{

allCourses = data
renderCourses(data)

})

// 🎯 عرض الكورسات
function renderCourses(courses){

const container = document.getElementById("coursesContainer")
container.innerHTML = ""

if(courses.length === 0){
document.getElementById("emptyMsg").style.display="block"
return
}else{
document.getElementById("emptyMsg").style.display="none"
}

courses.forEach((course,index)=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML = `
<img src="${course.image || 'https://via.placeholder.com/300x200'}">

<div class="card-content">

<span class="badge">كورس</span>

<h3>${course.title}</h3>

<p>${course.description || 'لا يوجد وصف'}</p>

<div class="instructor">👤 ${course.instructor || 'غير محدد'}</div>

<button class="start-btn">عرض الكورس</button>

</div>
`

// 🔗 ربط
card.onclick = ()=>{
localStorage.setItem("courseIndex", index)
window.location.href="course.html"
}

container.appendChild(card)

})

// animation
setTimeout(()=>{
document.querySelectorAll(".card").forEach(c=>c.classList.add("show"))
},100)

}

// 🔍 البحث
document.getElementById("searchInput").addEventListener("input", function(){

const value = this.value.toLowerCase()

const filtered = allCourses.filter(c=>
c.title.toLowerCase().includes(value)
)

renderCourses(filtered)

})

</script>

</body>
</html>
