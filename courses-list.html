<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات الدينية</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    margin:0;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
}

/* هيدر */
.header{
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

/* جريد */
.courses{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:25px;
}

/* كارت */
.card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    overflow:hidden;
    backdrop-filter: blur(12px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.4s;
    transform:translateY(20px);
    opacity:0;
}

/* عند الظهور */
.card.show{
    transform:translateY(0);
    opacity:1;
}

.card:hover{
    transform:scale(1.03);
}

/* صورة */
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}

/* المحتوى */
.card-content{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
}

.desc{
    font-size:14px;
    color:#ccc;
    margin:8px 0;
}

.instructor{
    font-size:13px;
    color:#aaa;
}

/* زر */
.btn{
    display:block;
    text-align:center;
    background:linear-gradient(45deg,#8b5cf6,#6366f1);
    color:white;
    padding:10px;
    margin:15px;
    border-radius:12px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="header">📚 الكورسات الدينية</div>

<div class="courses" id="coursesContainer">
</div>

<script>

const courses = [
{
    id:1,
    title:"تفسير الكتاب المقدس",
    description:"شرح مبسط وعميق لآيات الكتاب المقدس",
    image:"https://via.placeholder.com/300x200",
    instructor:"أبونا يوسف"
},
{
    id:2,
    title:"العقيدة المسيحية",
    description:"فهم أساسيات الإيمان المسيحي",
    image:"https://via.placeholder.com/300x200",
    instructor:"أبونا داود"
}
];

const container = document.getElementById("coursesContainer");

courses.forEach((course,index)=>{
    container.innerHTML += `
    <div class="card" style="transition-delay:${index * 0.1}s">
        <img src="${course.image}">
        <div class="card-content">
            <div class="title">${course.title}</div>
            <div class="desc">${course.description}</div>
            <div class="instructor">👤 ${course.instructor}</div>
        </div>
        <a href="course.html?id=${course.id}" class="btn">عرض الكورس</a>
    </div>
    `;
});

// animation on load
setTimeout(()=>{
    document.querySelectorAll(".card").forEach(card=>{
        card.classList.add("show");
    });
},200);

</script>

</body>
</html>
