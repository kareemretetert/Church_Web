<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عرض الدرس</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--primary:#8b5cf6;
--text:#fff;
--muted:#cbd5e1;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
padding:15px;
}

/* العنوان */
.header{
text-align:center;
margin-bottom:20px;
}

.header h2{
margin:0;
}

/* المحتوى */
.content{
background:var(--card);
padding:15px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* الفيديو */
.video iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

/* صورة */
.image img{
width:100%;
border-radius:10px;
}

/* ملف */
.file a{
display:block;
background:#334155;
padding:12px;
border-radius:10px;
text-align:center;
color:white;
text-decoration:none;
margin-top:10px;
}

/* نص */
.text{
margin-top:15px;
line-height:1.8;
color:var(--muted);
}

/* زر رجوع */
.back-btn{
margin-top:20px;
display:block;
text-align:center;
padding:12px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border-radius:10px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="header" id="lessonHeader"></div>

<div class="content" id="lessonContent"></div>

<a href="course.html" class="back-btn">⬅ الرجوع للكورس</a>

<script>

const courseIndex = localStorage.getItem("courseIndex")
const lectureIndex = localStorage.getItem("lectureIndex")
const lessonIndex = localStorage.getItem("lessonIndex")

fetch("courses.json")
.then(res=>res.json())
.then(data=>{

const lesson = data[courseIndex]
                .lectures[lectureIndex]
                .lessons[lessonIndex]

const header = document.getElementById("lessonHeader")
const content = document.getElementById("lessonContent")

// 🟣 عنوان
header.innerHTML = `
<h2>📖 ${lesson.title}</h2>
`

let html = ""

// 🎥 فيديو
if(lesson.type === "video" && lesson.src){
html += `
<div class="video">
<iframe src="${lesson.src}" allowfullscreen></iframe>
</div>
`
}

// 🖼 صورة
if(lesson.type === "image" && lesson.src){
html += `
<div class="image">
<img src="${lesson.src}">
</div>
`
}

// 📄 PDF / ملف
if(lesson.type === "file" && lesson.src){
html += `
<div class="file">
<a href="${lesson.src}" target="_blank">📥 تحميل الملف</a>
</div>
`
}

// 📝 محتوى نصي
if(lesson.content){
html += `
<div class="text">${lesson.content}</div>
`
}

content.innerHTML = html

})

</script>

</body>
</html>
