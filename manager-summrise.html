<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة التلخيصات</title>

<style>

body{
font-family:Tajawal, Tahoma;
direction:rtl;
margin:0;
padding:20px;

/* خلفية متحركة */
background: linear-gradient(-45deg, #667eea, #764ba2, #43cea2, #185a9d);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* الكارد الأساسي */
.container{
max-width:720px;
margin:auto;
padding:25px;
border-radius:20px;

/* Glass effect 🔥 */
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);

box-shadow:0 10px 40px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

/* العناوين */
h2{
text-align:center;
color:#fff;
font-size:22px;
margin-bottom:10px;
}

/* labels */
label{
display:block;
margin-top:15px;
color:#eee;
font-weight:bold;
}

/* inputs */
input,textarea{
width:100%;
margin-top:8px;
padding:14px;
border-radius:12px;
border:none;
font-size:15px;
background:rgba(255,255,255,0.9);
box-sizing:border-box;
outline:none;
transition:0.3s;
}

input:focus,textarea:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* textarea */
textarea{
height:130px;
resize:none;
}

/* زرار رئيسي */
button{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;

/* Gradient احترافي */
background: linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;

transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* زرار الرفع */
.upload-btn{
background: linear-gradient(135deg,#43cea2,#185a9d);
color:#fff;
text-align:center;
padding:14px;
border-radius:15px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.upload-btn:hover{
transform:scale(1.05);
}

/* النص الصغير */
.upload-text{
font-size:13px;
color:#ddd;
margin-top:5px;
text-align:center;
}

/* الكروت */
.card{
background:rgba(255,255,255,0.9);
padding:18px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card-title{
font-size:18px;
font-weight:bold;
}

.card-date{
color:#555;
font-size:14px;
margin-top:5px;
}

.deleteBtn{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border:6px solid #eee;
border-top:6px solid #00c6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

#loader p{
color:white;
font-size:20px;
text-align:center;
line-height:1.6;
}

/* موبايل */
@media (max-width:600px){
.container{
max-width:95%;
padding:15px;
}
}
</style>

</head>

<body>

<div class="container">

<h2>إضافة تلخيص جديد</h2>

<label>العنوان</label>
<input id="title">

<label>التاريخ</label>
<input type="date" id="date">

<label>المحتوى</label>
<textarea id="content"></textarea>

<label>إضافة صور</label>
<div class="upload-btn" onclick="document.getElementById('images').click()">اختر صورة</div>
<div class="upload-text" id="imgText">لم يتم اختيار أي صورة</div>
<input type="file" id="images" multiple accept="image/*" hidden>

<label>إضافة فيديوهات</label>
<div class="upload-btn" onclick="document.getElementById('videos').click()">اختر فيديو</div>
<div class="upload-text" id="vidText">لم يتم اختيار أي فيديو</div>
<input type="file" id="videos" multiple accept="video/*" hidden>

<label>إضافة ملفات</label>
<div class="upload-btn" onclick="document.getElementById('files').click()">اختر ملف PDF</div>
<div class="upload-text" id="fileText">لم يتم اختيار أي ملف</div>
<input type="file" id="files" multiple hidden>

<button id="publish">نشر التلخيص</button>

<h2>التلخيصات الحالية</h2>

<div id="summariesList"></div>

</div>

<script>

const password="kimo123"
const entered=prompt("ادخل كلمة المرور")

if(entered!==password){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>كلمة المرور غير صحيحة</h2>"
throw new Error("access denied")
}

let summaries=[]

const publishBtn = document.getElementById("publish")

const progressBar = document.createElement("div")
progressBar.style.height="10px"
progressBar.style.background="#ccc"
progressBar.style.marginTop="10px"
progressBar.innerHTML='<div id="progress" style="height:100%;width:0;background:green;"></div>'
document.querySelector(".container").prepend(progressBar)

const progress = document.getElementById("progress")

const spinner = document.createElement("div")
spinner.innerHTML="⏳ جاري الرفع..."
spinner.style.textAlign="center"
spinner.style.marginTop="10px"
spinner.style.display="none"
document.querySelector(".container").prepend(spinner)

async function loadSummaries(){
try{
const res=await fetch("summaries.json")
summaries=await res.json()
if(!Array.isArray(summaries)) summaries=[]
renderSummaries()
}catch{
document.getElementById("summariesList").innerHTML=
"<p style='color:#777'>لا يمكن تحميل التلخيصات</p>"
}
}
window.onload=loadSummaries

async function uploadToCloudinary(file){
let resourceType = "auto"
if(file.type.includes("pdf")){
resourceType = "raw"
}
const url = `https://api.cloudinary.com/v1_1/ddiegmhji/${resourceType}/upload`
const formData = new FormData()
formData.append("file", file)
formData.append("upload_preset", "my_upload")
const res = await fetch(url,{
method:"POST",
body:formData
})
const data = await res.json()
if(!data.secure_url) throw "upload failed"
return data.secure_url
}

document.getElementById("publish").onclick=async()=>{
showLoader()
publishBtn.disabled = true
spinner.style.display="block"
progress.style.width="0%"
try{
const title=document.getElementById("title").value
const date=document.getElementById("date").value
const content=document.getElementById("content").value
if(!title || !date || !content){
hideLoader()
alert("اكتب كل البيانات")
publishBtn.disabled=false
spinner.style.display="none"
return
}
const imageFiles = document.getElementById("images").files;
const videoFiles = document.getElementById("videos").files;
const fileFiles = document.getElementById("files").files;
let images=[]
let videos=[]
let files=[]
let total = imageFiles.length + videoFiles.length + fileFiles.length
let done = 0
function updateProgress(){
done++
if(total > 0){
progress.style.width = ((done/total)*100) + "%"
}
}
for(let f of imageFiles){
try{
const url = await uploadToCloudinary(f)
images.push(url)
updateProgress()
}catch{
alert("فشل رفع صورة")
}
}
for(let f of videoFiles){
try{
const url = await uploadToCloudinary(f)
videos.push(url)
updateProgress()
}catch{
alert("فشل رفع فيديو: " + f.name)
}
}
for(let f of fileFiles){
try{
const url = await uploadToCloudinary(f)
files.push(url)
updateProgress()
}catch{
alert("فشل رفع ملف: " + f.name)
}
}
const newSummary={title,date,content,images,videos,files}
summaries.unshift(newSummary)
await updateJSONFile(summaries)
renderSummaries()
hideLoader()
spinner.style.display="none"
publishBtn.disabled=false
alert("تم نشر التلخيص 🎉")
}catch(e){
hideLoader()
spinner.style.display="none"
publishBtn.disabled=false
alert("حصل خطأ")
console.log(e)
}
}

document.body.addEventListener("dragover", e=>{
e.preventDefault()
document.body.style.background="#e3f2fd"
})

document.body.addEventListener("dragleave", ()=>{
document.body.style.background=""
})

document.body.addEventListener("drop", e=>{
e.preventDefault()
document.body.style.background=""
const files = e.dataTransfer.files
document.getElementById("files").files = files
})

function renderSummaries(){
const container=document.getElementById("summariesList")
container.innerHTML=""
if(!summaries.length){
container.innerHTML="<p style='color:#777'>لا يوجد تلخيصات حالياً</p>"
return
}
summaries.forEach((s,i)=>{
const card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="card-title">${s.title}</div>
<div class="card-date">📅 ${s.date}</div>
<p>${s.content.substring(0,120)}...</p>
<button class="deleteBtn" onclick="deleteSummary(${i})">حذف</button>
`
container.appendChild(card)
})
}








images.onchange = () => {
imgText.innerText = images.files.length ? "تم اختيار صور" : "لم يتم اختيار أي صورة";
}

videos.onchange = () => {
vidText.innerText = videos.files.length ? "تم اختيار فيديو" : "لم يتم اختيار أي فيديو";
}

files.onchange = () => {
fileText.innerText = files.files.length ? "تم اختيار ملفات" : "لم يتم اختيار أي ملف";
}







  
function showLoader(){
document.getElementById("loader").style.display="flex"
}

function hideLoader(){
document.getElementById("loader").style.display="none"
}

async function deleteSummary(index){
if(!confirm("هل تريد حذف هذا التلخيص؟")) return
summaries.splice(index,1)
await updateJSONFile(summaries)
renderSummaries()
}

async function updateJSONFile(data){
await fetch("/.netlify/functions/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
}
document.getElementById("date").value =
new Date().toISOString().split("T")[0];
</script>

<div id="loader">
<div class="spinner"></div>
<p>
جاري رفع التلخيص... ⏳<br>
قد يستغرق الأمر القليل من الوقت
</p>
</div>

</body>
</html>
