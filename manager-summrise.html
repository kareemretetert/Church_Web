```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة إدارة التلخيصات</title>

<style>
body{
font-family:Tajawal;
direction:rtl;
background:#f0f2f5;
padding:30px;
}

.container{max-width:900px;margin:auto;}

input,textarea,button{
width:100%;
margin-top:10px;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
cursor:pointer;
}

.progress-bar{
width:100%;
height:10px;
background:#ddd;
margin-top:10px;
border-radius:6px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#2e7d32;
}

.spinner{
text-align:center;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>إضافة تلخيص</h2>

<input id="title" placeholder="العنوان">
<input type="date" id="date">
<textarea id="content" placeholder="المحتوى"></textarea>

<input id="youtubeLink" placeholder="رابط YouTube (اختياري)">

<input type="file" id="images" multiple>
<input type="file" id="videos" multiple>
<input type="file" id="files" multiple>

<button id="publish">نشر</button>

<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div class="spinner" id="spinner">⏳ جاري الرفع...</div>

</div>

<script>

const CLOUD_NAME="ddiegmhji"
const PRESET="my_upload"

function getYouTubeEmbed(url){
let id=""
if(url.includes("watch?v=")) id=url.split("v=")[1].split("&")[0]
else if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1]
else if(url.includes("embed/")) id=url.split("embed/")[1]
if(!id) return null
return "https://www.youtube.com/embed/"+id
}

async function uploadFile(file){

const url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`

const formData=new FormData()
formData.append("file",file)
formData.append("upload_preset",PRESET)

const res=await fetch(url,{method:"POST",body:formData})
const data=await res.json()

if(!data.secure_url) throw "upload failed"

return data.secure_url
}

document.getElementById("publish").onclick=async()=>{

const btn=document.getElementById("publish")
const spinner=document.getElementById("spinner")
const progress=document.getElementById("progress")

btn.disabled=true
spinner.style.display="block"

const title=title.value
const date=document.getElementById("date").value
const content=document.getElementById("content").value
const youtube=document.getElementById("youtubeLink").value

let images=[],videos=[],files=[]

const imgFiles=imagesInput=document.getElementById("images").files
const vidFiles=document.getElementById("videos").files
const fileFiles=document.getElementById("files").files

let total=imgFiles.length+vidFiles.length+fileFiles.length
let done=0

function update(){
done++
progress.style.width=((done/total)*100)+"%"
}

// صور
for(let f of imgFiles){
images.push(await uploadFile(f))
update()
}

// فيديو
for(let f of vidFiles){
if(f.size > 20*1024*1024){
alert("ارفع الفيديو على YouTube")
continue
}
videos.push(await uploadFile(f))
update()
}

// ملفات
for(let f of fileFiles){
files.push(await uploadFile(f))
update()
}

// يوتيوب
if(youtube){
const embed=getYouTubeEmbed(youtube)
if(embed) videos.push(embed)
}

// حفظ
const newSummary={title,date,content,images,videos,files}

await fetch("/.netlify/functions/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify([newSummary])
})

alert("تم النشر 🎉")

spinner.style.display="none"
btn.disabled=false

}

</script>

</body>
</html>
