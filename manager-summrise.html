<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>لوحة إدارة التلخيصات</title>

<style>

body{
font-family:Tajawal, Tahoma;
direction:rtl;
background:#f0f2f5;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h2{
margin-top:40px;
}

input,textarea,button{
width:100%;
margin-top:10px;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
height:140px;
}

button{
background:#2e7d32;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card-title{
font-size:18px;
font-weight:bold;
}

.card-date{
color:#777;
font-size:14px;
margin-top:5px;
}

.deleteBtn{
margin-top:10px;
background:#d32f2f;
}

.deleteBtn:hover{
background:#b71c1c;
}

/* progress bar */
.progress-bar{
width:100%;
height:10px;
background:#ddd;
margin-top:10px;
border-radius:6px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#2e7d32;
transition:0.3s;
}

/* spinner */
.spinner{
text-align:center;
margin-top:10px;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>إضافة تلخيص جديد</h2>

<label>العنوان</label>
<input id="title">

<label>التاريخ</label>
<input type="date" id="date">

<label>المحتوى</label>
<textarea id="content"></textarea>

<label>رابط YouTube (اختياري لو الفيديو كبير)</label>
<input id="youtubeLink" placeholder="الصق رابط الفيديو هنا">

<label>إضافة صور</label>
<input type="file" id="images" multiple accept="image/*">

<label>إضافة فيديوهات صغيرة</label>
<input type="file" id="videos" multiple accept="video/*">

<label>إضافة ملفات (PDF - Word - إلخ)</label>
<input type="file" id="files" multiple>

<button id="publish">نشر التلخيص</button>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div class="spinner" id="spinner">⏳ جاري الرفع...</div>

<h2>التلخيصات الحالية</h2>

<div id="summariesList"></div>

</div>

<script>

const password="kimo123"
const entered=prompt("ادخل كلمة المرور")

if(entered!==password){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>كلمة المرور غير صحيحة</h2>"
throw new Error("access denied")
}

let summaries=[]

// تحميل التلخيصات
async function loadSummaries(){
try{
const res=await fetch("summaries.json")
summaries=await res.json()

if(!Array.isArray(summaries)) summaries=[]

renderSummaries()

}catch{
document.getElementById("summariesList").innerHTML=
"<p style='color:#777'>لا يمكن تحميل التلخيصات</p>"
}
}

window.onload=loadSummaries

// رفع على Cloudinary
async function uploadToCloudinary(file){

const url = "https://api.cloudinary.com/v1_1/ddiegmhji/auto/upload"

const formData = new FormData()
formData.append("file", file)
formData.append("upload_preset", "my_upload")

const res = await fetch(url,{
method:"POST",
body:formData
})

const data = await res.json()

if(!data.secure_url) throw "upload failed"

return data.secure_url
}

// زر النشر
document.getElementById("publish").onclick=async()=>{

const publishBtn=document.getElementById("publish")
const spinner=document.getElementById("spinner")
const progress=document.getElementById("progress")

// منع الضغط مرتين
publishBtn.disabled=true
spinner.style.display="block"
progress.style.width="0%"

const title=document.getElementById("title").value
const date=document.getElementById("date").value
const content=document.getElementById("content").value
const youtubeLink=document.getElementById("youtubeLink").value

if(!title || !date || !content){
alert("اكتب كل البيانات")
publishBtn.disabled=false
spinner.style.display="none"
return
}

const imageFiles=document.getElementById("images").files
const videoFiles=document.getElementById("videos").files
const fileFiles=document.getElementById("files").files

let images=[]
let videos=[]
let files=[]

let total=imageFiles.length+videoFiles.length+fileFiles.length
let done=0

function updateProgress(){
done++
progress.style.width=((done/total)*100)+"%"
}

// صور
for(let f of imageFiles){
try{
const url=await uploadToCloudinary(f)
images.push(url)
updateProgress()
}catch{
alert("فشل رفع صورة")
}
}

// فيديو صغير
for(let f of videoFiles){
try{

if(f.size > 20 * 1024 * 1024){
alert("الفيديو كبير - ارفعه على YouTube")
continue
}

const url=await uploadToCloudinary(f)
videos.push(url)
updateProgress()

}catch{
alert("فشل رفع فيديو")
}
}

// ملفات
for(let f of fileFiles){
try{
const url=await uploadToCloudinary(f)
files.push(url)
updateProgress()
}catch{
alert("فشل رفع ملف")
}
}

// يوتيوب
if(youtubeLink){
const id=youtubeLink.split("v=")[1]?.split("&")[0]
if(id){
videos.push("https://www.youtube.com/embed/"+id)
}
}

// إنشاء التلخيص
const newSummary={
title,
date,
content,
images,
videos,
files
}

summaries.unshift(newSummary)

await updateJSONFile(summaries)

renderSummaries()

spinner.style.display="none"
publishBtn.disabled=false

alert("تم نشر التلخيص 🎉")

}

// عرض التلخيصات
function renderSummaries(){

const container=document.getElementById("summariesList")
container.innerHTML=""

if(!summaries.length){
container.innerHTML="<p style='color:#777'>لا يوجد تلخيصات حالياً</p>"
return
}

summaries.forEach((s,i)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="card-title">${s.title}</div>
<div class="card-date">📅 ${s.date}</div>
<p>${s.content.substring(0,120)}...</p>

<button class="deleteBtn" onclick="deleteSummary(${i})">
حذف التلخيص
</button>
`

container.appendChild(card)

})

}

// حذف
async function deleteSummary(index){

if(!confirm("هل تريد حذف هذا التلخيص؟")) return

summaries.splice(index,1)

await updateJSONFile(summaries)

renderSummaries()

}

// تحديث JSON
async function updateJSONFile(data){

await fetch("/.netlify/functions/save",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

}

// Drag & Drop
document.body.addEventListener("dragover", e=>{
e.preventDefault()
document.body.style.background="#e3f2fd"
})

document.body.addEventListener("dragleave", ()=>{
document.body.style.background=""
})

document.body.addEventListener("drop", e=>{
e.preventDefault()
document.body.style.background=""

const droppedFiles=e.dataTransfer.files
document.getElementById("files").files=droppedFiles
})

</script>

</body>
</html>
