<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="imgsfile/icon.png" rel="icon" type="image/x-icon"/>
<title>تفسير الكتاب المقدس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --p:#7c3aed;--p-dk:#5b21b6;--p-lt:#a78bfa;
  --bg:#f4f0fb;--sf:#fff;--sf2:#f1ecfc;
  --tx:#0f172a;--tx2:#374151;--tx3:#6b7280;
  --bdr:#e2e8f0;
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh2:0 8px 32px rgba(109,40,217,.18);
  --shdr:0 6px 24px rgba(109,40,217,.25);
  --hdr1:#7c3aed;--hdr2:#9333ea;--hdr3:#5b21b6;
}
body.dark{
  --bg:#0d0d1a;--sf:#161627;--sf2:#1e1e33;
  --tx:#f0f0ff;--tx2:#c4c4e0;--tx3:#8888aa;
  --bdr:#2a2a44;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
  --shdr:0 6px 24px rgba(0,0,0,.6);
  --hdr1:#0f172a;--hdr2:#1e1b4b;--hdr3:#020617;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* PARTICLES */
#particles{position:fixed;inset:0;width:100%;height:100%;z-index:-10;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.12),transparent 40%),radial-gradient(circle at 80% 30%,rgba(59,130,246,.10),transparent 45%),radial-gradient(circle at 50% 80%,rgba(236,72,153,.08),transparent 50%);z-index:-20;}

/* HEADER */
header{background:linear-gradient(135deg,var(--hdr1),var(--hdr2),var(--hdr3));position:sticky;top:0;z-index:300;box-shadow:var(--shdr);overflow:hidden;transition:background .4s;}
header::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);border-radius:22px;background:rgba(255,255,255,.15);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;text-decoration:none;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{flex:1;text-align:center;color:#fff;font-size:clamp(14px,3.5vw,19px);font-weight:800;}
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{width:64px;height:32px;border-radius:50px;background:#1e293b;position:relative;display:flex;align-items:center;padding:0 5px;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);transition:background .3s;-webkit-tap-highlight-color:transparent;}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;right:3px;transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;box-shadow:0 2px 8px rgba(0,0,0,.25);}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* PAGE */
.page{max-width:820px;margin:0 auto;padding:24px 14px 70px;}

/* CURRENT TITLE */
.current-title{
  text-align:center;margin-bottom:16px;
  font-size:15px;font-weight:700;color:var(--p);
  animation:fadeUp .4s both;
}
body.dark .current-title{color:var(--p-lt);}

/* CONTROL CARD */
.control-card{
  background:var(--sf);border-radius:22px;
  box-shadow:var(--sh);border:1px solid var(--bdr);
  padding:22px;margin-bottom:20px;
  animation:fadeUp .5s both;
}

/* TESTAMENT BUTTONS */
.testament-btns{display:flex;gap:12px;margin-bottom:20px;}
.testament-btn{
  flex:1;padding:13px;border:none;border-radius:14px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;
  background:var(--sf2);color:var(--tx2);border:1.5px solid var(--bdr);
  transition:all .2s;
}
.testament-btn:hover{border-color:var(--p);color:var(--p);}
.testament-btn.active{
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;border-color:transparent;
  box-shadow:0 6px 18px rgba(109,40,217,.3);
}

/* SELECTS */
.select-label{font-size:12px;font-weight:700;color:var(--tx3);margin-bottom:6px;display:block;}
.styled-select{
  width:100%;padding:13px 16px;border-radius:14px;
  border:1.5px solid var(--bdr);
  background:var(--sf);color:var(--tx);
  font-family:'Cairo',sans-serif;font-size:15px;
  cursor:pointer;outline:none;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg fill='%237c3aed' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;background-position:left 12px center;
  transition:border-color .2s,box-shadow .2s;
  margin-bottom:14px;
}
.styled-select:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(124,58,237,.15);}
.styled-select:hover{border-color:var(--p);}

/* VIDEO */
.video-card{
  background:var(--sf);border-radius:22px;
  box-shadow:var(--sh);border:1px solid var(--bdr);
  overflow:hidden;animation:fadeUp .5s .1s both;
}
.video-wrap{position:relative;padding-bottom:58%;height:0;overflow:hidden;border-radius:0;}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:600px){
  .page{padding:14px 10px 70px;}
  .testament-btns{gap:8px;}
  .testament-btn{font-size:13px;padding:11px;}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<header>
  <div class="hdr">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      الرئيسية
    </a>
    <div class="hdr-title">📖 تفسير الكتاب المقدس</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">

  <div id="currentTitle" class="current-title">جاري التحميل...</div>

  <div class="control-card">
    <!-- أزرار العهد -->
    <div class="testament-btns">
      <button class="testament-btn active" id="newBtn" onclick="setType('new')">📗 العهد الجديد</button>
      <button class="testament-btn" id="oldBtn" onclick="setType('old')">📘 العهد القديم</button>
    </div>

    <!-- اختيار السفر -->
    <label class="select-label">اختر السفر</label>
    <select class="styled-select" id="booksSelect"></select>

    <!-- اختيار الإصحاح -->
    <label class="select-label">اختر الإصحاح</label>
    <select class="styled-select" id="chapterSelect"></select>
  </div>

  <!-- الفيديو -->
  <div class="video-card">
    <div class="video-wrap">
      <iframe id="videoFrame" allowfullscreen></iframe>
    </div>
  </div>

</div>

<script>
/* ═══ THEME ═══ */
(function(){
  const s=localStorage.getItem("cv_theme");
  const d=window.matchMedia("(prefers-color-scheme:dark)").matches;
  applyTheme(s||(d?"dark":"light"));
})();
function applyTheme(m){document.body.classList.toggle("dark",m==="dark");localStorage.setItem("cv_theme",m);}
function toggleTheme(){applyTheme(document.body.classList.contains("dark")?"light":"dark");}

/* ═══ DATA ═══ */
const data={
  new:{
    "إنجيل متى":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:28},
    "إنجيل مرقس":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:16},
    "إنجيل لوقا":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:24},
    "إنجيل يوحنا":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:21}
  },
  old:{
    "سفر التكوين":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:50},
    "سفر الخروج":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:40},
    "سفر المزامير":{playlist:"PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",chapters:150}
  }
};

let currentType="new";
const booksSelect=document.getElementById("booksSelect");
const chapterSelect=document.getElementById("chapterSelect");
const videoFrame=document.getElementById("videoFrame");

function setType(type){
  currentType=type;
  document.getElementById("newBtn").classList.toggle("active",type==="new");
  document.getElementById("oldBtn").classList.toggle("active",type==="old");
  loadBooks();
}

function loadBooks(){
  booksSelect.innerHTML="";
  Object.keys(data[currentType]).forEach(book=>{
    const opt=document.createElement("option");
    opt.value=book;opt.textContent=book;
    booksSelect.appendChild(opt);
  });
  loadChapters();
}

function loadChapters(){
  chapterSelect.innerHTML="";
  const book=booksSelect.value;
  const chapters=data[currentType][book].chapters;
  for(let i=1;i<=chapters;i++){
    const opt=document.createElement("option");
    opt.value=i-1;opt.textContent="الإصحاح "+i;
    chapterSelect.appendChild(opt);
  }
  playVideo();
}

function playVideo(){
  const book=booksSelect.value;
  const index=chapterSelect.value;
  const list=data[currentType][book].playlist;
  document.getElementById("currentTitle").innerText=book+" – الإصحاح "+(parseInt(index)+1);
  videoFrame.src=`https://www.youtube.com/embed/videoseries?list=${list}&index=${index}`;
  localStorage.setItem("lastVideo",videoFrame.src);
}

booksSelect.addEventListener("change",loadChapters);
chapterSelect.addEventListener("change",playVideo);
loadBooks();

const saved=localStorage.getItem("lastVideo");
if(saved) videoFrame.src=saved;

/* ═══ PARTICLES ═══ */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);
const P=[];for(let i=0;i<80;i++)P.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2.2+.5,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6});
function animate(){ctx.clearRect(0,0,w,h);for(let p of P){p.x+=p.dx;p.y+=p.dy;if(p.x>w)p.x=0;if(p.x<0)p.x=w;if(p.y>h)p.y=0;if(p.y<0)p.y=h;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=document.body.classList.contains("dark")?"rgba(167,139,250,.35)":"rgba(124,58,237,.25)";ctx.fill();}requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
