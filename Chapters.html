<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفسير الكتاب المقدس</title>

<style>
body{
font-family:Tajawal, Tahoma;
direction:rtl;
margin:0;
padding:20px;

background: linear-gradient(-45deg, #667eea, #764ba2, #43cea2, #185a9d);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:720px;
margin:auto;
padding:25px;
border-radius:20px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

h2{
text-align:center;
color:#fff;
}

select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:15px;
background:rgba(255,255,255,0.9);
}

button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
background: linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
}

button:hover{
transform:scale(1.05);
}

#videoContainer{
margin-top:20px;
position:relative;
width:100%;
padding-bottom:56.25%;
border-radius:15px;
overflow:hidden;
}

#videoContainer iframe{
position:absolute;
width:100%;
height:100%;
}

</style>
</head>
<body>

<div class="container">
<h2>تفسير الكتاب المقدس</h2>

<button onclick="setType('new')">📗 العهد الجديد</button>
<button onclick="setType('old')">📘 العهد القديم</button>

<select id="booksSelect"></select>
<select id="chapterSelect"></select>

<div id="videoContainer">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

</div>

<script>

const data = {
  new: {
    "إنجيل متى": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 28
    }
  },
  old: {
    "سفر التكوين": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 50
    }
  }
};

let currentType = "new";

const booksSelect = document.getElementById("booksSelect");
const chapterSelect = document.getElementById("chapterSelect");
const videoFrame = document.getElementById("videoFrame");

function setType(type){
  currentType = type;
  loadBooks();
}

function loadBooks(){
  booksSelect.innerHTML = "";

  Object.keys(data[currentType]).forEach(book=>{
    const option = document.createElement("option");
    option.value = book;
    option.textContent = book;
    booksSelect.appendChild(option);
  });

  loadChapters();
}

function loadChapters(){
  chapterSelect.innerHTML = "";

  const book = booksSelect.value;
  const chapters = data[currentType][book].chapters;

  for(let i=1;i<=chapters;i++){
    const option = document.createElement("option");
    option.value = i-1;
    option.textContent = "الإصحاح " + i;
    chapterSelect.appendChild(option);
  }

  playVideo();
}

function playVideo(){
  const book = booksSelect.value;
  const index = chapterSelect.value;
  const list = data[currentType][book].playlist;

  videoFrame.src = `https://www.youtube.com/embed/videoseries?list=${list}&index=${index}`;
}

booksSelect.addEventListener("change", loadChapters);
chapterSelect.addEventListener("change", playVideo);

loadBooks();

</script>

</body>
</html>
