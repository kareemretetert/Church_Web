<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفسير الكتاب المقدس</title>

<style>
body{
font-family:Tajawal, Tahoma;
direction:rtl;
margin:0;
padding:20px;

background: linear-gradient(-45deg, #667eea, #764ba2, #43cea2, #185a9d);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
border-radius:25px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

h2{
text-align:center;
color:#fff;
}

select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:15px;
background:rgba(255,255,255,0.9);
}
.activeBtn{
background: linear-gradient(135deg,#43cea2,#185a9d);
box-shadow:0 0 10px rgba(255,255,255,0.6);
transform:scale(1.05);
}
button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
background: linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
}

button:hover{
transform:scale(1.05);
}

#videoContainer{
margin-top:25px;
position:relative;
width:100%;
padding-bottom:65%;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

#videoContainer iframe{
position:absolute;
width:100%;
height:100%;
}
@media (max-width:600px){

body{
    padding:10px;
}

/* تكبير الكارد */
.container{
    max-width:100%;
    padding:20px;
    border-radius:20px;
}

/* تكبير العنوان */
h2{
    font-size:22px;
}

/* تكبير الـ select */
select{
    padding:16px;
    font-size:17px;
}

/* تكبير الأزرار */
button{
    padding:16px;
    font-size:17px;
}

/* تكبير الفيديو */
#videoContainer{
    padding-bottom:90%;
}

}

}
</style>
</head>
<body>
<h3 id="title" style="color:white;text-align:center;"></h3>
<div class="container">
<h2>تفسير الكتاب المقدس</h2>

<button id="newBtn" onclick="setType('new')">📗 العهد الجديد</button>
<button id="oldBtn" onclick="setType('old')">📘 العهد القديم</button>

<select id="booksSelect"></select>
<select id="chapterSelect"></select>

<div id="videoContainer">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

</div>

  
<script>

const data = {
  new: {
    "إنجيل متى": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 28
    }
  },
  old: {
    "سفر التكوين": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 50
    }
  }
};

let currentType = "new";

const booksSelect = document.getElementById("booksSelect");
const chapterSelect = document.getElementById("chapterSelect");
const videoFrame = document.getElementById("videoFrame");

function setType(type){
  currentType = type;
  loadBooks();
}

function loadBooks(){
  booksSelect.innerHTML = "";

  Object.keys(data[currentType]).forEach(book=>{
    const option = document.createElement("option");
    option.value = book;
    option.textContent = book;
    booksSelect.appendChild(option);
  });

  loadChapters();
}

function loadChapters(){
  chapterSelect.innerHTML = "";

  const book = booksSelect.value;
  const chapters = data[currentType][book].chapters;

  for(let i=1;i<=chapters;i++){
    const option = document.createElement("option");
    option.value = i-1;
    option.textContent = "الإصحاح " + i;
    chapterSelect.appendChild(option);
  }

  playVideo();
}

function playVideo(){
  const book = booksSelect.value;
  const index = chapterSelect.value;
  const list = data[currentType][book].playlist;

  document.getElementById("title").innerText =
    book + " - الإصحاح " + (parseInt(index)+1);

  videoFrame.src = `https://www.youtube.com/embed/videoseries?list=${list}&index=${index}`;
    localStorage.setItem("lastVideo", videoFrame.src);
}

booksSelect.addEventListener("change", loadChapters);
chapterSelect.addEventListener("change", playVideo);

loadBooks();

const saved = localStorage.getItem("lastVideo");
if(saved){
  videoFrame.src = saved;
}

</script>

</body>
</html>
