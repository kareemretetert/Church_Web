<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفسير الكتاب المقدس</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma;
    background: linear-gradient(#0b1a4a,#0e2a7a);
    color: white;
    margin: 0;
    direction: rtl;
}

header {
    background: #3f51b5;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    padding: 15px;
}

.show {
    cursor: pointer;
    background: #ccc;
    border-radius: 12px;
    padding: 10px 20px;
    margin: 5px;
    border: none;
    font-size: 16px;
}

.cli {
    background: white;
}

select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    font-size: 16px;
}

#videoContainer {
    margin-top: 20px;
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
}

#videoContainer iframe {
    position: absolute;
    width: 100%;
    height: 100%;
}

</style>
</head>
<body>

<header>تفسير الكتاب المقدس</header>

<div class="container">

<div style="text-align:center;">
<button class="show cli" id="newBtn">العهد الجديد</button>
<button class="show" id="oldBtn">العهد القديم</button>
</div>

<select id="booksSelect"></select>
<select id="chapterSelect"></select>

<div id="videoContainer">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

</div>

<script>

const data = {
  "new": {
    "إنجيل متى": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 28
    }
  },
  "old": {
    "سفر التكوين": {
      playlist: "PLxMXV9f8dTBXwNeuQZ_R61TqLXKU84BWq",
      chapters: 50
    }
  }
};

let currentType = "new";

const booksSelect = document.getElementById("booksSelect");
const chapterSelect = document.getElementById("chapterSelect");
const videoFrame = document.getElementById("videoFrame");

function loadBooks() {
  booksSelect.innerHTML = "";

  Object.keys(data[currentType]).forEach(book => {
    const option = document.createElement("option");
    option.textContent = book;
    option.value = book;
    booksSelect.appendChild(option);
  });

  loadChapters();
}

function loadChapters() {
  chapterSelect.innerHTML = "";

  const book = booksSelect.value;
  const chapters = data[currentType][book].chapters;

  for (let i = 1; i <= chapters; i++) {
    const option = document.createElement("option");
    option.value = i - 1;
    option.textContent = "الإصحاح " + i;
    chapterSelect.appendChild(option);
  }

  playVideo();
}

function playVideo() {
  const book = booksSelect.value;
  const index = chapterSelect.value;
  const list = data[currentType][book].playlist;

  videoFrame.src = `https://www.youtube.com/embed/videoseries?list=${list}&index=${index}`;
}

booksSelect.addEventListener("change", loadChapters);
chapterSelect.addEventListener("change", playVideo);

// buttons

document.getElementById("newBtn").onclick = () => {
  currentType = "new";
  loadBooks();
};

document.getElementById("oldBtn").onclick = () => {
  currentType = "old";
  loadBooks();
};

loadBooks();

</script>

</body>
</html>
