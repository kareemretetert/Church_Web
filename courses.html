<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات الدينية</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    margin:0;
    background:#f5f5f5;
}

/* عنوان الصفحة */
.header{
    background:#6a3ab2;
    color:white;
    padding:20px;
    text-align:center;
    font-size:22px;
}

/* جريد الكورسات */
.courses{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* الكارت */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* صورة الكورس */
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

/* محتوى الكارت */
.card-content{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    font-size:14px;
    color:#555;
    margin-bottom:10px;
}

.instructor{
    font-size:13px;
    color:#888;
}

/* زر */
.btn{
    display:block;
    text-align:center;
    background:#6a3ab2;
    color:white;
    padding:10px;
    margin:15px;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="header">📚 الكورسات الدينية</div>

<div class="courses" id="coursesContainer">
</div>

<script>

// بيانات تجريبية (هنستبدلها بالداتابيز بعدين)
const courses = [
{
    id:1,
    title:"تفسير الكتاب المقدس",
    description:"شرح مبسط وعميق لآيات الكتاب المقدس",
    image:"imgsfile/bg.png",
    instructor:"أبونا يوسف"
},
{
    id:2,
    title:"العقيدة المسيحية",
    description:"فهم أساسيات الإيمان المسيحي",
    image:"imgsfile/icon.png",
    instructor:"أبونا داود"
}
];

const container = document.getElementById("coursesContainer");

courses.forEach(course=>{
    container.innerHTML += `
    <div class="card">
        <img src="${course.image}">
        <div class="card-content">
            <div class="title">${course.title}</div>
            <div class="desc">${course.description}</div>
            <div class="instructor">👤 ${course.instructor}</div>
        </div>
        <a href="course.html?id=${course.id}" class="btn">عرض الكورس</a>
    </div>
    `;
});

</script>

</body>
</html>
