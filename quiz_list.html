<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="imgsfile/icon.png" rel="icon" type="image/x-icon"/>
<title>الامتحانات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --p:#7c3aed;--p-dk:#5b21b6;--p-lt:#a78bfa;
  --bg:#f4f0fb;--sf:#fff;--sf2:#f1ecfc;
  --tx:#0f172a;--tx2:#374151;--tx3:#6b7280;
  --bdr:#e2e8f0;
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh2:0 8px 32px rgba(109,40,217,.18);
  --shdr:0 6px 24px rgba(109,40,217,.25);
  --hdr1:#7c3aed;--hdr2:#9333ea;--hdr3:#5b21b6;
}
body.dark{
  --bg:#0d0d1a;--sf:#161627;--sf2:#1e1e33;
  --tx:#f0f0ff;--tx2:#c4c4e0;--tx3:#8888aa;
  --bdr:#2a2a44;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
  --shdr:0 6px 24px rgba(0,0,0,.6);
  --hdr1:#0f172a;--hdr2:#1e1b4b;--hdr3:#020617;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* PARTICLES */
#particles{position:fixed;inset:0;width:100%;height:100%;z-index:-10;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.12),transparent 40%),radial-gradient(circle at 80% 30%,rgba(59,130,246,.10),transparent 45%),radial-gradient(circle at 50% 80%,rgba(236,72,153,.08),transparent 50%);z-index:-20;}

/* HEADER */
header{background:linear-gradient(135deg,var(--hdr1),var(--hdr2),var(--hdr3));position:sticky;top:0;z-index:300;box-shadow:var(--shdr);overflow:hidden;transition:background .4s;}
header::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);border-radius:22px;background:rgba(255,255,255,.15);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;text-decoration:none;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{flex:1;text-align:center;color:#fff;font-size:clamp(14px,3.5vw,19px);font-weight:800;}
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{width:64px;height:32px;border-radius:50px;background:#1e293b;position:relative;display:flex;align-items:center;padding:0 5px;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);transition:background .3s;-webkit-tap-highlight-color:transparent;}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;right:3px;transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;box-shadow:0 2px 8px rgba(0,0,0,.25);}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:26px 14px 70px;}

/* GRID */
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}

/* CARD */
.quiz-card{
  background:var(--sf);border-radius:22px;border:1px solid var(--bdr);
  box-shadow:var(--sh);padding:22px;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  opacity:0;transform:translateY(24px);
  animation:fadeUp .5s ease forwards;
  transition:transform .25s,box-shadow .25s;
}
.quiz-card:hover{transform:translateY(-4px);box-shadow:var(--sh2);}
.quiz-card::before{content:"";position:absolute;top:-40px;left:-40px;width:110px;height:110px;border-radius:50%;background:rgba(124,58,237,.06);pointer-events:none;}

.card-badge{display:inline-block;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;width:fit-content;background:var(--sf2);color:var(--p-dk);}
body.dark .card-badge{color:var(--p-lt);}
.quiz-card h3{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:8px;position:relative;z-index:1;}
.quiz-card .meta{font-size:13px;color:var(--tx3);margin-bottom:14px;flex-grow:1;position:relative;z-index:1;}

.name-input{
  width:100%;padding:11px 14px;border-radius:14px;
  border:1.5px solid var(--bdr);
  background:var(--sf);color:var(--tx);
  font-family:'Cairo',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;
  margin-bottom:12px;position:relative;z-index:1;
}
.name-input:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(124,58,237,.15);}
.name-input::placeholder{color:var(--tx3);}

.start-btn{
  width:100%;padding:13px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;margin-top:auto;
  box-shadow:0 6px 16px rgba(109,40,217,.22);
  transition:transform .2s,box-shadow .2s;position:relative;z-index:1;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(109,40,217,.3);}
.start-btn:active{transform:scale(.97);}

/* SPINNER */
.spin-wrap{text-align:center;padding:60px 20px;}
.spin{display:inline-block;width:46px;height:46px;border:5px solid var(--sf2);border-top:5px solid var(--p);border-radius:50%;animation:spin .85s linear infinite;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:600px){
  .page{padding:14px 10px 70px;}
  .quiz-grid{grid-template-columns:1fr;}
  .quiz-card{padding:18px;}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<header>
  <div class="hdr">
    <a class="back-btn" href="compition.html">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      رجوع
    </a>
    <div class="hdr-title">📝 الامتحانات</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">
  <div class="quiz-grid" id="quizList">
    <div class="spin-wrap"><div class="spin"></div></div>
  </div>
</div>

<script>
(function(){
  const s=localStorage.getItem("cv_theme");
  const d=window.matchMedia("(prefers-color-scheme:dark)").matches;
  applyTheme(s||(d?"dark":"light"));
})();
function applyTheme(m){document.body.classList.toggle("dark",m==="dark");localStorage.setItem("cv_theme",m);}
function toggleTheme(){applyTheme(document.body.classList.contains("dark")?"light":"dark");}

let userId=localStorage.getItem("user_id");
if(!userId){userId="user_"+Date.now()+"_"+Math.floor(Math.random()*10000);localStorage.setItem("user_id",userId);}

let quizResults=[];

async function loadResults(){
  try{const res=await fetch("results.json");quizResults=await res.json();if(!Array.isArray(quizResults))quizResults=[];}
  catch{quizResults=[];}
}

async function loadQuizzes(){
  await loadResults();
  const res=await fetch("quiz.json");
  const data=await res.json();
  const container=document.getElementById("quizList");
  container.innerHTML="";
  data.forEach((quiz,i)=>{
    const card=document.createElement("div");
    card.className="quiz-card";
    card.style.animationDelay=`${i*0.1}s`;
    card.innerHTML=`
      <span class="card-badge">امتحان</span>
      <h3>${quiz.title}</h3>
      <div class="meta">📋 عدد الأسئلة: ${quiz.questions.length} &nbsp;|&nbsp; ⏱ الوقت: ${quiz.time} دقيقة</div>
      <input type="text" placeholder="اكتب اسمك" class="name-input" id="name${i}">
      <button class="start-btn" onclick="startQuiz(${i})">ابدأ الامتحان ✅</button>`;
    container.appendChild(card);
  });
}
loadQuizzes();

async function startQuiz(i){
  const name=document.getElementById("name"+i).value.trim();
  if(!name){alert("اكتب اسمك");return;}
  const quizzes=await fetch("quiz.json").then(r=>r.json());
  const quizTitle=quizzes[i].title;
  const exists=quizResults.some(r=>r.userId===userId&&r.quiz===quizTitle);
  if(exists){alert("⚠ لقد قمت بحل هذا الامتحان بالفعل");return;}
  localStorage.setItem("quizIndex",i);
  localStorage.setItem("quiz_username",name);
  localStorage.setItem("quiz_title",quizTitle);
  window.location="quiz.html";
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);
const P=[];for(let i=0;i<80;i++)P.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2.2+.5,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6});
function animate(){ctx.clearRect(0,0,w,h);for(let p of P){p.x+=p.dx;p.y+=p.dy;if(p.x>w)p.x=0;if(p.x<0)p.x=w;if(p.y>h)p.y=0;if(p.y<0)p.y=h;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=document.body.classList.contains("dark")?"rgba(167,139,250,.35)":"rgba(124,58,237,.25)";ctx.fill();}requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
