<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المسابقات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="cssfiles/theme.css">
<link rel="stylesheet" href="cssfiles/layout.css">

</head>

<body>

<!-- HEADER -->

<header class="site-header">

  <button class="back-btn" onclick="goBack()">
    ⬅ رجوع
  </button>

  <h1 class="header-title">صفحة المسابقات</h1>

  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="theme-icon">🌙</span>
  </div>

</header>
<!-- MAIN -->

<div class="container">

<div class="grid">

<!-- امتحانات -->

<div class="card">

<div class="card-title">
امتحانات الاجتماع
</div>

<p class="card-text">
كل امتحانات الاجتماع هتكون هنا
</p>

<button class="btn" onclick="startQuiz()">
الدخول للامتحانات
</button>

</div>

<!-- تحدي الذاكرة -->

<div class="card">

<div class="card-title">
تحدي الذاكرة
</div>

<p class="card-text">
هل ذاكرتك قوية؟ جرب اللعبة وشوف هتقدر تكمل لحد فين
</p>

<input
class="input"
id="username2"
type="text"
placeholder="اكتب اسمك"
/>

<button class="btn" onclick="startQuiz2()">
ابدأ التحدي
</button>

</div>

<!-- المتاهة -->

<div class="card">

<div class="card-title">
لعبة المتاهة
</div>

<p class="card-text">
حاول توصل للنهاية بأسرع وقت
</p>

<input
class="input"
id="username3"
type="text"
placeholder="اكتب اسمك"
/>

<button class="btn" onclick="startQuiz3()">
ابدأ اللعبة
</button>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="site-footer">
<h2>Created by Kareem</h2>
</footer>

<script src="javescriptfiles/theme.js"></script>

<script>

function validateAndSave(inputId){

const name = document.getElementById(inputId).value.trim();

if(!name){
alert("من فضلك اكتب اسمك");
return null;
}

localStorage.setItem("quiz_username",name);

return name;

}

function startQuiz(){
window.location.href="quiz_list.html";
}

function startQuiz2(){

const valid = validateAndSave("username2");

if(!valid) return;

window.location.href="quiz2.html";

}

function startQuiz3(){

const valid = validateAndSave("username3");

if(!valid) return;

window.location.href="qiaz3.html";

}

</script>
  <script>
function goBack(){
  window.history.back();
}

/* theme */

(function(){
  const saved = localStorage.getItem("theme");
  const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved || (dark ? "dark" : "light"));
})();

function applyTheme(mode){
  document.body.classList.toggle("dark", mode === "dark");
  localStorage.setItem("theme", mode);
}

function toggleTheme(){
  applyTheme(
    document.body.classList.contains("dark") ? "light" : "dark"
  );
}
</script>

</body>
</html>
