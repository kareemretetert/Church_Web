<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="imgsfile/icon.png" rel="icon" type="image/x-icon"/>
<title>الامتحان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --p:#7c3aed;--p-dk:#5b21b6;--p-lt:#a78bfa;
  --bg:#f4f0fb;--sf:#fff;--sf2:#f1ecfc;
  --tx:#0f172a;--tx2:#374151;--tx3:#6b7280;
  --bdr:#e2e8f0;
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh2:0 8px 32px rgba(109,40,217,.18);
  --shdr:0 6px 24px rgba(109,40,217,.25);
  --hdr1:#7c3aed;--hdr2:#9333ea;--hdr3:#5b21b6;
  --ok:#16a34a;--no:#dc2626;
}
body.dark{
  --bg:#0d0d1a;--sf:#161627;--sf2:#1e1e33;
  --tx:#f0f0ff;--tx2:#c4c4e0;--tx3:#8888aa;
  --bdr:#2a2a44;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
  --shdr:0 6px 24px rgba(0,0,0,.6);
  --hdr1:#0f172a;--hdr2:#1e1b4b;--hdr3:#020617;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* PARTICLES */
#particles{position:fixed;inset:0;width:100%;height:100%;z-index:-10;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.12),transparent 40%),radial-gradient(circle at 80% 30%,rgba(59,130,246,.10),transparent 45%),radial-gradient(circle at 50% 80%,rgba(236,72,153,.08),transparent 50%);z-index:-20;}

/* HEADER */
header{background:linear-gradient(135deg,var(--hdr1),var(--hdr2),var(--hdr3));position:sticky;top:0;z-index:300;box-shadow:var(--shdr);overflow:hidden;transition:background .4s;}
header::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);border-radius:22px;background:rgba(255,255,255,.15);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;text-decoration:none;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{flex:1;text-align:center;color:#fff;font-size:clamp(13px,3.5vw,17px);font-weight:800;}
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{width:64px;height:32px;border-radius:50px;background:#1e293b;position:relative;display:flex;align-items:center;padding:0 5px;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);transition:background .3s;-webkit-tap-highlight-color:transparent;}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;right:3px;transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;box-shadow:0 2px 8px rgba(0,0,0,.25);}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:20px 14px 80px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.stat-card{background:var(--sf);border-radius:18px;padding:16px 18px;border:1px solid var(--bdr);box-shadow:var(--sh);animation:fadeUp .4s both;}

/* timer */
.timer-label{font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:6px;}
.timer-val{font-size:26px;font-weight:800;color:var(--p);font-variant-numeric:tabular-nums;}
.bar-wrap{height:7px;background:var(--sf2);border-radius:10px;margin-top:8px;overflow:hidden;}
.bar{height:100%;width:100%;background:var(--p);border-radius:10px;transition:width 1s linear,background .5s;}

/* progress */
.prog-label{font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:6px;}
.prog-val{font-size:22px;font-weight:800;color:var(--tx);}

/* QUESTION CARD */
.q-card{
  background:var(--sf);border-radius:20px;padding:20px;
  margin-bottom:14px;border:1px solid var(--bdr);box-shadow:var(--sh);
  animation:fadeUp .4s both;
}
.q-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}
.q-num{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.q-text{font-size:15px;font-weight:700;color:var(--tx);line-height:1.6;flex:1;}
.q-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:12px;cursor:zoom-in;}

/* OPTIONS */
.opt{
  display:flex;align-items:center;gap:10px;
  background:var(--sf2);padding:11px 14px;border-radius:12px;
  margin-bottom:8px;cursor:pointer;
  border:2px solid transparent;
  transition:background .15s,border-color .15s,transform .12s;
  -webkit-tap-highlight-color:transparent;
}
.opt:last-child{margin-bottom:0;}
.opt:hover{filter:brightness(.97);}
.opt.sel{background:var(--sf2);border-color:var(--p);transform:scale(1.01);}
.opt:active{transform:scale(.97);}
.opt-radio{width:18px;height:18px;accent-color:var(--p);flex-shrink:0;}
.opt-text{font-size:14px;color:var(--tx);}

/* FINISH BTN */
.finish-wrap{text-align:center;margin-top:10px;}
.finish-btn{
  padding:14px 40px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;box-shadow:0 8px 20px rgba(109,40,217,.3);
  transition:transform .2s,box-shadow .2s;
}
.finish-btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(109,40,217,.4);}
.finish-btn:active{transform:scale(.97);}

/* IMAGE MODAL */
#imgZoom{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;justify-content:center;align-items:center;cursor:zoom-out;}
#imgZoom.show{display:flex;}
#imgZoom img{max-width:96%;max-height:96%;border-radius:12px;animation:scaleIn .25s cubic-bezier(.34,1.56,.64,1);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{transform:scale(.78);}to{transform:scale(1);}}

@media(max-width:600px){
  .page{padding:12px 10px 80px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .q-text{font-size:14px;}
  .opt-text{font-size:13px;}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<header>
  <div class="hdr">
    <a class="back-btn" href="quiz_list.html">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      رجوع
    </a>
    <div class="hdr-title" id="quizTitle">📝 الامتحان</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">

  <div class="stats-row">
    <div class="stat-card">
      <div class="timer-label">⏱ الوقت المتبقي</div>
      <div class="timer-val" id="timerText">00:00</div>
      <div class="bar-wrap"><div class="bar" id="timerBar"></div></div>
    </div>
    <div class="stat-card">
      <div class="prog-label">📋 التقدم</div>
      <div class="prog-val" id="progressText">0 / 0</div>
      <div class="bar-wrap"><div class="bar" id="progressBar" style="background:#22c55e;width:0%"></div></div>
    </div>
  </div>

  <div id="quizContainer"></div>

  <div class="finish-wrap">
    <button class="finish-btn" onclick="finishQuiz()">إنهاء الامتحان ✅</button>
  </div>

</div>

<div id="imgZoom" onclick="this.classList.remove('show')"><img id="zoomImg"></div>

<script>
(function(){
  const s=localStorage.getItem("cv_theme");
  const d=window.matchMedia("(prefers-color-scheme:dark)").matches;
  applyTheme(s||(d?"dark":"light"));
})();
function applyTheme(m){document.body.classList.toggle("dark",m==="dark");localStorage.setItem("cv_theme",m);}
function toggleTheme(){applyTheme(document.body.classList.contains("dark")?"light":"dark");}

let questions=[],time=0,totalTime=0;
const quizIndex=localStorage.getItem("quizIndex");

fetch("quiz.json")
.then(r=>r.json())
.then(data=>{
  const quiz=data[quizIndex];
  document.getElementById("quizTitle").textContent="📝 "+quiz.title;
  questions=quiz.questions;
  time=totalTime=quiz.time*60;
  startTimer();
  renderQuiz();
});

function renderQuiz(){
  const c=document.getElementById("quizContainer");
  questions.forEach((q,i)=>{
    const card=document.createElement("div");
    card.className="q-card";
    card.style.animationDelay=`${i*0.04}s`;
    let html=`<div class="q-header">
      <div class="q-num">${i+1}</div>
      <div class="q-text">${q.question}</div>
    </div>`;
    if(q.image) html+=`<img src="${q.image}" class="q-img" onclick="document.getElementById('zoomImg').src='${q.image}';document.getElementById('imgZoom').classList.add('show')">`;
    q.options.forEach((opt,oi)=>{
      html+=`<div class="opt" id="opt-${i}-${oi}" onclick="pickAns(${i},${oi+1})">
        <input type="radio" class="opt-radio" name="q${i}" value="${oi+1}">
        <span class="opt-text">${opt}</span>
      </div>`;
    });
    card.innerHTML=html;
    c.appendChild(card);
  });
  updateProgress();
}

function pickAns(qi,val){
  const n=questions[qi].options.length;
  for(let oi=0;oi<n;oi++){
    const d=document.getElementById(`opt-${qi}-${oi}`);
    if(d){d.classList.toggle("sel",oi+1===val);d.querySelector("input").checked=(oi+1===val);}
  }
  updateProgress();
}

function updateProgress(){
  let answered=0;
  questions.forEach((_,i)=>{if(document.querySelector(`input[name=q${i}]:checked`))answered++;});
  const pct=(answered/questions.length)*100;
  document.getElementById("progressText").textContent=answered+" / "+questions.length;
  const pb=document.getElementById("progressBar");
  pb.style.width=pct+"%";
  pb.style.background=pct<30?"#dc2626":pct<70?"#f59e0b":"#22c55e";
}

function startTimer(){
  const bar=document.getElementById("timerBar");
  setInterval(()=>{
    time--;
    const m=Math.floor(time/60),s=time%60;
    document.getElementById("timerText").textContent=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
    const pct=(time/totalTime)*100;
    bar.style.width=pct+"%";
    bar.style.background=pct<20?"#dc2626":pct<50?"#f59e0b":"var(--p)";
    if(time<=0) finishQuiz();
  },1000);
}

async function saveResult(score,total){
  try{
    const name=localStorage.getItem("quiz_username")||"بدون اسم";
    const index=localStorage.getItem("quizIndex");
    const res=await fetch("quiz.json");
    const quizzes=await res.json();
    const quizTitle=quizzes[index]?.title||"امتحان";
    const userId=localStorage.getItem("user_id")||"unknown";
    const result={name,score,total,quiz:quizTitle,date:new Date().toISOString(),finished:true,userId};
    let old=[];
    try{const r=await fetch("results.json");old=await r.json();if(!Array.isArray(old))old=[];}catch{}
    old.push(result);
    await fetch("/.netlify/functions/saveResults",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(old)});
  }catch(e){console.log("خطأ في الحفظ",e);}
}

async function finishQuiz(){
  let unanswered=0;
  questions.forEach((_,i)=>{if(!document.querySelector(`input[name=q${i}]:checked`))unanswered++;});
  if(unanswered){alert("أكمل باقي الأسئلة ("+unanswered+" سؤال متبقي)");return;}
  let score=0;const answers=[];
  questions.forEach((q,i)=>{
    const chosen=parseInt(document.querySelector(`input[name=q${i}]:checked`).value);
    answers.push({question:q.question,options:q.options,correct:q.answer,chosen,image:q.image});
    if(chosen===q.answer)score++;
  });
  localStorage.setItem("quiz_score",score);
  localStorage.setItem("quiz_total",questions.length);
  localStorage.setItem("quiz_answers",JSON.stringify(answers));
  try{await saveResult(score,questions.length);}catch(e){console.log("فشل الحفظ",e);}
  setTimeout(()=>{window.location="results.html";},500);
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);
const P=[];for(let i=0;i<80;i++)P.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2.2+.5,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6});
function animate(){ctx.clearRect(0,0,w,h);for(let p of P){p.x+=p.dx;p.y+=p.dy;if(p.x>w)p.x=0;if(p.x<0)p.x=w;if(p.y>h)p.y=0;if(p.y<0)p.y=h;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=document.body.classList.contains("dark")?"rgba(167,139,250,.35)":"rgba(124,58,237,.25)";ctx.fill();}requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
