<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الامتحان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#6a1b9a;
--primary-dark:#4a148c;
--bg:#f0f8ff;
--card:#ffffff;
--text:#2f2f39;
--muted:#6b7280;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(180deg,#f6fbff 0%,var(--bg) 100%);
padding:20px;
text-align:center;
}

/* header */
h2{
color:var(--primary-dark);
}

/* 📦 box عام */
.box{
background:white;
padding:15px;
margin:15px auto;
max-width:700px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* ⏱ التايمر */
#timerText{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

#timerBarContainer,
#progressBarContainer{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

#timerBar,
#progressBar{
height:10px;
width:100%;
transition:0.3s;
}

/* السؤال */
.question{
background:var(--card);
padding:20px;
margin:20px auto;
max-width:700px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:right;
animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* layout */
.question-box{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.question-text{
flex:2;
font-size:18px;
}

/* صورة */
.img-container{
flex:1;
max-width:220px;
position:relative;
}

.question-img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.question-img:hover{
transform:scale(1.05);
}

/* اختيارات */
.option{
display:block;
background:#f5f5f5;
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#e8def8;
}

/* إخفاء الراديو */
.option input{
display:none;
}

/* عند الاختيار */
.option input:checked + span{
font-weight:bold;
color:var(--primary-dark);
}

/* زر إنهاء */
.finish-btn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
font-size:16px;
cursor:pointer;
}

/* modal */
#imageModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:999;
}

#imageModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* موبايل */
@media(max-width:600px){
.question-box{
flex-direction:column;
}
}

</style>
</head>

<body>

<h2>📝 الامتحان</h2>

<div class="box">
<div id="timerText">00:00</div>
<div id="timerBarContainer"><div id="timerBar"></div></div>
</div>

<div class="box">
<div id="progressText">0 / 0</div>
<div id="progressBarContainer"><div id="progressBar"></div></div>
</div>

<div id="quizContainer"></div>

<button class="finish-btn" onclick="finishQuiz()">إنهاء الامتحان</button>

<div id="imageModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

let questions=[]
let time=0
const quizIndex=localStorage.getItem("quizIndex")

fetch("quiz.json")
.then(res=>res.json())
.then(data=>{
const quiz=data[quizIndex]
questions=quiz.questions
time=quiz.time * 60
startTimer()
renderQuiz()
})

function renderQuiz(){

const container=document.getElementById("quizContainer")

questions.forEach((q,i)=>{

let html=`
<div class="question">

<div class="question-box">

<div class="question-text">
<b>س${i+1}:</b> ${q.question}
</div>
`

if(q.image){
html+=`
<div class="img-container">
<img src="${q.image}" class="question-img" onclick="openImage('${q.image}')">
</div>
`
}

html+=`</div>`

q.options.forEach((opt,index)=>{
html+=`
<label class="option">
<input type="radio" name="q${i}" value="${index+1}" onchange="updateProgress()">
<span>${opt}</span>
</label>
`
})

html+="</div>"

container.innerHTML+=html

})

}

function openImage(src){
document.getElementById("modalImg").src=src
document.getElementById("imageModal").style.display="flex"
}

function closeImage(){
document.getElementById("imageModal").style.display="none"
}

function startTimer(){

const total=time
const bar=document.getElementById("timerBar")

setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10) s="0"+s
if(m<10) m="0"+m

document.getElementById("timerText").innerText=m+":"+s

let percent=(time/total)*100
bar.style.width=percent+"%"

if(percent<30) bar.style.background="red"
else bar.style.background="#4CAF50"

if(time<=0){
finishQuiz()
}

},1000)

}

function updateProgress(){

let answered=0

questions.forEach((q,i)=>{
if(document.querySelector(`input[name=q${i}]:checked`)) answered++
})

let total=questions.length
document.getElementById("progressText").innerText=answered+" / "+total

let percent=(answered/total)*100
let bar=document.getElementById("progressBar")

bar.style.width=percent+"%"

if(percent<30) bar.style.background="red"
else if(percent<70) bar.style.background="orange"
else bar.style.background="green"

}
async function saveResult(score,total){

try{

const name = localStorage.getItem("quiz_username") || "بدون اسم"
const index = localStorage.getItem("quizIndex")

const res = await fetch("quiz.json")
const quizzes = await res.json()
const quizTitle = quizzes[index]?.title || "امتحان"

const result = {
name,
score,
total,
quiz: quizTitle,
date: new Date().toISOString(),
finished: true
}

let old=[]
try{
const r = await fetch("results.json")
old = await r.json()
if(!Array.isArray(old)) old=[]
}catch{}

old.push(result)

await fetch("/.netlify/functions/saveResults",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(old)
})

}catch(e){
console.log("خطأ في الحفظ", e)
}

}
async function finishQuiz(){

let unanswered=0

questions.forEach((q,i)=>{
if(!document.querySelector(`input[name=q${i}]:checked`)) unanswered++
})

if(unanswered){
alert("أكمل باقي الأسئلة")
return
}

let score=0
let answers=[]

questions.forEach((q,i)=>{
let chosen=parseInt(document.querySelector(`input[name=q${i}]:checked`).value)

answers.push({
question:q.question,
options:q.options,
correct:q.answer,
chosen:chosen,
image:q.image
})

if(chosen==q.answer) score++
})

localStorage.setItem("quiz_score",score)
localStorage.setItem("quiz_total",questions.length)
localStorage.setItem("quiz_answers",JSON.stringify(answers))

try{
await saveResult(score,questions.length)
}catch(e){
console.log("فشل الحفظ", e)
}

setTimeout(()=>{
window.location="results.html"
},500)

}

</script>

</body>
</html>
