<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>الأرشيف</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>
body {
  font-family: "Segoe UI";
  direction: rtl;
  background: #f0f8ff;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 25px;
}

img, video {
  max-width: 100%;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* نفس كارت الملفات */
.file-card {
  display:flex;
  justify-content:space-between;
  background:#f7f7f7;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.file-actions a {
  background:#5c2c8a;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  margin-left:5px;
  text-decoration:none;
}
</style>
</head>

<body>

<h1>📚 الأرشيف</h1>
<div class="container" id="archive"></div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
fetch("summaries.json")
.then(res => res.json())
.then(list => {

const archive=document.getElementById("archive")

list.slice(1).forEach(data=>{

const card=document.createElement("div")
card.className="card"

let html = `<h2>${data.title}</h2><p>${data.date}</p>`

// صور
if(data.images){
data.images.forEach(img=>{
html += `<img src="${img}">`
})
}

// فيديو
if(data.videos){
data.videos.forEach(v=>{
html += `<video class="plyr-video" controls src="${v}"></video>`
})
}

// ملفات
if(data.files){
data.files.forEach(f=>{
const ext = f.split('.').pop().toUpperCase()

html += `
<div class="file-card">
<span>📄 ${ext}</span>
<div class="file-actions">
<a href="${f}" target="_blank">عرض</a>
<a href="${f}" download>تحميل</a>
</div>
</div>
`
})
}

html += `<p>${data.content}</p>`

card.innerHTML = html
archive.appendChild(card)

})

// تفعيل الفيديو
setTimeout(()=>{
document.querySelectorAll('.plyr-video').forEach(v=> new Plyr(v))
},300)

})
</script>

</body>
</html>
