<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>أرشيف الاجتماعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root{
  --p:#7c3aed; --p-dk:#5b21b6; --p-lt:#a78bfa;
  --bg:#f4f0fb; --sf:#fff; --sf2:#f1ecfc;
  --tx:#0f172a; --tx2:#374151; --tx3:#6b7280;
  --bdr:#e2e8f0;
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh2:0 8px 32px rgba(109,40,217,.18);
  --shdr:0 6px 24px rgba(109,40,217,.25);
  --hdr1:#7c3aed; --hdr2:#9333ea; --hdr3:#5b21b6;
  --if-bg:#ffedd5; --if-c:#c2410c;
}
body.dark{
  --bg:#0d0d1a; --sf:#161627; --sf2:#1e1e33;
  --tx:#f0f0ff; --tx2:#c4c4e0; --tx3:#8888aa;
  --bdr:#2a2a44;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
  --shdr:0 6px 24px rgba(0,0,0,.6);
  --hdr1:#0f172a; --hdr2:#1e1b4b; --hdr3:#020617;
  --if-bg:#431407; --if-c:#fdba74;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);color:var(--tx);
  min-height:100vh;overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ═══════════════════════════════════════
   PARTICLES + GLOW
═══════════════════════════════════════ */
#particles{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:-10;pointer-events:none;
}
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(124,58,237,0.12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(59,130,246,0.10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(236,72,153,0.08), transparent 50%);
  z-index:-20;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
header{
  background:linear-gradient(135deg,var(--hdr1),var(--hdr2),var(--hdr3));
  position:sticky;top:0;z-index:300;
  box-shadow:var(--shdr);overflow:hidden;
  transition:background .4s;
}
header::before{
  content:"";position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.05);pointer-events:none;
}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);
  border-radius:22px;background:rgba(255,255,255,.15);
  color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;flex-shrink:0;text-decoration:none;
  transition:background .2s,transform .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{flex:1;text-align:center;color:#fff;font-size:clamp(14px,3.5vw,19px);font-weight:800;line-height:1.3;}

/* THEME TOGGLE */
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{
  width:64px;height:32px;border-radius:50px;
  background:#1e293b;position:relative;
  display:flex;align-items:center;padding:0 5px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.3);transition:background .3s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.toggle-track:active{transform:scale(.95);}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{
  position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;right:3px;
  transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* ═══════════════════════════════════════
   PAGE
═══════════════════════════════════════ */
.page{max-width:880px;margin:0 auto;padding:20px 14px 70px;}

/* ═══════════════════════════════════════
   PAGE TITLE
═══════════════════════════════════════ */
.page-title{
  text-align:center;margin-bottom:24px;
  animation:fadeUp .4s both;
}
.page-title h1{
  font-size:clamp(20px,5vw,28px);font-weight:800;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ═══════════════════════════════════════
   ARCHIVE CARD
═══════════════════════════════════════ */
.archive-card{
  background:var(--sf);border-radius:22px;overflow:hidden;
  box-shadow:var(--sh);margin-bottom:20px;border:1px solid var(--bdr);
  animation:fadeUp .5s both;
  transition:transform .25s,box-shadow .25s;
}
.archive-card:hover{transform:translateY(-3px);box-shadow:var(--sh2);}

.card-hdr{
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  padding:16px 20px;
  display:flex;flex-direction:column;gap:5px;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.card-hdr-row{display:flex;align-items:center;gap:10px;}
.card-title{font-size:16px;font-weight:800;color:#fff;flex:1;line-height:1.4;}
.card-date{font-size:12px;color:rgba(255,255,255,.8);}
.card-arr{
  width:28px;height:28px;flex-shrink:0;
  background:rgba(255,255,255,.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
}
.card-arr svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.card-arr.open{transform:rotate(90deg);}

/* collapsible body */
.card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .36s ease;}
.card-body.open{grid-template-rows:1fr;}
.card-body-inner{overflow:hidden;}
.card-content{padding:18px 20px;}

/* ═══════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════ */
.section-label{
  font-size:12px;font-weight:700;color:var(--p);
  letter-spacing:.5px;margin-bottom:10px;margin-top:16px;
  display:flex;align-items:center;gap:6px;
}
.section-label:first-child{margin-top:0;}
.section-label::after{content:"";flex:1;height:1px;background:var(--bdr);}

/* ═══════════════════════════════════════
   IMAGES
═══════════════════════════════════════ */
.images-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;margin-bottom:4px;
}
.images-grid img{
  width:100%;border-radius:12px;cursor:zoom-in;
  transition:transform .2s,box-shadow .2s;border:1px solid var(--bdr);
}
.images-grid img:hover{transform:scale(1.04);box-shadow:var(--sh2);}

/* ═══════════════════════════════════════
   VIDEO
═══════════════════════════════════════ */
.video-wrap{border-radius:14px;overflow:hidden;margin-bottom:4px;box-shadow:var(--sh);}

/* ═══════════════════════════════════════
   FILES
═══════════════════════════════════════ */
.file-item{
  background:var(--sf2);border-radius:14px;padding:13px 16px;
  margin-bottom:10px;border:1px solid var(--bdr);
  display:flex;align-items:center;gap:13px;
  transition:box-shadow .2s,transform .2s;
}
.file-item:hover{box-shadow:var(--sh);transform:translateY(-1px);}
.file-ico{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--if-bg);color:var(--if-c);
}
.file-info{flex:1;min-width:0;}
.file-name{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-type{font-size:11px;color:var(--tx3);margin-top:2px;}
.file-open-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:18px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  text-decoration:none;flex-shrink:0;
  transition:opacity .2s,transform .15s;
}
.file-open-btn:hover{opacity:.9;transform:scale(1.04);}
.pdf-preview{width:100%;height:380px;border-radius:12px;margin-top:10px;border:none;background:var(--sf);}

/* ═══════════════════════════════════════
   TEXT
═══════════════════════════════════════ */
.txt-box{
  background:var(--sf2);border-radius:14px;padding:18px 20px;
  font-size:14px;line-height:1.9;color:var(--tx);white-space:pre-wrap;
  border:1px solid var(--bdr);
}

/* ═══════════════════════════════════════
   EMPTY / SPINNER
═══════════════════════════════════════ */
.spin-wrap{text-align:center;padding:60px 20px;}
.spin{display:inline-block;width:46px;height:46px;border:5px solid var(--sf2);border-top:5px solid var(--p);border-radius:50%;animation:spin .85s linear infinite;}
.empty-msg{text-align:center;color:var(--tx3);padding:40px 20px;font-size:14px;}

/* ═══════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════ */
#imgZoom{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;justify-content:center;align-items:center;cursor:zoom-out;}
#imgZoom.show{display:flex;}
#imgZoom img{max-width:96%;max-height:96%;border-radius:12px;animation:scaleIn .25s cubic-bezier(.34,1.56,.64,1);}

/* ═══════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{transform:scale(.78);}to{transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:600px){
  .page{padding:14px 10px 70px;}
  .card-content{padding:14px;}
  .images-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
</style>
</head>

<body>
<canvas id="particles"></canvas>

<!-- HEADER -->
<header>
  <div class="hdr">
    <a class="back-btn" href="meatingSummrise.html">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      رجوع
    </a>
    <div class="hdr-title">📚 أرشيف الاجتماعات</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<!-- PAGE -->
<div class="page">
  <div id="archiveList"><div class="spin-wrap"><div class="spin"></div></div></div>
</div>

<!-- LIGHTBOX -->
<div id="imgZoom" onclick="this.classList.remove('show')"><img id="imgZoomSrc"></div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
(function(){
  const s = localStorage.getItem("cv_theme");
  const d = window.matchMedia("(prefers-color-scheme:dark)").matches;
  applyTheme(s || (d ? "dark" : "light"));
})();
function applyTheme(m){
  document.body.classList.toggle("dark", m === "dark");
  localStorage.setItem("cv_theme", m);
}
function toggleTheme(){ applyTheme(document.body.classList.contains("dark") ? "light" : "dark"); }

/* ═══════════════════════════════════════
   PARTICLES
═══════════════════════════════════════ */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);
const particles = [];
for(let i = 0; i < 80; i++){
  particles.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*2.2+0.5, dx:(Math.random()-.5)*.6, dy:(Math.random()-.5)*.6 });
}
function animate(){
  ctx.clearRect(0,0,w,h);
  for(let p of particles){
    p.x+=p.dx; p.y+=p.dy;
    if(p.x>w) p.x=0; if(p.x<0) p.x=w;
    if(p.y>h) p.y=0; if(p.y<0) p.y=h;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = document.body.classList.contains("dark")
      ? "rgba(167,139,250,0.35)" : "rgba(124,58,237,0.25)";
    ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function zoomImg(src){
  document.getElementById("imgZoomSrc").src = src;
  document.getElementById("imgZoom").classList.add("show");
}

function getFileType(f){
  const ext = f.split('.').pop().toLowerCase();
  if(ext === "pdf")              return { icon:"📕", label:"PDF" };
  if(ext === "doc"||ext==="docx") return { icon:"📝", label:"Word" };
  if(ext === "ppt"||ext==="pptx") return { icon:"📊", label:"PowerPoint" };
  return { icon:"📄", label:"ملف" };
}

function toggleCard(idx){
  const body = document.getElementById(`cbody-${idx}`);
  const arr  = document.getElementById(`carr-${idx}`);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  arr.classList.toggle("open", !isOpen);
}

/* ═══════════════════════════════════════
   LOAD
═══════════════════════════════════════ */
fetch("summaries.json")
  .then(res => res.json())
  .then(list => {
    const wrapper = document.getElementById("archiveList");
    const archived = list.slice(1);

    if(!archived.length){
      wrapper.innerHTML = `<div class="empty-msg">📭 لا يوجد أرشيف حالياً</div>`;
      return;
    }

    wrapper.innerHTML = "";

    archived.forEach((data, index) => {
      if(!data || !data.title) return;

      const card = document.createElement("div");
      card.className = "archive-card";
      card.style.animationDelay = `${index * 0.1}s`;

      // build inner content
      let contentHTML = "";

      // images
      if(data.images && data.images.length){
        contentHTML += `<div class="section-label">🖼 الصور</div><div class="images-grid" id="imgs-${index}"></div>`;
      }
      // videos
      if(data.videos && data.videos.length){
        contentHTML += `<div class="section-label">🎬 الفيديوهات</div><div id="vids-${index}"></div>`;
      }
      // files
      if(data.files && data.files.length){
        contentHTML += `<div class="section-label">📎 الملفات</div><div id="files-${index}"></div>`;
      }
      // text
      if(data.content){
        contentHTML += `<div class="section-label" style="margin-top:16px">📝 ملخص</div>
          <div class="txt-box">${data.content}</div>`;
      }

      card.innerHTML = `
        <div class="card-hdr" onclick="toggleCard(${index})">
          <div class="card-hdr-row">
            <div class="card-title">${data.title}</div>
            <div class="card-arr" id="carr-${index}">
              <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </div>
          ${data.date ? `<div class="card-date">📅 ${data.date}</div>` : ""}
        </div>
        <div class="card-body" id="cbody-${index}">
          <div class="card-body-inner">
            <div class="card-content">${contentHTML}</div>
          </div>
        </div>`;

      wrapper.appendChild(card);

      // fill images
      if(data.images && data.images.length){
        const grid = document.getElementById(`imgs-${index}`);
        data.images.forEach(src => {
          const img = document.createElement("img");
          img.src = src;
          img.onclick = () => zoomImg(src);
          grid.appendChild(img);
        });
      }

      // fill videos
      if(data.videos && data.videos.length){
        const sec = document.getElementById(`vids-${index}`);
        data.videos.forEach(v => {
          const wrap = document.createElement("div");
          wrap.className = "video-wrap";
          const video = document.createElement("video");
          video.controls = true;
          video.className = "plyr-video";
          video.src = v;
          wrap.appendChild(video);
          sec.appendChild(wrap);
        });
      }

      // fill files
      if(data.files && data.files.length){
        const sec = document.getElementById(`files-${index}`);
        data.files.forEach(f => {
          const { icon, label } = getFileType(f);
          const name = decodeURIComponent(f.split('/').pop());
          const ext  = f.split('.').pop().toLowerCase();
          const item = document.createElement("div");
          item.innerHTML = `
            <div class="file-item">
              <div class="file-ico">${icon}</div>
              <div class="file-info">
                <div class="file-name">${name}</div>
                <div class="file-type">${label}</div>
              </div>
              <a class="file-open-btn" href="${f}" target="_blank">فتح 📄</a>
            </div>
            ${ext === "pdf" ? `<iframe class="pdf-preview" src="${f}"></iframe>` : ""}`;
          sec.appendChild(item);
        });
      }
    });

    // Plyr
    setTimeout(() => {
      Plyr.setup('.plyr-video', {
        controls:['play-large','rewind','play','fast-forward','progress',
          'current-time','duration','mute','volume','settings','download','fullscreen'],
        seekTime:10
      });
    }, 500);
  })
  .catch(() => {
    document.getElementById("archiveList").innerHTML =
      `<div class="empty-msg">⚠️ تعذر تحميل الأرشيف</div>`;
  });
</script>
</body>
</html>
