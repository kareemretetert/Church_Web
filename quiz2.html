<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="imgsfile/icon.png" rel="icon" type="image/x-icon"/>
<title>لعبة تحدي الذاكرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --p:#7c3aed;--p-dk:#5b21b6;--p-lt:#a78bfa;
  --bg:#f4f0fb;--sf:#fff;--sf2:#f1ecfc;
  --tx:#0f172a;--tx2:#374151;--tx3:#6b7280;
  --bdr:#e2e8f0;
  --sh:0 4px 20px rgba(109,40,217,.10);
  --sh2:0 8px 32px rgba(109,40,217,.18);
  --shdr:0 6px 24px rgba(109,40,217,.25);
  --hdr1:#7c3aed;--hdr2:#9333ea;--hdr3:#5b21b6;
  --card-back:#c4b5fd;
}
body.dark{
  --bg:#0d0d1a;--sf:#161627;--sf2:#1e1e33;
  --tx:#f0f0ff;--tx2:#c4c4e0;--tx3:#8888aa;
  --bdr:#2a2a44;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --sh2:0 8px 40px rgba(0,0,0,.6);
  --shdr:0 6px 24px rgba(0,0,0,.6);
  --hdr1:#0f172a;--hdr2:#1e1b4b;--hdr3:#020617;
  --card-back:#4c1d95;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* PARTICLES */
#particles{position:fixed;inset:0;width:100%;height:100%;z-index:-10;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(124,58,237,.12),transparent 40%),radial-gradient(circle at 80% 30%,rgba(59,130,246,.10),transparent 45%),radial-gradient(circle at 50% 80%,rgba(236,72,153,.08),transparent 50%);z-index:-20;}

/* HEADER */
header{background:linear-gradient(135deg,var(--hdr1),var(--hdr2),var(--hdr3));position:sticky;top:0;z-index:300;box-shadow:var(--shdr);overflow:hidden;transition:background .4s;}
header::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
.hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1.5px solid rgba(255,255,255,.45);border-radius:22px;background:rgba(255,255,255,.15);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;text-decoration:none;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(255,255,255,.28);}
.back-btn:active{transform:scale(.95);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{flex:1;text-align:center;color:#fff;font-size:clamp(14px,3.5vw,19px);font-weight:800;}
.theme-toggle{display:flex;align-items:center;flex-shrink:0;}
.toggle-track{width:64px;height:32px;border-radius:50px;background:#1e293b;position:relative;display:flex;align-items:center;padding:0 5px;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);transition:background .3s;-webkit-tap-highlight-color:transparent;}
.t-icon{font-size:14px;z-index:1;line-height:1;}
.t-sun{color:#facc15;margin-left:auto;}
.t-moon{color:#e2e8f0;margin-right:auto;}
.toggle-thumb{position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;right:3px;transition:transform .3s cubic-bezier(.4,2,.6,1),background .3s;box-shadow:0 2px 8px rgba(0,0,0,.25);}
body.dark .toggle-track{background:rgba(109,40,217,.5);}
body.dark .toggle-thumb{transform:translateX(-32px);background:var(--p-lt);}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:20px 14px 70px;}

/* INFO ROW */
.info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;animation:fadeUp .4s both;}
.mistakes-badge{
  background:var(--sf);border-radius:14px;padding:10px 16px;
  border:1px solid var(--bdr);box-shadow:var(--sh);
  font-size:14px;font-weight:700;color:var(--tx2);
}
.mistakes-badge span{color:var(--p);font-size:18px;font-weight:800;}

.replay-btn{
  padding:10px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 14px rgba(109,40,217,.25);
  transition:transform .2s,box-shadow .2s;
}
.replay-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(109,40,217,.35);}

/* GAME BOARD */
.board-wrap{
  background:var(--sf);border-radius:22px;padding:20px;
  box-shadow:var(--sh);border:1px solid var(--bdr);
  animation:fadeUp .5s both;
}
#game-board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* CARD */
.card{
  aspect-ratio:5/6;
  background:var(--card-back);
  border-radius:14px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  box-shadow:0 3px 8px rgba(0,0,0,.12);
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:100%;object-fit:contain;border-radius:14px;display:none;padding:4px;}
.card .caption{font-size:11px;font-weight:700;color:var(--tx);text-align:center;padding:2px 4px;display:none;position:absolute;bottom:4px;left:0;right:0;}
.card.flipped{background:var(--sf2);}
.card.flipped img,.card.flipped .caption{display:block;}
.card.matched{background:#dcfce7;box-shadow:0 0 0 2px #16a34a;}
body.dark .card.matched{background:#14432a;}

/* WIN OVERLAY */
.win-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:500;
  justify-content:center;align-items:center;
}
.win-overlay.show{display:flex;}
.win-box{
  background:var(--sf);border-radius:24px;padding:36px 40px;text-align:center;
  box-shadow:var(--sh2);animation:scaleIn .35s cubic-bezier(.34,1.56,.64,1);
}
.win-emoji{font-size:64px;margin-bottom:10px;}
.win-title{font-size:24px;font-weight:800;color:var(--p);margin-bottom:8px;}
.win-sub{font-size:14px;color:var(--tx2);margin-bottom:20px;}
.win-btn{
  padding:12px 28px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--p),var(--p-dk));
  color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:transform .2s;
}
.win-btn:hover{transform:scale(1.04);}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{transform:scale(.75);}to{transform:scale(1);}}

@media(max-width:480px){
  #game-board{gap:7px;}
  .board-wrap{padding:14px;}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<header>
  <div class="hdr">
    <a class="back-btn" href="compition.html">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      رجوع
    </a>
    <div class="hdr-title">🃏 لعبة الذاكرة</div>
    <div class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">
      <div class="toggle-track">
        <span class="t-icon t-sun">☀️</span>
        <span class="t-icon t-moon">🌙</span>
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">
  <div class="info-row">
    <div class="mistakes-badge">المحاولات الخاطئة: <span id="mistakeCount">0</span></div>
    <button class="replay-btn" onclick="initGame()">🔄 إعادة اللعب</button>
  </div>

  <div class="board-wrap">
    <div id="game-board"></div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="win-emoji">🎉</div>
    <div class="win-title">برافو! خلصت اللعبة</div>
    <div class="win-sub" id="winSub">عدد المحاولات الخاطئة: 0</div>
    <button class="win-btn" onclick="document.getElementById('winOverlay').classList.remove('show');initGame()">🔄 العب مرة تانية</button>
  </div>
</div>

<script>
(function(){
  const s=localStorage.getItem("cv_theme");
  const d=window.matchMedia("(prefers-color-scheme:dark)").matches;
  applyTheme(s||(d?"dark":"light"));
})();
function applyTheme(m){document.body.classList.toggle("dark",m==="dark");localStorage.setItem("cv_theme",m);}
function toggleTheme(){applyTheme(document.body.classList.contains("dark")?"light":"dark");}

const images=[
  'imgsfile/bg.png',
  'imgsfile/game/jes.png',
  'imgsfile/game/gargs.png',
  'imgsfile/game/icon.png',
  'imgsfile/game/miry.gif',
  'imgsfile/game/mena.png',
];

const labelMap={
  'imgsfile/bg.png':'العذراء مريم',
  'imgsfile/game/jes.png':'السيد المسيح',
  'imgsfile/game/gargs.png':'ماري جرجس',
  'imgsfile/game/icon.png':'البابا شنودة',
  'imgsfile/game/miry.gif':'ماري مرقس',
  'imgsfile/game/mena.png':'ماري مينا',
};

let board,flipped=[],mistakes=0,allCards=[];

function shuffle(arr){return arr.concat(arr).sort(()=>Math.random()-.5);}

function createCard(src){
  const card=document.createElement('div');
  card.className='card';
  const img=document.createElement('img');img.src=src;
  const cap=document.createElement('div');cap.className='caption';cap.textContent=labelMap[src]||'';
  card.appendChild(img);card.appendChild(cap);
  card.dataset.image=src;
  card.addEventListener('click',()=>flipCard(card));
  return card;
}

function flipCard(card){
  if(flipped.length<2&&!card.classList.contains('flipped')&&!card.classList.contains('matched')){
    card.classList.add('flipped');
    flipped.push(card);
    if(flipped.length===2) setTimeout(checkMatch,600);
  }
}

function checkMatch(){
  const[a,b]=flipped;
  if(a.dataset.image===b.dataset.image){
    a.classList.add('matched');b.classList.add('matched');
    if(document.querySelectorAll('.matched').length===allCards.length){
      document.getElementById('winSub').textContent='عدد المحاولات الخاطئة: '+mistakes;
      setTimeout(()=>document.getElementById('winOverlay').classList.add('show'),400);
    }
  }else{
    mistakes++;
    document.getElementById('mistakeCount').textContent=mistakes;
    setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');},300);
  }
  flipped=[];
}

function initGame(){
  board=document.getElementById('game-board');
  board.innerHTML='';allCards=[];mistakes=0;flipped=[];
  document.getElementById('mistakeCount').textContent='0';
  shuffle(images).forEach(src=>{
    const card=createCard(src);
    board.appendChild(card);allCards.push(card);
  });
}
initGame();

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);
const P=[];for(let i=0;i<80;i++)P.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2.2+.5,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6});
function animate(){ctx.clearRect(0,0,w,h);for(let p of P){p.x+=p.dx;p.y+=p.dy;if(p.x>w)p.x=0;if(p.x<0)p.x=w;if(p.y>h)p.y=0;if(p.y<0)p.y=h;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=document.body.classList.contains("dark")?"rgba(167,139,250,.35)":"rgba(124,58,237,.25)";ctx.fill();}requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
